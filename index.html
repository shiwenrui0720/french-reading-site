名**；《玫瑰人生》写于1945年战争黑暗岁月之后；《爱的颂歌》创作于1949年，那晚她的伴侣、世界拳王马塞尔·塞尔当刚刚空难去世；后来还有《Milord》（1957）和《不，我不后悔》（1959）。","**在职业生涯中**，艾迪特·皮雅芙写了近80首歌曲，也演唱了许多他人为她创作的作品。","公众**认同**这位女性真实而动人的声调；她歌唱劳动阶层、卖淫世界与巴黎普通百姓。","皮雅芙的命运短暂、混乱而悲剧；她唱歌时的热烈，**与她生活时完全一样**。","艾迪特·皮雅芙1963年去世，**享年**47岁。","奥利维埃·达昂执导的电影《玫瑰人生》（2007）中，玛丽昂·歌迪亚让这位法国歌曲传奇**重新活了起来**。"],"culture":[{"title":"La voix réaliste de Paris","fr":"Piaf s’inscrit dans une tradition de chanson réaliste qui raconte la vie des milieux populaires, la rue, la pauvreté, le désir et la perte. L’interprète ne cherche pas une voix parfaitement lisse : elle fait entendre les mots, les consonnes, le souffle et l’urgence du récit. Sur scène, sa silhouette noire et presque immobile concentre l’attention sur le visage et les mains. Cette simplicité apparente demande une grande maîtrise dramatique. Le public a l’impression qu’elle ne joue pas une émotion mais qu’elle la vit au moment de chanter. Même lorsque les chansons ne sont pas autobiographiques, sa biographie nourrit cette écoute. La voix de Piaf devient ainsi inséparable d’un imaginaire de Paris populaire et nocturne.","zhSentences":["皮雅芙属于“现实主义歌曲”传统，这类歌曲讲述劳动大众、街道、贫困、欲望与失去。","演唱者并不追求绝对光滑的声音，而是让词语、辅音、呼吸和叙事的紧迫感都被听见。","舞台上，她穿着黑衣，身体几乎不动，使注意力集中在面孔和双手。","这种表面的简单需要强大的戏剧控制力。","观众会觉得她不是在表演情感，而是在歌唱的当下亲身经历它。","即使歌曲并非自传，她的人生故事也影响人们的聆听。","皮雅芙的声音由此与大众而夜色深沉的巴黎想象密不可分。"],"zh":"皮雅芙属于“现实主义歌曲”传统，这类歌曲讲述劳动大众、街道、贫困、欲望与失去。演唱者并不追求绝对光滑的声音，而是让词语、辅音、呼吸和叙事的紧迫感都被听见。舞台上，她穿着黑衣，身体几乎不动，使注意力集中在面孔和双手。这种表面的简单需要强大的戏剧控制力。观众会觉得她不是在表演情感，而是在歌唱的当下亲身经历它。即使歌曲并非自传，她的人生故事也影响人们的聆听。皮雅芙的声音由此与大众而夜色深沉的巴黎想象密不可分。"},{"title":"Des chansons devenues expressions","fr":"Certaines chansons de Piaf dépassent largement leur époque. « Voir la vie en rose » est devenu une expression courante pour dire qu’on regarde le monde avec optimisme, parfois de manière trop idéale. « Je ne regrette rien » sert à affirmer un choix, avec sérieux ou avec humour. Ces formules circulent dans les films, la publicité, les reprises musicales et les conversations. Elles restent reconnaissables même pour des personnes qui n’ont jamais écouté la chanson entière. Ce passage de l’œuvre à la langue quotidienne est une forme particulière de mémoire culturelle. Il simplifie parfois le texte original, mais il lui donne une nouvelle vie. Apprendre le français avec Piaf permet donc d’entendre à la fois une voix historique et des expressions encore actives.","zhSentences":["皮雅芙的一些歌曲远远超越了自身时代。","“用玫瑰色看人生”已成为常用表达，表示以乐观、甚至过度理想化的方式看世界。","“我毫不后悔”则用来认真或幽默地确认自己的选择。","这些句子流通于电影、广告、翻唱和日常谈话。","即使从未完整听过歌曲，人们也可能一听就认出来。","作品进入日常语言，是一种特殊的文化记忆。","它有时简化原作，却赋予原作新的生命。","因此，借皮雅芙学习法语，可以同时听见历史声音和仍在使用的表达。"],"zh":"皮雅芙的一些歌曲远远超越了自身时代。“用玫瑰色看人生”已成为常用表达，表示以乐观、甚至过度理想化的方式看世界。“我毫不后悔”则用来认真或幽默地确认自己的选择。这些句子流通于电影、广告、翻唱和日常谈话。即使从未完整听过歌曲，人们也可能一听就认出来。作品进入日常语言，是一种特殊的文化记忆。它有时简化原作，却赋予原作新的生命。因此，借皮雅芙学习法语，可以同时听见历史声音和仍在使用的表达。"},{"title":"Biographie et légende","fr":"La vie de Piaf a été racontée dans des livres, des documentaires et des films qui insistent sur l’enfance pauvre, les amours, les accidents et la souffrance. Ces éléments sont réels, mais leur répétition construit aussi une légende où le talent semble naître directement du malheur. Une biographie artistique demande davantage de prudence. Il faut considérer le travail vocal, les auteurs, les compositeurs, les musiciens, les salles de spectacle et l’industrie du disque. Le film La Môme donne une interprétation puissante de Piaf, sans être la personne elle-même ni un document neutre. Distinguer l’archive, le récit et la performance permet d’admirer l’artiste tout en comprenant comment le cinéma fabrique une icône nationale.","zhSentences":["皮雅芙的人生被书籍、纪录片与电影反复讲述，重点常是贫困童年、爱情、事故与痛苦。","这些元素真实存在，但不断重复也塑造出一种传奇，仿佛才华直接从不幸中诞生。","艺术家传记需要更加谨慎。","还应考虑声乐训练、词曲作者、乐手、演出场所和唱片工业。","电影《玫瑰人生》对皮雅芙作出了有力诠释，却既不是她本人，也不是中立记录。","区分档案、叙事和表演，能让我们在欣赏艺术家的同时，理解电影如何制造国家偶像。"],"zh":"皮雅芙的人生被书籍、纪录片与电影反复讲述，重点常是贫困童年、爱情、事故与痛苦。这些元素真实存在，但不断重复也塑造出一种传奇，仿佛才华直接从不幸中诞生。艺术家传记需要更加谨慎。还应考虑声乐训练、词曲作者、乐手、演出场所和唱片工业。电影《玫瑰人生》对皮雅芙作出了有力诠释，却既不是她本人，也不是中立记录。区分档案、叙事和表演，能让我们在欣赏艺术家的同时，理解电影如何制造国家偶像。"}],"hasAudio":true,"audioPack":{"chunks":["audio-packs/edith-piaf/01.bin"],"segments":[{"start":0,"end":25.416},{"start":25.416,"end":52.56},{"start":52.56,"end":59.136},{"start":59.136,"end":67.32},{"start":67.32,"end":74.136},{"start":74.136,"end":78.24},{"start":78.24,"end":85.272}]}},{"id":"yves-saint-laurent","title":"Yves Saint Laurent","chineseTitle":"伊夫·圣罗兰","level":"B1","topic":"people","summary":"他把男装语言、世界艺术与女性力量带入高级时装。","groups":[["Les initiales « YSL » représentent la signature d’un couturier qui a uni la mode aux arts, qui a concilié l’émancipation des femmes et l’affirmation de leur féminité.","En phase avec son époque, Yves Saint Laurent est l’héritier de Coco Chanel pour ses silhouettes qui libèrent les femmes et le successeur de Christian Dior pour ses lignes gracieusement féminines."],["Saint Laurent n’a que 26 ans lorsqu’il fonde en 1962 sa maison de couture parisienne.","Travailleur humble, cultivé et novateur, ses créations bouleversent immédiatement le monde de la haute couture ; le vêtement masculin est féminisé pour recomposer des figures contemporaines, androgynes : le « smoking », le tailleur-pantalon, la saharienne, le blazer, le caban…","Saint Laurent impose aussi un style d’une suprême élégance par la richesse des tissus, ses références aux cultures du monde, ses « hommages » aux peintres.","Pour Jean-Paul Gaultier, « Yves Saint Laurent a ouvert des portes fermées devant nous »."],["Catherine Deneuve, que Saint Laurent a habillée dans la vie et au cinéma pendant trente ans, a ces mots lorsque le grand couturier décide de se retirer en 2002 : « Ses créations dureront, continueront de vivre et d’inspirer d’autres gens. Mais le retrait de quelqu’un qui a tellement aimé les femmes, qui les a habillées avec autant de talent, va créer un grand vide »."],["À sa mort en 2008, Saint Laurent reçoit les honneurs militaires en sa qualité de Grand Officier de la Légion d’honneur.","Les cendres de son corps ont été placées dans le jardin de sa maison de Marrakech."]],"highlights":["a uni","a concilié","En phase avec","n’a que","bouleversent immédiatement","a ouvert des portes","décide de se retirer","va créer un grand vide","en sa qualité de"],"sentenceTranslations":["“YSL”这三个首字母是一位设计师的签名；他**把时尚与艺术结合起来**，也**协调了**女性解放与女性气质的肯定。","**与自己的时代同步**，伊夫·圣罗兰以解放女性的轮廓继承可可·香奈儿，也以优美的女性化线条延续克里斯汀·迪奥。","1962年在巴黎创立自己的时装屋时，圣罗兰**只有**26岁。","他工作勤勉、谦逊、有文化且富于创新，作品**立刻震动了**高级时装界；男装被女性化，重新组合成当代、双性化的形象：吸烟装、裤装套装、猎装夹克、西装外套、海军短大衣……","圣罗兰还通过丰富面料、对世界文化的借鉴和向画家“致敬”的作品，确立了一种极致优雅的风格。","让-保罗·高缇耶说：“伊夫·圣罗兰为我们**打开了原本关闭的门**。”","圣罗兰为凯瑟琳·德纳芙在生活与电影中穿衣三十年；2002年这位大师**决定退休**时，德纳芙说：“他的作品会延续，会继续生活并启发他人。但一个如此热爱女性、又如此才华横溢地为她们穿衣的人离开，**将留下巨大的空缺**。”","2008年去世时，圣罗兰**以荣誉军团大军官勋位获得者的身份**接受军事荣誉。","他的骨灰被安放在马拉喀什住所的花园里。"],"culture":[{"title":"Le smoking au féminin","fr":"En français, le mot « smoking » ne désigne pas l’action de fumer mais une veste de soirée masculine, proche du tuxedo anglais. Yves Saint Laurent en propose une version féminine en 1966. Le vêtement joue avec des signes de pouvoir jusque-là réservés aux hommes : ligne sombre, pantalon, chemise blanche et attitude assurée. Il ne supprime pas la féminité, mais montre qu’elle peut être construite autrement que par la robe. À l’époque, porter un pantalon reste même interdit aux femmes dans certains lieux élégants. Le smoking devient donc à la fois vêtement, image photographique et déclaration sociale. Ses réinterprétations successives montrent comment une pièce de mode peut conserver sa force tout en changeant de coupe, de matière et de corps.","zhSentences":["在法语中，“smoking”不是吸烟动作，而是类似英语tuxedo的男士晚礼服外套。","伊夫·圣罗兰在1966年推出女性版本。","这件衣服使用此前主要保留给男性的权力符号：深色线条、长裤、白衬衫和自信姿态。","它并未取消女性气质，而是表明女性气质可以不依靠裙装来构造。","当时，一些高档场所甚至仍禁止女性穿裤装。","因此，女性吸烟装既是一件衣服，也是一幅摄影形象和社会宣言。","不断出现的新版本说明，一件时装可以在改变剪裁、面料和穿着身体的同时保留力量。"],"zh":"在法语中，“smoking”不是吸烟动作，而是类似英语tuxedo的男士晚礼服外套。伊夫·圣罗兰在1966年推出女性版本。这件衣服使用此前主要保留给男性的权力符号：深色线条、长裤、白衬衫和自信姿态。它并未取消女性气质，而是表明女性气质可以不依靠裙装来构造。当时，一些高档场所甚至仍禁止女性穿裤装。因此，女性吸烟装既是一件衣服，也是一幅摄影形象和社会宣言。不断出现的新版本说明，一件时装可以在改变剪裁、面料和穿着身体的同时保留力量。"},{"title":"Quand la mode regarde la peinture","fr":"Saint Laurent entretient un dialogue constant avec les arts visuels. La robe Mondrian transpose sur le corps des rectangles de couleurs et des lignes noires qui rappellent le peintre néerlandais. D’autres collections évoquent Matisse, Picasso, Van Gogh, le théâtre, le ballet ou des traditions décoratives rencontrées en voyage. Il ne s’agit pas simplement de copier un tableau. Le couturier doit transformer une surface artistique en vêtement mobile, tenir compte du tissu, de la coupe et du corps. Ces hommages ont aussi contribué à présenter la mode comme une pratique culturelle digne du musée. Aujourd’hui, les expositions de vêtements interrogent justement cette frontière : la mode est une industrie commerciale, mais elle produit également des formes, des archives et une histoire du regard.","zhSentences":["圣罗兰始终与视觉艺术保持对话。","蒙德里安裙把令人联想到荷兰画家的彩色方块和黑色线条转移到身体上。","其他系列还让人想到马蒂斯、毕加索、梵高、戏剧、芭蕾或旅行中接触的装饰传统。","这并不只是复制一幅画。","设计师必须把艺术平面转化为可以移动的服装，并考虑面料、剪裁与身体。","这些致敬也推动人们把时尚看作值得进入博物馆的文化实践。","今天的服装展览正不断追问这一边界：时尚是商业产业，却也生产形式、档案和观看的历史。"],"zh":"圣罗兰始终与视觉艺术保持对话。蒙德里安裙把令人联想到荷兰画家的彩色方块和黑色线条转移到身体上。其他系列还让人想到马蒂斯、毕加索、梵高、戏剧、芭蕾或旅行中接触的装饰传统。这并不只是复制一幅画。设计师必须把艺术平面转化为可以移动的服装，并考虑面料、剪裁与身体。这些致敬也推动人们把时尚看作值得进入博物馆的文化实践。今天的服装展览正不断追问这一边界：时尚是商业产业，却也生产形式、档案和观看的历史。"},{"title":"Paris et Marrakech","fr":"La carrière de Saint Laurent est liée à Paris, capitale de la couture, mais aussi à Marrakech, où il découvre une lumière, des couleurs et des jardins qui nourrissent son imagination. Avec Pierre Bergé, son partenaire dans la vie et dans l’entreprise, il construit à la fois une maison de mode et un patrimoine culturel. Des musées consacrés à son œuvre existent dans les deux villes, ce qui permet de comparer atelier parisien, inspirations méditerranéennes et conservation des archives. Cette double géographie rappelle que la création française ne se développe pas à l’intérieur de frontières fermées. Elle voyage, regarde ailleurs et transforme ce qu’elle rencontre. Il faut cependant aussi questionner la manière dont la mode occidentale nomme, sélectionne et commercialise les références venues d’autres cultures.","zhSentences":["圣罗兰的事业与高级时装之都巴黎相连，也与马拉喀什相连；那里的光线、色彩和花园滋养了他的想象。","他与生活和商业伙伴皮埃尔·贝尔热共同建立的不只是一家时装屋，也是一份文化遗产。","两座城市都有关于其作品的博物馆，可以比较巴黎工作室、地中海灵感与档案保存。","这种双重地理提醒我们，法国创作并非在封闭边界内发展。","它旅行、观看他方，并改造所遇之物。","但同时也要追问，西方时尚如何命名、选择并商品化来自其他文化的参照。"],"zh":"圣罗兰的事业与高级时装之都巴黎相连，也与马拉喀什相连；那里的光线、色彩和花园滋养了他的想象。他与生活和商业伙伴皮埃尔·贝尔热共同建立的不只是一家时装屋，也是一份文化遗产。两座城市都有关于其作品的博物馆，可以比较巴黎工作室、地中海灵感与档案保存。这种双重地理提醒我们，法国创作并非在封闭边界内发展。它旅行、观看他方，并改造所遇之物。但同时也要追问，西方时尚如何命名、选择并商品化来自其他文化的参照。"}],"hasAudio":true,"audioPack":{"chunks":["audio-packs/yves-saint-laurent/01.bin"],"segments":[{"start":0,"end":9.36},{"start":9.36,"end":18.168},{"start":18.168,"end":23.136},{"start":23.136,"end":39.936},{"start":39.936,"end":48.024},{"start":48.024,"end":52.632},{"start":52.632,"end":70.632},{"start":70.632,"end":76.824},{"start":76.824,"end":81.048}]}},{"id":"philippe-starck","title":"Philippe Starck","chineseTitle":"菲利普·斯塔克","level":"B1","topic":"people","summary":"从柠檬榨汁器到酒店空间，他试图让设计进入每个人的日常。","groups":[["Le designer Philippe Starck renouvelle l’aspect des objets et des lieux qui nous entourent et qui comptent dans notre vie : les restaurants, les hôtels, les cafés, les appartements, les bureaux d’entreprise, les usines, le mobilier urbain mais aussi les brosses à dents, les appareils électriques, les lampes, les yachts, les motos, les paquets de riz et de spaghettis, les chaises, les couteaux, les valises, les téléphones, les lits, les baignoires, les vêtements, les lunettes…","La liste est longue, presque infinie."],["Starck a commencé sa carrière en créant une maison gonflable, deux night-clubs parisiens qui deviennent aussitôt les endroits les plus branchés de la capitale et en rénovant les appartements privés du président de la République, au palais de l’Élysée.","Depuis plus de trente ans, Starck travaille avec un crayon et du papier, jamais sur ordinateur, parce qu’il pense que les logiciels limitent la créativité.","Il a reçu des dizaines de prix internationaux et ses objets, dont le fameux presse-citron, figure iconique du design contemporain, sont exposés dans des galeries et musées du monde entier."],["Pour Starck, l’objet doit être démocratique, bon marché, il doit améliorer la vie quotidienne et rendre les gens heureux.","Starck ajoute qu’il faut remplacer le « beau » par le « bon », car la beauté n’est pas une valeur stable, alors que la bonté crée toujours du plaisir."],["Existe-t-il un style « Starck » ?","Le designer pense que non, il préfère dire qu’il est réceptif à toutes sortes d’influences, et cela inclut ce qu’il nomme les « micro-informations », trouvées par exemple dans les poubelles de Tokyo qu’il rapportait dans sa chambre d’hôtel pour en examiner le contenu."]],"highlights":["qui nous entourent","comptent dans notre vie","a commencé sa carrière","Depuis plus de trente ans","du monde entier","améliorer la vie quotidienne","rendre les gens heureux","toutes sortes d’influences","pour en examiner"],"sentenceTranslations":["设计师菲利普·斯塔克更新了那些**环绕我们**、又**在生活中十分重要**的物品和场所的外观：餐厅、酒店、咖啡馆、公寓、企业办公室、工厂、城市家具，还有牙刷、电器、灯具、游艇、摩托车、米面包装、椅子、刀具、行李箱、电话、床、浴缸、服装和眼镜……","这个清单很长，几乎没有尽头。","斯塔克**开始职业生涯**时设计了一座充气房屋和两家巴黎夜总会；后者立刻成为首都最时髦的场所。他还翻修了爱丽舍宫内的总统私人公寓。","**三十多年来**，斯塔克一直用铅笔和纸工作，从不使用电脑，因为他认为软件会限制创造力。","他获得过数十项国际奖项；他的物品——包括当代设计的标志性形象、著名的柠檬榨汁器——陈列于**世界各地**的画廊和博物馆。","在斯塔克看来，物品应当民主、便宜，应该**改善日常生活**并**让人们幸福**。","斯塔克还说，应该用“善”取代“美”，因为美不是稳定价值，而善总能创造愉悦。","是否存在一种“斯塔克风格”？","设计师认为没有；他更愿意说自己能够接受**各种各样的**影响，包括他所谓的“微信息”——例如他会把东京垃圾桶里找到的东西带回酒店房间，**以便检查**其中内容。"],"culture":[{"title":"Le design n’est pas seulement la forme","fr":"Le design industriel cherche à relier usage, fabrication, coût, sécurité, durée et apparence. Un objet réussi ne doit donc pas seulement être beau sur une photographie ; il doit pouvoir être compris, tenu, nettoyé, réparé ou recyclé. Starck insiste souvent sur l’idée d’un design démocratique, accessible au plus grand nombre grâce à la production en série. Cette ambition rencontre pourtant des contradictions : certains objets signés deviennent coûteux, collectionnés ou exposés comme des œuvres. Le designer travaille ainsi entre industrie et prestige, quotidien et musée. Observer une chaise, une brosse à dents ou une poignée de porte permet de poser une question simple : quels comportements l’objet rend-il faciles, difficiles ou même imaginables ?","zhSentences":["工业设计试图连接使用、制造、成本、安全、寿命与外观。","因此，成功的物品不能只在照片上好看，还应容易理解、握持、清洁、修理或回收。","斯塔克常强调民主设计，即通过批量生产让尽可能多的人能够使用。","但这种理想也面临矛盾：一些带设计师签名的物品会变得昂贵，成为收藏品或像艺术品一样展出。","设计师由此工作在工业与声望、日常生活与博物馆之间。","观察一把椅子、一支牙刷或一个门把手，可以提出一个简单问题：这个物品让哪些行为变得容易、困难，甚至成为可能？"],"zh":"工业设计试图连接使用、制造、成本、安全、寿命与外观。因此，成功的物品不能只在照片上好看，还应容易理解、握持、清洁、修理或回收。斯塔克常强调民主设计，即通过批量生产让尽可能多的人能够使用。但这种理想也面临矛盾：一些带设计师签名的物品会变得昂贵，成为收藏品或像艺术品一样展出。设计师由此工作在工业与声望、日常生活与博物馆之间。观察一把椅子、一支牙刷或一个门把手，可以提出一个简单问题：这个物品让哪些行为变得容易、困难，甚至成为可能？"},{"title":"Juicy Salif, utile ou iconique ?","fr":"Le presse-agrumes Juicy Salif est probablement l’objet le plus célèbre de Starck. Sa forme d’insecte ou de créature spatiale attire immédiatement le regard et le rend reconnaissable. Pourtant, de nombreux utilisateurs discutent son efficacité : il n’a pas de filtre pour retenir les pépins et son jus peut couler de manière imprévisible. Cette tension est précisément intéressante. Un objet de design doit-il accomplir parfaitement une tâche, provoquer une conversation, décorer une cuisine ou représenter une époque ? Juicy Salif fonctionne aussi comme une petite sculpture produite en série. Il montre que l’usage d’un objet peut être symbolique autant que pratique. Le débat qu’il provoque fait partie de sa vie culturelle et explique sa présence durable dans les musées et les manuels.","zhSentences":["Juicy Salif柑橘榨汁器可能是斯塔克最著名的物品。","它像昆虫或太空生物的形状会立刻吸引目光，也使它很容易被认出。","但许多使用者质疑其实用性：它没有过滤果核的装置，果汁流向也可能难以控制。","这种张力恰恰值得思考。","设计物品应该完美完成任务、引发交谈、装饰厨房，还是代表一个时代？","Juicy Salif也像一件批量生产的小雕塑。","它说明物品的用途既可以是实践性的，也可以是象征性的。","它引发的争论构成了其文化生命，也解释了它为何长期出现在博物馆和教科书中。"],"zh":"Juicy Salif柑橘榨汁器可能是斯塔克最著名的物品。它像昆虫或太空生物的形状会立刻吸引目光，也使它很容易被认出。但许多使用者质疑其实用性：它没有过滤果核的装置，果汁流向也可能难以控制。这种张力恰恰值得思考。设计物品应该完美完成任务、引发交谈、装饰厨房，还是代表一个时代？Juicy Salif也像一件批量生产的小雕塑。它说明物品的用途既可以是实践性的，也可以是象征性的。它引发的争论构成了其文化生命，也解释了它为何长期出现在博物馆和教科书中。"},{"title":"Concevoir aussi des espaces","fr":"Starck ne dessine pas seulement des objets isolés ; il crée des hôtels, des restaurants, des bureaux et des intérieurs. Dans ces espaces, le design organise une expérience complète : lumière, mobilier, circulation, son, matériaux et rapport entre les personnes. Les hôtels qu’il imagine peuvent transformer le hall en scène sociale, où l’on vient autant pour regarder et être vu que pour dormir. Cette approche a participé au développement de l’hôtel « boutique », plus petit ou plus personnalisé que les grandes chaînes standardisées. Elle montre aussi le pouvoir du design sur nos comportements. Un siège confortable invite à rester, une table commune favorise la rencontre, tandis qu’un éclairage spectaculaire peut encourager la photographie. Concevoir un lieu, c’est donc proposer discrètement une manière d’y vivre.","zhSentences":["斯塔克不只设计孤立物品，也创造酒店、餐厅、办公室和室内空间。","在这些场所中，设计组织完整体验：光线、家具、动线、声音、材料和人与人的关系。","他设计的酒店可能把大堂变成社交舞台，人们来这里观看与被观看，和来住宿同样重要。","这种思路推动了“精品酒店”的发展，它比标准化大型连锁更小或更具个性。","它也显示设计如何影响行为。","舒适座椅邀请人停留，共用长桌促进相遇，醒目灯光则可能鼓励拍照。","因此，设计一个场所，也是在不动声色地提出一种生活方式。"],"zh":"斯塔克不只设计孤立物品，也创造酒店、餐厅、办公室和室内空间。在这些场所中，设计组织完整体验：光线、家具、动线、声音、材料和人与人的关系。他设计的酒店可能把大堂变成社交舞台，人们来这里观看与被观看，和来住宿同样重要。这种思路推动了“精品酒店”的发展，它比标准化大型连锁更小或更具个性。它也显示设计如何影响行为。舒适座椅邀请人停留，共用长桌促进相遇，醒目灯光则可能鼓励拍照。因此，设计一个场所，也是在不动声色地提出一种生活方式。"}],"hasAudio":true,"audioPack":{"chunks":["audio-packs/philippe-starck/01.bin"],"segments":[{"start":0,"end":25.104},{"start":25.104,"end":27.696},{"start":27.696,"end":38.736},{"start":38.736,"end":46.968},{"start":46.968,"end":56.616},{"start":56.616,"end":63.264},{"start":63.264,"end":71.184},{"start":71.184,"end":74.16},{"start":74.16,"end":86.976}]}},{"id":"academie-francaise","title":"Académie française","chineseTitle":"法兰西学院","level":"B1","topic":"history","summary":"四十位“永生者”守护法语，也见证语言不断变化。","groups":[["Cette assemblée prestigieuse est composée de quarante membres élus à vie.","Elle est chargée de veiller, depuis sa fondation en 1635, à l’intégrité de la langue française, à son usage, ses règles, son évolution."],["L’une des tâches principales des « Immortels », qui se réunissent sous la coupole de l’Institut de France, à Paris, est l’élaboration d’un dictionnaire des mots français.","Depuis le 17e siècle, l’Académie française a publié huit éditions de ce dictionnaire.","La neuvième édition est en cours de publication depuis 1992, les académiciens travaillent actuellement sur la lettre « P »."],["À la mort d’un des Immortels, un nouveau membre est élu pour occuper le fauteuil vacant.","Il prononce alors un discours de réception dans lequel il fait l’éloge de son prédécesseur.","Parmi les 700 membres qui ont siégé à l’Académie depuis qu’elle existe figurent des noms célèbres : Montesquieu, Voltaire, Chateaubriand, Lamartine, Hugo.","La première femme, Marguerite Yourcenar, a été admise en 1980.","François Cheng, d’origine chinoise, a été élu parmi les Immortels en 2002."]],"highlights":["est composée de","est chargée de","sous la coupole","est en cours de","À la mort d’un","fait l’éloge de","ont siégé à"],"sentenceTranslations":["这个声望卓著的机构**由四十名终身选出的成员组成**。","自1635年成立以来，它**负责**维护法语的完整性，关注法语的使用、规则与演变。","“永生者”的主要任务之一，是编纂法语词典；他们在巴黎法兰西学会的**穹顶之下**开会。","自17世纪以来，法兰西学院已经出版了这部词典的八个版本。","第九版自1992年起**正在**陆续出版，院士们当时正编到字母P。","**一位永生者去世时**，人们会选出一位新成员来接替空出的席位。","新成员随后发表入院演说，并在其中**赞颂**前任。","学院成立以来，曾**任职于此**的约700名成员中包括孟德斯鸠、伏尔泰、夏多布里昂、拉马丁和雨果等名人。","第一位女性成员玛格丽特·尤瑟纳尔于1980年入选。","华裔作家程抱一于2002年当选“永生者”。"],"culture":[{"title":"Quarante fauteuils et une continuité","fr":"L’Académie française naît au dix-septième siècle, lorsque le cardinal de Richelieu donne un statut officiel à un cercle d’écrivains. Ses quarante membres sont élus par leurs pairs et restent académiciens toute leur vie. On parle donc d’un « fauteuil » plutôt que d’un simple poste : chaque nouvel élu s’inscrit dans une lignée de prédécesseurs. Lors de sa réception, il prononce un discours et rend hommage à la personne qui occupait le fauteuil avant lui. Cette cérémonie exprime une idée très française de continuité institutionnelle, où les individus passent mais où la fonction demeure. Le surnom d’« Immortels » ne signifie pas que les académiciens seraient immortels ; il vient de la devise « À l’immortalité », liée à la langue et aux œuvres.","zhSentences":["法兰西学院诞生于十七世纪，当时黎塞留枢机主教赋予一个作家团体正式地位。","四十名成员由同行选出，并终身担任院士。","因此人们说的是一把“座椅”，而不只是一个职位：每位新当选者都进入一条由前任构成的传承链。","在入院仪式上，他或她发表演说，并向上一位占据该席位的人致敬。","这种仪式体现了法国式的制度连续性观念：个人会离去，职能却延续。","“永生者”并不是说院士本人永生；这个称呼来自“致不朽”的格言，指向语言与作品。"],"zh":"法兰西学院诞生于十七世纪，当时黎塞留枢机主教赋予一个作家团体正式地位。四十名成员由同行选出，并终身担任院士。因此人们说的是一把“座椅”，而不只是一个职位：每位新当选者都进入一条由前任构成的传承链。在入院仪式上，他或她发表演说，并向上一位占据该席位的人致敬。这种仪式体现了法国式的制度连续性观念：个人会离去，职能却延续。“永生者”并不是说院士本人永生；这个称呼来自“致不朽”的格言，指向语言与作品。"},{"title":"Un dictionnaire qui prend son temps","fr":"Le dictionnaire de l’Académie ne cherche pas à enregistrer chaque mot aussitôt qu’il apparaît. Il sélectionne les usages jugés durables, précise l’orthographe et propose des définitions accompagnées d’exemples. Ce travail collectif avance lentement parce que chaque article est discuté et révisé. Le passage du livre sur la lettre P reflète donc l’état du chantier au moment de sa rédaction, et non la situation actuelle. La neuvième édition a poursuivi son chemin bien après cette étape. Pour connaître une recommandation récente, il faut consulter la version numérique ou les communications officielles plutôt qu’un chiffre imprimé ancien. Cette différence est une bonne leçon de lecture : un texte historique peut rester utile tout en contenant des indications temporelles qu’il faut dater.","zhSentences":["法兰西学院词典并不追求一个新词刚出现就立即收录。","它挑选被认为能够长期使用的词语，确定拼写，并提供带例句的释义。","由于每个词条都要集体讨论和修订，这项工作推进缓慢。","因此，书中提到编到字母P，反映的是写作当时的进度，并非今天的状况。","第九版在那之后继续推进。","要了解近期建议，应查看数字版或官方说明，而不能只依靠旧书中的数字。","这也是一种重要的阅读方法：历史文本仍然有用，但其中带时间性的说法需要注明年代。"],"zh":"法兰西学院词典并不追求一个新词刚出现就立即收录。它挑选被认为能够长期使用的词语，确定拼写，并提供带例句的释义。由于每个词条都要集体讨论和修订，这项工作推进缓慢。因此，书中提到编到字母P，反映的是写作当时的进度，并非今天的状况。第九版在那之后继续推进。要了解近期建议，应查看数字版或官方说明，而不能只依靠旧书中的数字。这也是一种重要的阅读方法：历史文本仍然有用，但其中带时间性的说法需要注明年代。"},{"title":"Règle officielle ou usage vivant ?","fr":"L’Académie exerce une forte autorité symbolique, mais elle ne contrôle pas à elle seule tout ce que les francophones disent et écrivent. Le français vit en France, au Québec, en Afrique, en Belgique, en Suisse et dans de nombreux autres espaces, avec des accents et des vocabulaires variés. Les dictionnaires décrivent cette langue en mouvement, tandis que l’école, l’édition, les médias et les administrations fixent aussi leurs propres normes. Une recommandation peut être respectée dans un texte officiel sans s’imposer immédiatement dans la conversation quotidienne. Les débats sur les anglicismes, les nouveaux pronoms ou la féminisation des noms de métiers montrent cette tension. Comprendre le rôle de l’Académie, c’est donc distinguer le prestige d’une institution, la norme écrite et la créativité réelle des locuteurs.","zhSentences":["法兰西学院具有很强的象征权威，但它并不能独自控制所有法语使用者的说写方式。","法语活跃在法国、魁北克、非洲、比利时、瑞士和许多其他地区，拥有多样的口音与词汇。","词典描述这门不断变化的语言，学校、出版、媒体和行政机构也各自建立规范。","一项建议可能在官方文本中得到遵守，却不会立刻进入日常谈话。","围绕英语借词、新代词和职业名称女性化的争论都体现了这种张力。","理解法兰西学院的角色，就是区分机构声望、书面规范与说话者真实的创造力。"],"zh":"法兰西学院具有很强的象征权威，但它并不能独自控制所有法语使用者的说写方式。法语活跃在法国、魁北克、非洲、比利时、瑞士和许多其他地区，拥有多样的口音与词汇。词典描述这门不断变化的语言，学校、出版、媒体和行政机构也各自建立规范。一项建议可能在官方文本中得到遵守，却不会立刻进入日常谈话。围绕英语借词、新代词和职业名称女性化的争论都体现了这种张力。理解法兰西学院的角色，就是区分机构声望、书面规范与说话者真实的创造力。"}],"hasAudio":true,"audioPack":{"chunks":["audio-packs/academie-francaise/01.bin"],"segments":[{"start":0,"end":3.864},{"start":3.864,"end":12.432},{"start":12.432,"end":21.216},{"start":21.216,"end":26.568},{"start":26.568,"end":34.104},{"start":34.104,"end":38.688},{"start":38.688,"end":43.32},{"start":43.32,"end":52.776},{"start":52.776,"end":57.624},{"start":57.624,"end":62.64}]}},{"id":"asterix-obelix","title":"Astérix et Obélix","chineseTitle":"阿斯泰利克斯与奥贝利克斯","level":"B1","topic":"history","summary":"两个高卢英雄以幽默、反抗和友情征服了几代读者。","groups":[["Personnages de bande dessinée créés en 1960 par Uderzo, dessinateur, et Goscinny, scénariste, les deux Gaulois Astérix et Obélix habitent le seul village imaginaire de la Gaule que les occupants romains ne parviennent pas à conquérir."],["Comment expliquer ce phénomène ?","Une potion magique, bien sûr, préparée par Panoramix, le druide du village, et qui rend les Gaulois invincibles.","Mais les Gaulois ont d’autres armes : ils sont astucieux et combatifs, toujours prêts à défendre leur territoire."],["Les Français se reconnaissent dans ces histoires qui racontent avec humour leurs ancêtres de l’an 50 avant l’ère chrétienne : irritables, fiers, rebelles, désordonnés, indépendants, ces Gaulois retranchés dans leur village caricaturent des millions de Français et leurs relations, souvent turbulentes, avec leurs voisins."],["Les aventures d’Astérix et d’Obélix ont été vendues à plus de 300 millions d’exemplaires dans le monde et ont été traduites en une centaine de langues.","En 2009, le 34e album de la série a été publié sous le titre L’Anniversaire d’Astérix et d’Obélix, pour célébrer les 50 ans des deux Gaulois les plus célèbres du monde."]],"highlights":["ne parviennent pas à","rend les Gaulois invincibles","prêts à défendre","se reconnaissent dans","avec humour","à plus de","sous le titre","pour célébrer"],"sentenceTranslations":["阿斯泰利克斯和奥贝利克斯是由画家乌德尔佐和编剧戈西尼于1960年创造的漫画人物；这两个高卢人住在高卢唯一一个罗马占领者**无法**征服的虚构村庄里。","如何解释这一现象呢？","当然是一剂由村中德鲁伊帕诺哈米克斯调制、能**让高卢人变得不可战胜**的魔法药水。","不过高卢人还有其他武器：他们机智善战，随时**准备保卫**自己的领地。","法国人在这些故事中**看到了自己**；故事**幽默地**讲述公元前50年的祖先：易怒、骄傲、叛逆、散漫而独立，这些退守村庄的高卢人漫画式地呈现了数百万法国人以及他们与邻国常常动荡的关系。","阿斯泰利克斯与奥贝利克斯的冒险故事在全球销量**超过**三亿册，并被译成约一百种语言。","2009年，系列第34册以《阿斯泰利克斯与奥贝利克斯的生日》**为标题**出版，**以庆祝**两位世界最著名高卢英雄诞生50周年。"],"culture":[{"title":"Des Gaulois inventés au vingtième siècle","fr":"Astérix ne raconte pas l’Antiquité comme un manuel scolaire. La série mélange quelques réalités historiques, des anachronismes assumés et beaucoup de jeux de mots. Les Romains, les druides et la conquête de la Gaule fournissent le décor, mais les comportements ressemblent souvent à ceux de Français du vingtième siècle. Le petit village devient ainsi une miniature du pays, avec ses banquets, ses querelles, son chef et ses habitants très différents. Le célèbre début, « Toute la Gaule est occupée… », installe immédiatement le plaisir de l’exception : un groupe minuscule résiste à un immense empire. Cette fantaisie ne remplace pas l’histoire, mais elle donne envie de comparer le récit comique aux connaissances archéologiques et aux textes antiques.","zhSentences":["《阿斯泰利克斯》并不像历史教科书那样讲述古代。","这个系列混合了一些历史事实、刻意的时代错置和大量文字游戏。","罗马人、德鲁伊和征服高卢构成背景，但人物行为常常像二十世纪的法国人。","小村庄因此成为国家的缩影，有宴会、争吵、首领和性格各异的居民。","著名的开场“整个高卢都被占领了……”立刻制造出例外的乐趣：一个极小群体反抗庞大帝国。","这种幻想不能代替历史，却会让人想把漫画故事同考古知识和古代文献进行比较。"],"zh":"《阿斯泰利克斯》并不像历史教科书那样讲述古代。这个系列混合了一些历史事实、刻意的时代错置和大量文字游戏。罗马人、德鲁伊和征服高卢构成背景，但人物行为常常像二十世纪的法国人。小村庄因此成为国家的缩影，有宴会、争吵、首领和性格各异的居民。著名的开场“整个高卢都被占领了……”立刻制造出例外的乐趣：一个极小群体反抗庞大帝国。这种幻想不能代替历史，却会让人想把漫画故事同考古知识和古代文献进行比较。"},{"title":"Une langue pleine de clins d’œil","fr":"Une grande partie du plaisir vient des noms et des jeux de mots. Les Gaulois portent souvent un nom terminé en -ix, comme Astérix ou Obélix, tandis que les Romains reçoivent des noms à consonance latine qui cachent une plaisanterie française. Les traductions doivent donc recréer un effet comique plutôt que remplacer mécaniquement chaque mot. Les albums parodient aussi les accents, les habitudes régionales, la publicité, la politique et les célébrités. Un enfant peut suivre l’aventure et les bagarres ; un adulte remarque d’autres références. Cette lecture à plusieurs niveaux explique la longévité de la série. Elle constitue également un excellent exercice de français, à condition d’accepter de ne pas comprendre immédiatement chaque allusion et de chercher comment le dessin complète le texte.","zhSentences":["阅读乐趣很大一部分来自人名与双关语。","高卢人的名字常以-ix结尾，例如Astérix和Obélix；罗马人的名字则带有拉丁语音感，同时藏着法语笑话。","因此翻译需要重新创造喜剧效果，而不能机械地逐词替换。","漫画也戏仿口音、地方习惯、广告、政治与名人。","孩子可以看冒险和打斗，成年人则能发现更多引用。","这种多层阅读解释了系列为何长盛不衰。","它也是很好的法语练习，只要接受自己不必立刻理解每个暗示，并观察图像如何补充文字。"],"zh":"阅读乐趣很大一部分来自人名与双关语。高卢人的名字常以-ix结尾，例如Astérix和Obélix；罗马人的名字则带有拉丁语音感，同时藏着法语笑话。因此翻译需要重新创造喜剧效果，而不能机械地逐词替换。漫画也戏仿口音、地方习惯、广告、政治与名人。孩子可以看冒险和打斗，成年人则能发现更多引用。这种多层阅读解释了系列为何长盛不衰。它也是很好的法语练习，只要接受自己不必立刻理解每个暗示，并观察图像如何补充文字。"},{"title":"Le mythe de « nos ancêtres les Gaulois »","fr":"Pendant longtemps, l’école française a popularisé la formule « nos ancêtres les Gaulois ». Elle offrait à la nation une origine simple et commune, mais elle réduisait une histoire beaucoup plus complexe. La population de la France actuelle vient de migrations, de conquêtes et de mélanges successifs ; les territoires français d’outre-mer rendent cette formule encore moins universelle. Astérix joue avec ce vieux récit national plutôt qu’il ne le prouve. Ses héros sont courageux, mais aussi vaniteux, querelleurs et excessifs. Le rire permet donc à la fois de célébrer une image de résistance et de s’en moquer. Aujourd’hui, lire la série avec recul aide à comprendre comment une société fabrique des ancêtres symboliques, puis transforme ces symboles au fil des générations.","zhSentences":["法国学校曾长期普及“我们的祖先高卢人”这句话。","它为国家提供了一个简单共同的起源，却缩减了远为复杂的历史。","当代法国人口源于连续不断的迁徙、征服与混合，法国海外领土也让这句话更难具有普遍性。","《阿斯泰利克斯》是在玩转这套旧民族叙事，而不是证明它。","英雄们勇敢，却也虚荣、爱争吵而且夸张。","笑声因此既庆祝抵抗形象，也拿它开玩笑。","今天带着距离阅读这个系列，有助于理解社会如何创造象征性的祖先，又如何让这些象征随世代改变。"],"zh":"法国学校曾长期普及“我们的祖先高卢人”这句话。它为国家提供了一个简单共同的起源，却缩减了远为复杂的历史。当代法国人口源于连续不断的迁徙、征服与混合，法国海外领土也让这句话更难具有普遍性。《阿斯泰利克斯》是在玩转这套旧民族叙事，而不是证明它。英雄们勇敢，却也虚荣、爱争吵而且夸张。笑声因此既庆祝抵抗形象，也拿它开玩笑。今天带着距离阅读这个系列，有助于理解社会如何创造象征性的祖先，又如何让这些象征随世代改变。"}],"hasAudio":true,"audioPack":{"chunks":["audio-packs/asterix-obelix/01.bin"],"segments":[{"start":0,"end":12.576},{"start":12.576,"end":14.712},{"start":14.712,"end":21.888},{"start":21.888,"end":27.864},{"start":27.864,"end":44.328},{"start":44.328,"end":51.192},{"start":51.192,"end":60.768}]}},{"id":"chateaux-loire","title":"Châteaux de la Loire","chineseTitle":"卢瓦尔河谷城堡","level":"B1","topic":"history","summary":"王权、文艺复兴与河谷风景共同塑造法国最著名的城堡群。","groups":[["Il y a un roi de France au Moyen Âge qu’on appelait le « petit roi de Bourges » parce que son domaine se limitait pratiquement à cette petite ville au sud de la Loire.","Le reste du territoire était aux mains des Anglais et des Bourguignons, leurs alliés.","La France allait disparaître, passer sous la couronne d’Angleterre.","Mais Jeanne d’Arc a sauvé la situation et le roi de Bourges a finalement été sacré en 1429 dans la cathédrale de Reims."],["Charles VII, lorsqu’il résidait à Bourges, ne se doutait pas que la Loire, pays de Rabelais et de Ronsard, allait bientôt devenir la région la plus française de la France.","On dit en effet aujourd’hui que c’est ici que l’on parle le français le plus pur, que le climat est le plus doux ; et c’est ici que les futurs rois et reines de France allaient construire leurs plus belles résidences de villégiature.","Cette période de faste, de splendeur architecturale inspirée par l’Italie et ses artistes a ouvert une nouvelle ère, la Renaissance française, qui a bouleversé le pays et l’a fait entrer dans la modernité.","Les noms de ces prestigieux châteaux sont désormais des classiques : Amboise, Chambord, Chenonceau, Blois, Azay-le-Rideau, Villandry…","Visités par des centaines de milliers de touristes chaque année, ces châteaux ont inspiré d’autres créateurs : Walt Disney a pris le château d’Ussé comme modèle pour La Belle au bois dormant et Hergé celui de Cheverny pour le château de Moulinsart, résidence du capitaine Haddock, grand compagnon de Tintin."]],"highlights":["se limitait pratiquement à","était aux mains de","a sauvé la situation","ne se doutait pas que","a ouvert une nouvelle ère","a fait entrer","a pris le château d’Ussé comme modèle"],"sentenceTranslations":["中世纪有一位法国国王被称为“布尔日小国王”，因为他的领地几乎**仅限于**卢瓦尔河南部这座小城。","其余领土**掌握在**英格兰人及其勃艮第盟友手中。","法国眼看就要消失，落入英格兰王冠之下。","但圣女贞德**挽救了局面**，布尔日国王最终于1429年在兰斯大教堂加冕。","查理七世居住在布尔日时，**并不知道**拉伯雷和龙沙的故乡卢瓦尔河谷很快会成为“最法国的法国地区”。","今天人们确实说，这里讲的法语最纯正、气候最温和；未来的法国国王和王后也正是在这里建造最美的度假行宫。","这段繁华时期的建筑辉煌受到意大利及其艺术家启发，**开启了一个新时代**——法国文艺复兴；它深刻改变国家，并**使其进入**现代性。","这些著名城堡的名字如今已成为经典：昂布瓦斯、香波尔、舍农索、布卢瓦、阿宰勒里多、维朗德里……","每年数十万游客参观这些城堡，它们也启发了其他创作者：迪士尼**以于塞城堡为原型**创作《睡美人》，埃尔热则以舍维尼城堡为丁丁好友阿道克船长的穆兰萨尔城堡原型。"],"culture":[{"title":"De forteresse à résidence de plaisir","fr":"Au Moyen Âge, un château sert d’abord à défendre un territoire et à manifester un pouvoir. À la Renaissance, plusieurs souverains et grands seigneurs de la vallée de la Loire recherchent davantage de lumière, de confort et de mise en scène. Les façades s’ouvrent, les escaliers deviennent spectaculaires, les jardins organisent le paysage et les décors italiens rencontrent les traditions françaises. Chambord conserve une silhouette massive, mais son célèbre escalier et ses terrasses invitent à circuler et à regarder. Chenonceau traverse l’eau du Cher comme un pont habité. Chaque château répond donc à une histoire différente. Les visiter, c’est apprendre à lire dans la pierre le passage d’une architecture de défense à une architecture de cour, de représentation et de plaisir.","zhSentences":["中世纪的城堡首先用于防御领土和展示权力。","到文艺复兴时期，卢瓦尔河谷的君主与大领主更追求光线、舒适和展示效果。","立面打开，楼梯变得壮观，花园组织风景，意大利装饰与法国传统相遇。","香波尔仍有厚重轮廓，但著名楼梯与露台邀请人们行走和观看。","舍农索则像一座有人居住的桥横跨谢尔河。","每座城堡都回应不同历史。","参观它们，就是从石头中读出建筑如何由防御转向宫廷、展示与享乐。"],"zh":"中世纪的城堡首先用于防御领土和展示权力。到文艺复兴时期，卢瓦尔河谷的君主与大领主更追求光线、舒适和展示效果。立面打开，楼梯变得壮观，花园组织风景，意大利装饰与法国传统相遇。香波尔仍有厚重轮廓，但著名楼梯与露台邀请人们行走和观看。舍农索则像一座有人居住的桥横跨谢尔河。每座城堡都回应不同历史。参观它们，就是从石头中读出建筑如何由防御转向宫廷、展示与享乐。"},{"title":"La Loire, axe du pouvoir et des échanges","fr":"La présence de tant de résidences ne tient pas seulement à la beauté du paysage. La Loire et ses affluents formaient des voies de circulation importantes, reliant villes, marchés et territoires royaux. Lorsque la cour se déplaçait fréquemment, il fallait des demeures capables d’accueillir le souverain, sa famille, ses conseillers et de nombreux serviteurs. Des artisans, des artistes et des jardiniers venaient travailler autour de ces chantiers. La région est ainsi devenue un espace de rencontres entre pouvoir politique, innovations artistiques et économie locale. Plus tard, lorsque le centre de la monarchie s’est fixé autour de Paris et de Versailles, plusieurs châteaux ont perdu leur rôle quotidien. Leur conservation actuelle raconte donc aussi le déplacement progressif du pouvoir royal et la transformation des résidences en patrimoine.","zhSentences":["如此多的宫殿并不只因为风景美丽。","卢瓦尔河及其支流曾是重要交通路线，连接城市、市场和王室领地。","宫廷频繁迁移时，需要能容纳君主、家人、顾问和大批仆从的住所。","工匠、艺术家与园丁也来到这些工程周围工作。","这里因此成为政治权力、艺术创新与地方经济交汇的空间。","后来王权中心固定在巴黎和凡尔赛周边，多座城堡失去日常功能。","今天的保护工作也讲述了王权逐渐转移，以及宫殿如何变成文化遗产。"],"zh":"如此多的宫殿并不只因为风景美丽。卢瓦尔河及其支流曾是重要交通路线，连接城市、市场和王室领地。宫廷频繁迁移时，需要能容纳君主、家人、顾问和大批仆从的住所。工匠、艺术家与园丁也来到这些工程周围工作。这里因此成为政治权力、艺术创新与地方经济交汇的空间。后来王权中心固定在巴黎和凡尔赛周边，多座城堡失去日常功能。今天的保护工作也讲述了王权逐渐转移，以及宫殿如何变成文化遗产。"},{"title":"Un patrimoine vivant, pas un décor figé","fr":"Les châteaux attirent des visiteurs, mais ils ne sont pas tous gérés de la même façon. Certains appartiennent à l’État ou à des collectivités, d’autres restent des propriétés privées ouvertes au public. Billetterie, restauration, jardins, expositions et événements contribuent à financer un entretien très coûteux. Les équipes doivent choisir comment montrer les pièces, expliquer les transformations et accueillir un grand nombre de personnes sans fragiliser les bâtiments. Les images de contes de fées sont efficaces pour rêver, mais elles peuvent masquer le travail des domestiques, les conflits politiques et les ressources nécessaires à la vie de cour. Une visite attentive observe donc autant les cuisines, les escaliers de service et les matériaux que les chambres royales. Le patrimoine devient vivant lorsqu’il permet de poser de nouvelles questions au passé.","zhSentences":["城堡吸引游客，但管理方式并不完全相同。","一些属于国家或地方政府，另一些仍是向公众开放的私人财产。","门票、修复、花园、展览和活动共同支撑成本高昂的维护。","团队必须决定如何展示房间、解释改建，并在不损害建筑的情况下接待大量游客。","童话形象很适合激发想象，却可能遮蔽仆人的劳动、政治冲突和宫廷生活需要的资源。","细心参观时，应像观察王室卧房一样观察厨房、服务楼梯和材料。","当文化遗产帮助人们向过去提出新问题时，它才真正鲜活。"],"zh":"城堡吸引游客，但管理方式并不完全相同。一些属于国家或地方政府，另一些仍是向公众开放的私人财产。门票、修复、花园、展览和活动共同支撑成本高昂的维护。团队必须决定如何展示房间、解释改建，并在不损害建筑的情况下接待大量游客。童话形象很适合激发想象，却可能遮蔽仆人的劳动、政治冲突和宫廷生活需要的资源。细心参观时，应像观察王室卧房一样观察厨房、服务楼梯和材料。当文化遗产帮助人们向过去提出新问题时，它才真正鲜活。"}],"hasAudio":true,"audioPack":{"chunks":["audio-packs/chateaux-loire/01.bin"],"segments":[{"start":0,"end":7.68},{"start":7.68,"end":12.192},{"start":12.192,"end":16.08},{"start":16.08,"end":22.44},{"start":22.44,"end":31.32},{"start":31.32,"end":41.208},{"start":41.208,"end":51.528},{"start":51.528,"end":60.72},{"start":60.72,"end":75.912}]}},{"id":"clocher","title":"Clocher","chineseTitle":"钟楼","level":"B2","topic":"history","summary":"一座乡村钟楼，如何成为政治传播中的“宁静力量”。","groups":[["Après l’élection historique du socialiste François Mitterrand à la présidence de la République en mai 1981, les observateurs politiques se sont beaucoup interrogés sur l’impact de la stratégie promotionnelle élaborée par le publicitaire Jacques Séguéla pour le candidat Mitterrand.","On se demandait en particulier quelle influence avait eue sur les électeurs cette célèbre affiche du futur président posant devant un paysage de campagne rosissante, la couleur des socialistes, où l’on distingue le clocher d’une église.","Un slogan tout simple complétait cette affiche : « La force tranquille »."],["Pour rassurer une catégorie de Français inquiets du chaos qu’entraînerait l’élection d’un candidat de la gauche — le pays avait été gouverné par des conservateurs depuis le début de la IIIe République, à l’exception d’un intermède en 1936-1938 avec Léon Blum et le Front populaire —, il fallait donc suggérer une image rassurante, réconfortante : le clocher d’un village s’est ainsi imposé comme l’élément-clé de la campagne électorale finalement triomphante de François Mitterrand."],["Le clocher représente la tradition, ce sont les paysans du tableau de Millet qui se recueillent dans un champ au moment où sonnent les cloches pour l’Angélus ; c’est la France profonde, historique, rurale, nourricière.","Le clocher est au centre du paysage français, on l’aperçoit partout dans les provinces.","Pendant des siècles, l’église a été l’édifice le plus imposant du village, de la ville."]],"highlights":["se sont beaucoup interrogés sur","quelle influence avait eue","à l’exception d’un","s’est ainsi imposé comme","au moment où","au centre du"],"sentenceTranslations":["1981年5月，社会主义者弗朗索瓦·密特朗历史性当选共和国总统后，政治观察家们反复**思考广告人雅克·塞盖拉为密特朗制定的宣传策略产生了怎样的影响**。","人们尤其想知道，那张未来总统站在微微泛红的乡间景色前、远处可见教堂钟楼的著名海报，对选民**产生了什么影响**；红色正是社会主义者的颜色。","海报还配上一句极其简单的口号：“宁静的力量”。","为了安抚那些担心左翼候选人当选会带来混乱的法国人——**除了**1936至1938年莱昂·布鲁姆和人民阵线的短暂插曲，第三共和国初期以来国家一直由保守派治理——宣传需要提供一个令人安心、得到抚慰的形象；于是村庄钟楼最终**成为**密特朗胜选宣传的关键元素。","钟楼代表传统：米勒画中的农民**在晚祷钟声响起之时**，站在田野中默祷；它也是深层的、历史的、乡村的、养育人的法国。","钟楼位于法国风景的**中心**，在各地都能望见。","几个世纪以来，教堂一直是村庄或城镇中最宏伟的建筑。"],"culture":[{"title":"Une affiche devenue image historique","fr":"La campagne de 1981 montre comment une affiche peut condenser un programme politique en quelques signes. Le visage calme du candidat, le ciel doux, le village et le slogan associent changement et sécurité. François Mitterrand représente alors l’alternance à gauche, ce qui suscite de l’espoir mais aussi de la peur chez certains électeurs. L’image répond à cette tension : elle promet une rupture sans agitation. La formule « La force tranquille » est courte, facile à mémoriser et assez ouverte pour que chacun y projette ses attentes. Elle est devenue un cas classique de communication politique en France. Pourtant, une affiche ne gagne pas seule une élection ; elle fonctionne au milieu de débats, de partis, de médias, de situations économiques et d’expériences personnelles.","zhSentences":["1981年的竞选说明，一张海报可以用少量符号浓缩政治纲领。","候选人平静的面容、柔和天空、村庄和口号把改变与安全联系起来。","密特朗当时代表左翼轮替，这既带来希望，也让部分选民恐惧。","图像回应了这种张力：它承诺改变，却不显得动荡。","“宁静的力量”简短、易记，也足够开放，让每个人投射期待。","它后来成为法国政治传播的经典案例。","但一张海报不能独自赢得选举；它始终置于辩论、政党、媒体、经济形势和个人经验之中。"],"zh":"1981年的竞选说明，一张海报可以用少量符号浓缩政治纲领。候选人平静的面容、柔和天空、村庄和口号把改变与安全联系起来。密特朗当时代表左翼轮替，这既带来希望，也让部分选民恐惧。图像回应了这种张力：它承诺改变，却不显得动荡。“宁静的力量”简短、易记，也足够开放，让每个人投射期待。它后来成为法国政治传播的经典案例。但一张海报不能独自赢得选举；它始终置于辩论、政党、媒体、经济形势和个人经验之中。"},{"title":"Pourquoi le clocher rassure-t-il ?","fr":"Pendant des siècles, le clocher organise à la fois l’espace et le temps. Visible de loin, il indique le centre du bourg ; ses cloches annoncent les offices, les fêtes, les deuils, les dangers et les heures de la journée. Même dans une République laïque, cette silhouette reste liée à une mémoire collective, à l’enfance, au village et à la continuité des générations. L’affiche politique mobilise cette mémoire sans présenter un message religieux explicite. Elle transforme un bâtiment réel en signe de stabilité. Cette lecture n’est pourtant pas universelle : pour certains, le clocher évoque le patrimoine ; pour d’autres, l’autorité de l’Église ou une France rurale idéalisée. Un symbole est puissant précisément parce qu’il rassemble plusieurs souvenirs, parfois contradictoires.","zhSentences":["几个世纪以来，钟楼同时组织空间与时间。","它从远处可见，标示城镇中心；钟声则报告礼拜、节日、丧事、危险和一天中的时刻。","即使在世俗共和国中，这一轮廓仍连接集体记忆、童年、村庄和世代延续。","政治海报调用这种记忆，却没有直接传达宗教信息。","它把真实建筑转化为稳定的符号。","不过这种理解并非人人相同：有人想到文化遗产，有人想到教会权威或被理想化的乡村法国。","象征之所以强大，正因为它能汇集多个有时彼此矛盾的记忆。"],"zh":"几个世纪以来，钟楼同时组织空间与时间。它从远处可见，标示城镇中心；钟声则报告礼拜、节日、丧事、危险和一天中的时刻。即使在世俗共和国中，这一轮廓仍连接集体记忆、童年、村庄和世代延续。政治海报调用这种记忆，却没有直接传达宗教信息。它把真实建筑转化为稳定的符号。不过这种理解并非人人相同：有人想到文化遗产，有人想到教会权威或被理想化的乡村法国。象征之所以强大，正因为它能汇集多个有时彼此矛盾的记忆。"},{"title":"Les cloches dans la vie locale","fr":"Aujourd’hui, de nombreuses cloches continuent de sonner, mais leur usage peut provoquer des discussions. Les habitants anciens considèrent souvent ce son comme une partie normale du paysage ; de nouveaux résidents peuvent le vivre comme une nuisance, surtout tôt le matin ou la nuit. Les communes cherchent alors un équilibre entre tradition, réglementation du bruit et qualité de vie. Certaines sonneries relèvent du culte, d’autres sont civiles et donnent simplement l’heure. Les clochers eux-mêmes demandent des travaux coûteux : charpentes, pierres, mécanismes et cloches doivent être surveillés. Derrière la carte postale, il existe donc une gestion très concrète du patrimoine. Ces débats montrent qu’une tradition n’est pas immobile ; elle continue parce qu’une communauté discute de la manière de la transmettre.","zhSentences":["今天许多钟仍会鸣响，但它们的使用也可能引发讨论。","老居民往往把钟声视为正常环境的一部分，新搬来的人则可能觉得它扰民，尤其在清晨或夜间。","地方政府需要在传统、噪音规定和生活质量之间寻找平衡。","有些钟声属于宗教礼仪，另一些是报时的民用钟声。","钟楼本身也需要昂贵维护：木构架、石材、机械和钟体都要检查。","明信片般的画面背后，是非常具体的文化遗产管理。","这些争论说明传统并非静止不动；它通过共同体讨论如何传承而继续存在。"],"zh":"今天许多钟仍会鸣响，但它们的使用也可能引发讨论。老居民往往把钟声视为正常环境的一部分，新搬来的人则可能觉得它扰民，尤其在清晨或夜间。地方政府需要在传统、噪音规定和生活质量之间寻找平衡。有些钟声属于宗教礼仪，另一些是报时的民用钟声。钟楼本身也需要昂贵维护：木构架、石材、机械和钟体都要检查。明信片般的画面背后，是非常具体的文化遗产管理。这些争论说明传统并非静止不动；它通过共同体讨论如何传承而继续存在。"}],"hasAudio":true,"audioPack":{"chunks":["audio-packs/clocher/01.bin"],"segments":[{"start":0,"end":13.656},{"start":13.656,"end":24.672},{"start":24.672,"end":29.28},{"start":29.28,"end":52.704},{"start":52.704,"end":63.696},{"start":63.696,"end":68.52},{"start":68.52,"end":73.536}]}},{"id":"coq","title":"Coq","chineseTitle":"高卢雄鸡","level":"B1","topic":"history","summary":"从拉丁双关到体育球衣，雄鸡成为法国最鲜活的象征之一。","groups":[["Pour les Romains conquérants de la Gaule au premier siècle av. J.-C., ce « gallinacé », du latin gallina, poule, désignait aussi les Gaulois, gallus.","Depuis, le coq, onomatopée issue du latin coccus, est devenu peu à peu l’un des emblèmes de la nation française : d’abord au cours du Moyen Âge et de l’Ancien Régime, puis surtout pendant la Révolution.","Napoléon préférait l’aigle, mais la IIIe République, en 1870, a définitivement consacré le coq en le plaçant sur la monnaie, les timbres et les uniformes."],["Le coq est partout présent en France : son chant matinal annonce l’aube, les girouettes en forme de coq sur le clocher des églises indiquent la direction du vent.","On le voit aussi sur les maillots des équipes sportives nationales qui défendent l’honneur du pays.","Le cri du coq, rendu par l’onomatopée « cocorico », peut même signifier dans la langue un excès de chauvinisme."],["L’image de cet animal n’est pas toujours flatteuse, le coq apparaît souvent en effet comme un esprit mâle et dominateur, arrogant et fier.","Mais on lui attribue également certains traits positifs dans lesquels les Français veulent bien se reconnaître : combatif, exemplaire, courageux, tenace, indépendant."]],"highlights":["peu à peu","au cours du","en forme de","défendent l’honneur","un excès de","on lui attribue","se reconnaître"],"sentenceTranslations":["对公元前一世纪征服高卢的罗马人来说，这种“鸡形目动物”一词来自拉丁语gallina（母鸡），也指高卢人gallus。","此后，来自拉丁语coccus这一拟声词的“雄鸡”，**逐渐**成为法兰西民族象征之一：先是**在中世纪和旧制度期间**，后来尤其是在大革命时期。","拿破仑更喜欢鹰，但1870年建立的第三共和国通过把雄鸡放上货币、邮票和制服，最终确立了它的地位。","雄鸡在法国无处不在：清晨啼鸣预告黎明，教堂钟楼上**雄鸡形状的**风向标指示风向。","国家运动队的球衣上也能看到它，运动员们以此**捍卫国家荣誉**。","雄鸡叫声的拟声词“cocorico”在法语中甚至可以表示**过度的**沙文主义。","这种动物的形象并不总是讨喜；雄鸡确实常被视为男性化、支配欲强、傲慢而骄傲的性格。","不过，人们也**赋予它**一些法国人愿意从中**认出自己**的积极特征：好斗、堪为榜样、勇敢、坚韧、独立。"],"culture":[{"title":"Un jeu de mots devenu symbole","fr":"Le rapprochement entre gallus, le Gaulois, et gallus, le coq, vient du latin. Il a fourni une image facile à reconnaître, même si l’histoire réelle du symbole est progressive et parfois discontinue. Les rois ont utilisé de nombreux animaux et signes ; la Révolution puis les républiques ont réinterprété le coq comme figure du peuple et de la vigilance. Contrairement à Marianne, il n’est pas l’emblème officiel défini par la Constitution. Il apparaît néanmoins sur des bâtiments, des monuments aux morts, des monnaies anciennes et des objets publics. Son efficacité tient à sa silhouette, à son chant et à son nom. Un simple jeu de langue a donc contribué à construire une représentation nationale durable, reprise ensuite selon les besoins de chaque époque.","zhSentences":["gallus既可指高卢人，也可指雄鸡，这种联系来自拉丁语。","它提供了一个容易识别的形象，虽然这一象征的真实历史是逐渐形成、时有中断的。","王室使用过许多动物和标志；大革命及后来的共和国则把雄鸡重新解释为人民与警觉的形象。","与玛丽安娜不同，它不是宪法规定的官方国徽。","不过，它仍出现在建筑、阵亡纪念碑、旧货币和公共物品上。","它的效果来自醒目的轮廓、啼声与名称。","一个语言双关就这样参与塑造了持久的国家形象，并被各个时代按自身需要重新使用。"],"zh":"gallus既可指高卢人，也可指雄鸡，这种联系来自拉丁语。它提供了一个容易识别的形象，虽然这一象征的真实历史是逐渐形成、时有中断的。王室使用过许多动物和标志；大革命及后来的共和国则把雄鸡重新解释为人民与警觉的形象。与玛丽安娜不同，它不是宪法规定的官方国徽。不过，它仍出现在建筑、阵亡纪念碑、旧货币和公共物品上。它的效果来自醒目的轮廓、啼声与名称。一个语言双关就这样参与塑造了持久的国家形象，并被各个时代按自身需要重新使用。"},{"title":"Du clocher au terrain de sport","fr":"Le coq placé au sommet d’un clocher sert souvent de girouette. Sa position élevée lui permet d’indiquer la direction du vent, tandis que l’animal qui annonce le jour peut symboliser la vigilance. Dans le sport, le signe change de contexte : brodé sur un maillot, il rassemble joueurs et supporters autour d’une identité immédiatement visible. Les fédérations françaises l’emploient avec des styles graphiques différents, du dessin réaliste au logo très simplifié. Lors d’une victoire, le « cocorico » exprime une fierté joyeuse ; prononcé avec ironie, il critique une satisfaction nationale excessive. Le même mot peut donc célébrer et se moquer. Cette ambiguïté correspond bien à la place du coq, à la fois noble emblème et animal de basse-cour.","zhSentences":["钟楼顶端的雄鸡常常是风向标。","它位于高处，可以指示风向；而这种宣告天明的动物也象征警觉。","在体育中，符号进入另一种语境：绣在球衣上，它用一眼可见的身份把运动员和支持者团结起来。","法国各体育协会以不同图形风格使用雄鸡，从写实图案到高度简化的标志。","胜利时，“cocorico”表达喜悦的自豪；带讽刺语气时，它又批评过度的民族自满。","同一个词因此既能庆祝，也能嘲讽。","这种双重性很符合雄鸡的位置：它既是高贵象征，也是农家院里的动物。"],"zh":"钟楼顶端的雄鸡常常是风向标。它位于高处，可以指示风向；而这种宣告天明的动物也象征警觉。在体育中，符号进入另一种语境：绣在球衣上，它用一眼可见的身份把运动员和支持者团结起来。法国各体育协会以不同图形风格使用雄鸡，从写实图案到高度简化的标志。胜利时，“cocorico”表达喜悦的自豪；带讽刺语气时，它又批评过度的民族自满。同一个词因此既能庆祝，也能嘲讽。这种双重性很符合雄鸡的位置：它既是高贵象征，也是农家院里的动物。"},{"title":"Les symboles ne disent jamais tout","fr":"Une nation utilise plusieurs symboles parce qu’aucun ne peut résumer toute sa population. Le drapeau tricolore, Marianne, la devise républicaine, la Marseillaise et le coq n’insistent pas sur les mêmes valeurs. Le coq évoque volontiers le courage, le réveil et la combativité, mais il peut aussi suggérer la vanité ou la domination masculine. Les publicités, les caricatures et les supporters jouent avec ces significations contradictoires. Observer le contexte est donc essentiel : qui montre le coq, à quel public et dans quel but ? Un emblème sportif n’a pas exactement le même sens qu’une sculpture sur un monument de guerre. Apprendre à lire ces différences aide à dépasser l’idée d’un caractère national fixe et à comprendre comment les images sont continuellement négociées.","zhSentences":["一个国家会使用多个象征，因为没有任何一个能够概括全部人口。","三色旗、玛丽安娜、共和国格言、《马赛曲》和雄鸡强调的价值并不相同。","雄鸡常让人想到勇气、觉醒和战斗精神，也可能暗示虚荣或男性支配。","广告、漫画和球迷会利用这些互相矛盾的含义。","因此观察语境至关重要：是谁展示雄鸡，面向什么人，又为了什么目的？","体育标志与战争纪念碑上的雕塑含义并不完全相同。","学会阅读这些差异，有助于超越固定“民族性格”的想法，并理解图像如何不断被重新协商。"],"zh":"一个国家会使用多个象征，因为没有任何一个能够概括全部人口。三色旗、玛丽安娜、共和国格言、《马赛曲》和雄鸡强调的价值并不相同。雄鸡常让人想到勇气、觉醒和战斗精神，也可能暗示虚荣或男性支配。广告、漫画和球迷会利用这些互相矛盾的含义。因此观察语境至关重要：是谁展示雄鸡，面向什么人，又为了什么目的？体育标志与战争纪念碑上的雕塑含义并不完全相同。学会阅读这些差异，有助于超越固定“民族性格”的想法，并理解图像如何不断被重新协商。"}],"hasAudio":true,"audioPack":{"chunks":["audio-packs/coq/01.bin"],"segments":[{"start":0,"end":9.216},{"start":9.216,"end":19.872},{"start":19.872,"end":29.256},{"start":29.256,"end":37.152},{"start":37.152,"end":41.688},{"start":41.688,"end":48.576},{"start":48.576,"end":55.8},{"start":55.8,"end":65.376}]}},{"id":"charles-de-gaulle","title":"Charles de Gaulle","chineseTitle":"夏尔·戴高乐","level":"B2","topic":"history","summary":"从自由法国到第五共和国，戴高乐深刻重塑了现代法国。","groups":[["La place essentielle qu’occupe le général de Gaulle dans l’imaginaire national français s’explique par le rôle qu’il a joué au cours de la Seconde Guerre mondiale, de 1939 à 1945.","Depuis Londres, où il appelait les Français à résister à l’occupation nazie dès le 18 juin 1940, jusqu’au moment où il descendait l’avenue des Champs-Élysées à la libération de Paris le 26 août 1944, de Gaulle a incarné la France libre et résistante contre l’ennemi et l’envahisseur."],["En 1958, de Gaulle devient le premier président de la Ve République.","La nouvelle Constitution, réservant au président un pouvoir sans précédent sur les affaires de la nation, fournit à de Gaulle l’opportunité de tester, pendant une décennie, son projet pour la France : une nation forte, unie, indépendante, influente, sûre de sa tradition républicaine et profondément européenne.","Cet idéal national du général est ainsi devenu le gaullisme et ses valeurs sont aujourd’hui encore au cœur de la politique de ses successeurs."],["Un an après les événements de Mai 1968, qui ont fortement secoué le pays, les Français ont finalement désapprouvé le général à l’occasion d’un référendum, le forçant à démissionner de la présidence en avril 1969.","À 79 ans, le héros de la guerre se retirait donc enfin de la vie politique pour écrire ses mémoires.","Il meurt en novembre 1970."]],"highlights":["s’explique par","au cours de","a incarné","sans précédent","au cœur de","à l’occasion d’un","démissionner de","se retirait donc enfin de"],"sentenceTranslations":["戴高乐将军在法国民族想象中占据核心位置，这**可以由**他**在1939至1945年第二次世界大战期间**发挥的作用来解释。","从1940年6月18日起在伦敦号召法国人抵抗纳粹占领，到1944年8月26日巴黎解放时走下香榭丽舍大街，戴高乐一直**体现着**反抗敌人与入侵者的自由法国。","1958年，戴高乐成为第五共和国首任总统。","新宪法赋予总统对国家事务**前所未有的**权力，也让戴高乐有机会在十年间实践其法国计划：一个强大、团结、独立、有影响力、确信共和国传统并深具欧洲意识的国家。","将军的这一国家理想由此成为戴高乐主义，其价值至今仍处于继任者政治的**核心**。","五月风暴严重震动国家一年后，法国人最终**通过**一次全民公投否定将军，迫使他于1969年4月**辞去**总统职位。","79岁时，这位战争英雄终于**退出**政治生活，开始撰写回忆录。","他于1970年11月去世。"],"culture":[{"title":"Le 18 Juin : un appel devenu fondateur","fr":"Le 18 juin 1940, de Gaulle parle depuis Londres à la radio britannique et refuse l’idée que la défaite militaire mette fin au combat. Peu de Français entendent directement cette première intervention, mais d’autres messages suivent et le texte acquiert après la guerre une immense valeur symbolique. Il représente le choix de poursuivre la lutte aux côtés des Alliés et devient l’un des récits fondateurs de la France libre. Cette mémoire ne doit pas effacer la diversité des résistances, intérieures et extérieures, ni les parcours parfois tardifs ou contradictoires. Elle explique cependant pourquoi la voix, la silhouette et le nom du général restent associés au refus de la capitulation. Commémorer l’appel, c’est donc rappeler un acte politique autant qu’un moment radiophonique.","zhSentences":["1940年6月18日，戴高乐从伦敦通过英国广播电台讲话，拒绝接受军事失败就意味着战斗结束。","真正直接听到第一次讲话的法国人并不多，但后来还有其他广播，这段文字在战后获得巨大象征价值。","它代表继续与盟军并肩作战的选择，并成为自由法国的奠基叙事之一。","这种记忆不应抹去国内外抵抗运动的多样性，也不能忽视其中有些迟来或矛盾的经历。","但它确实解释了为什么将军的声音、轮廓和名字至今仍同拒绝投降相联系。","纪念“六月十八日号召”，既是在回忆一次广播，也是在回忆一个政治行动。"],"zh":"1940年6月18日，戴高乐从伦敦通过英国广播电台讲话，拒绝接受军事失败就意味着战斗结束。真正直接听到第一次讲话的法国人并不多，但后来还有其他广播，这段文字在战后获得巨大象征价值。它代表继续与盟军并肩作战的选择，并成为自由法国的奠基叙事之一。这种记忆不应抹去国内外抵抗运动的多样性，也不能忽视其中有些迟来或矛盾的经历。但它确实解释了为什么将军的声音、轮廓和名字至今仍同拒绝投降相联系。纪念“六月十八日号召”，既是在回忆一次广播，也是在回忆一个政治行动。"},{"title":"Pourquoi une nouvelle République en 1958 ?","fr":"La Quatrième République traverse une grave crise en 1958, notamment autour de la guerre d’Algérie et de l’instabilité gouvernementale. De Gaulle revient au pouvoir et une nouvelle Constitution est adoptée. Elle renforce l’exécutif, organise les rapports entre le président, le gouvernement et le Parlement, et fonde la Cinquième République. Depuis 1962, le président est élu au suffrage universel direct, ce qui lui donne une forte légitimité politique. Le régime n’est pourtant pas un pouvoir présidentiel sans limites : le gouvernement reste responsable devant l’Assemblée nationale, le Parlement vote les lois et le Conseil constitutionnel contrôle leur conformité. Les périodes de cohabitation ont d’ailleurs montré qu’un président peut devoir partager la direction politique avec une majorité parlementaire opposée.","zhSentences":["第四共和国在1958年经历严重危机，尤其受到阿尔及利亚战争与政府不稳定的影响。","戴高乐重新执政，新宪法随后通过。","它加强行政权，规定总统、政府与议会的关系，并建立第五共和国。","自1962年起，总统由直接普选产生，因此拥有很强的政治正当性。","但这一制度并非不受限制的总统权力：政府仍须对国民议会负责，议会表决法律，宪法委员会审查其合宪性。","历次“左右共治”也表明，总统可能必须与立场相反的议会多数分享政治领导。"],"zh":"第四共和国在1958年经历严重危机，尤其受到阿尔及利亚战争与政府不稳定的影响。戴高乐重新执政，新宪法随后通过。它加强行政权，规定总统、政府与议会的关系，并建立第五共和国。自1962年起，总统由直接普选产生，因此拥有很强的政治正当性。但这一制度并非不受限制的总统权力：政府仍须对国民议会负责，议会表决法律，宪法委员会审查其合宪性。历次“左右共治”也表明，总统可能必须与立场相反的议会多数分享政治领导。"},{"title":"Le gaullisme, une famille plurielle","fr":"Le mot gaullisme désigne à la fois les idées du général, un style de pouvoir et plusieurs mouvements politiques qui se sont réclamés de lui. On y associe souvent l’indépendance nationale, un État capable d’agir, l’élection directe du président et une certaine ambition internationale. Mais les héritiers ne sont pas toujours d’accord sur l’économie, l’Europe ou les alliances. De Gaulle lui-même défend une coopération européenne entre États tout en refusant qu’une autorité supranationale efface la souveraineté française. Selon les périodes, des responsables très différents ont donc invoqué son héritage. Employer le mot avec précision demande de dire de quel aspect on parle. Comme beaucoup de traditions politiques, le gaullisme n’est pas une doctrine immobile ; c’est un héritage discuté, sélectionné et réinterprété.","zhSentences":["“戴高乐主义”既指将军的思想，也指一种执政风格和多个自称继承他的政治运动。","人们常把它同国家独立、有行动能力的国家机器、总统直选和国际抱负联系起来。","但继承者在经济、欧洲或联盟问题上并不总是一致。","戴高乐本人支持国家之间的欧洲合作，同时拒绝让超国家权威抹去法国主权。","因此不同时期立场差异很大的政治人物都曾援引他的遗产。","准确使用这个词，需要说明所指的是哪个方面。","同许多政治传统一样，戴高乐主义不是静止教条，而是一份不断被讨论、选择和重新解释的遗产。"],"zh":"“戴高乐主义”既指将军的思想，也指一种执政风格和多个自称继承他的政治运动。人们常把它同国家独立、有行动能力的国家机器、总统直选和国际抱负联系起来。但继承者在经济、欧洲或联盟问题上并不总是一致。戴高乐本人支持国家之间的欧洲合作，同时拒绝让超国家权威抹去法国主权。因此不同时期立场差异很大的政治人物都曾援引他的遗产。准确使用这个词，需要说明所指的是哪个方面。同许多政治传统一样，戴高乐主义不是静止教条，而是一份不断被讨论、选择和重新解释的遗产。"}],"hasAudio":true,"audioPack":{"chunks":["audio-packs/charles-de-gaulle/01.bin"],"segments":[{"start":0,"end":9.48},{"start":9.48,"end":24.408},{"start":24.408,"end":29.304},{"start":29.304,"end":46.368},{"start":46.368,"end":53.04},{"start":53.04,"end":65.16},{"start":65.16,"end":70.944},{"start":70.944,"end":73.752}]}},{"id":"jeanne-darc","title":"Jeanne d’Arc","chineseTitle":"圣女贞德","level":"A2","topic":"history","summary":"一个农家少女如何成为战争英雄、圣人和国家记忆。","groups":[["Cette jeune fille née d’une famille de paysans de l’est de la France est une héroïne nationale.","Son épopée extraordinaire de 1429 à 1431 a permis au pays de retrouver son indépendance et son unité grâce à ses campagnes militaires victorieuses contre les ducs de Bourgogne et leurs alliés, les Anglais."],["À l’âge de treize ans, Jeanne entend des voix célestes qui lui demandent de libérer le royaume occupé par les Anglais et d’installer le dauphin Charles VII sur le trône de France.","Trois ans plus tard, la jeune fille rassemble une armée de soldats enthousiastes, libère la ville d’Orléans alors aux mains des ennemis et conduit finalement le dauphin à son sacre dans la cathédrale de Reims.","Après d’autres batailles, Jeanne est capturée près de Paris par les Bourguignons en juillet 1430.","La jeune fille est emprisonnée puis condamnée pour hérésie.","Elle est brûlée vive sur une place de Rouen en mai 1431."],["Jeanne d’Arc, appelée aussi la pucelle d’Orléans, représente la victoire de la sincérité et de la foi contre la violence et l’injustice.","À une période critique de l’histoire du pays, Jeanne la charismatique a redonné l’espoir à son peuple.","Sa statue est souvent présente dans les églises de France ou sur les places des villes et villages."]],"highlights":["a permis au","grâce à","À l’âge de","Trois ans plus tard","aux mains des","condamnée pour","a redonné l’espoir"],"sentenceTranslations":["这位出生于法国东部农民家庭的少女，是一位民族英雄。","1429至1431年的非凡传奇，**让国家得以**重新获得独立与统一，这**得益于**她对勃艮第公爵及其英格兰盟友的胜利军事行动。","**十三岁时**，贞德听到天上的声音，要求她解放被英格兰人占领的王国，并让王太子查理七世登上法国王位。","**三年后**，少女召集起一支热情的军队，解放当时**掌握在**敌人手中的奥尔良，最终带领王太子到兰斯大教堂加冕。","又经历几场战斗后，贞德于1430年7月在巴黎附近被勃艮第人俘虏。","少女先被监禁，随后**因异端罪被判刑**。","1431年5月，她在鲁昂的一处广场上被活活烧死。","圣女贞德又被称为“奥尔良少女”，代表真诚与信仰战胜暴力和不公。","在国家历史的危急时期，富有感召力的贞德为人民**重新带来希望**。","法国教堂以及城镇和村庄的广场上经常能看到她的雕像。"],"culture":[{"title":"La guerre de Cent Ans en quelques repères","fr":"La guerre de Cent Ans n’est pas une guerre continue de cent années exactement. Elle désigne une longue série de conflits entre les royaumes de France et d’Angleterre, du quatorzième au quinzième siècle, avec des trêves et des changements d’alliance. Les souverains anglais revendiquent la couronne de France, tandis que de grands princes français, notamment les Bourguignons, poursuivent leurs propres intérêts. Quand Jeanne d’Arc apparaît, le royaume est divisé et le pouvoir de Charles VII reste fragile. La levée du siège d’Orléans puis le sacre à Reims ont une importance militaire et symbolique. Ils ne terminent pas immédiatement la guerre, mais ils renforcent la légitimité du roi et redonnent confiance à son camp.","zhSentences":["百年战争并不是一场恰好连续一百年的战争。","它指十四至十五世纪法兰西与英格兰王国之间的一长串冲突，其中有停战，也有联盟变化。","英格兰君主声索法国王冠，勃艮第人等法国大领主则追求自身利益。","贞德出现时，王国分裂，查理七世的权力仍然脆弱。","解除奥尔良之围并在兰斯加冕，既有军事意义，也有象征意义。","它们没有立刻结束战争，却增强了国王的正当性，也让支持者重拾信心。"],"zh":"百年战争并不是一场恰好连续一百年的战争。它指十四至十五世纪法兰西与英格兰王国之间的一长串冲突，其中有停战，也有联盟变化。英格兰君主声索法国王冠，勃艮第人等法国大领主则追求自身利益。贞德出现时，王国分裂，查理七世的权力仍然脆弱。解除奥尔良之围并在兰斯加冕，既有军事意义，也有象征意义。它们没有立刻结束战争，却增强了国王的正当性，也让支持者重拾信心。"},{"title":"Du procès à la réhabilitation","fr":"Jeanne est jugée à Rouen par un tribunal ecclésiastique dans un contexte profondément politique. Ses voix, son refus de se soumettre et le fait qu’elle porte des vêtements masculins sont discutés pendant les interrogatoires. Condamnée, elle est exécutée en 1431. Environ vingt-cinq ans plus tard, un nouveau procès annule la condamnation et la réhabilite. Plusieurs siècles passent encore avant qu’elle soit canonisée par l’Église catholique, en 1920. Ces étapes montrent que son image n’a jamais été fixe : prisonnière et hérétique pour ses juges, innocente réhabilitée, sainte, héroïne nationale ou symbole politique. Pour comprendre Jeanne, il faut donc distinguer la jeune femme historique, les documents des procès et les usages ultérieurs de sa mémoire.","zhSentences":["贞德在鲁昂由宗教法庭审判，但审判背景具有强烈政治性。","审讯中，人们讨论她听到的声音、拒绝服从以及穿男性服装等问题。","她被判罪并于1431年处死。","大约二十五年后，新的审判撤销原判，为她平反。","又过了几个世纪，天主教会才在1920年将她封圣。","这些阶段说明她的形象从未固定：在审判者眼中是囚犯与异端，后来是获平反的无辜者、圣人、民族英雄或政治象征。","理解贞德，需要区分历史上的年轻女性、审判文献与后世对其记忆的利用。"],"zh":"贞德在鲁昂由宗教法庭审判，但审判背景具有强烈政治性。审讯中，人们讨论她听到的声音、拒绝服从以及穿男性服装等问题。她被判罪并于1431年处死。大约二十五年后，新的审判撤销原判，为她平反。又过了几个世纪，天主教会才在1920年将她封圣。这些阶段说明她的形象从未固定：在审判者眼中是囚犯与异端，后来是获平反的无辜者、圣人、民族英雄或政治象征。理解贞德，需要区分历史上的年轻女性、审判文献与后世对其记忆的利用。"},{"title":"Une héroïne revendiquée par des camps opposés","fr":"Depuis le dix-neuvième siècle, des courants politiques très différents se réclament de Jeanne d’Arc. Certains mettent en avant sa foi catholique, d’autres son origine populaire, sa résistance à l’étranger ou sa fidélité au roi. La République elle-même peut célébrer son courage tout en restant laïque. Des fêtes, des statues, des films et des manuels scolaires sélectionnent chacun une partie de son histoire. Cette diversité explique pourquoi son nom apparaît encore dans les débats publics. Elle invite aussi à la prudence : utiliser un personnage comme symbole ne signifie pas raconter toute sa vie. Une lecture critique demande qui parle, quelles qualités sont choisies et quels éléments sont laissés de côté. Jeanne reste ainsi une figure historique, mais aussi un miroir des conflits de mémoire français.","zhSentences":["十九世纪以来，立场差异很大的政治力量都曾声称继承贞德。","有人强调她的天主教信仰，有人强调平民出身、抵抗外敌或忠于国王。","共和国本身也可以在保持世俗原则的同时歌颂她的勇气。","节日、雕像、电影和教科书各自选择她历史的一部分。","这种多样性解释了为什么她的名字至今仍出现在公共争论中。","它也要求我们谨慎：把人物用作象征，并不等于讲述其完整人生。","批判性阅读要追问是谁在说、选择了哪些品质、又略去了什么。","贞德因此既是历史人物，也是法国记忆冲突的一面镜子。"],"zh":"十九世纪以来，立场差异很大的政治力量都曾声称继承贞德。有人强调她的天主教信仰，有人强调平民出身、抵抗外敌或忠于国王。共和国本身也可以在保持世俗原则的同时歌颂她的勇气。节日、雕像、电影和教科书各自选择她历史的一部分。这种多样性解释了为什么她的名字至今仍出现在公共争论中。它也要求我们谨慎：把人物用作象征，并不等于讲述其完整人生。批判性阅读要追问是谁在说、选择了哪些品质、又略去了什么。贞德因此既是历史人物，也是法国记忆冲突的一面镜子。"}],"hasAudio":true,"audioPack":{"chunks":["audio-packs/jeanne-darc/01.bin"],"segments":[{"start":0,"end":4.56},{"start":4.56,"end":15.888},{"start":15.888,"end":24.024},{"start":24.024,"end":33.696},{"start":33.696,"end":39.336},{"start":39.336,"end":42.504},{"start":42.504,"end":46.224},{"start":46.224,"end":53.712},{"start":53.712,"end":59.112},{"start":59.112,"end":63.384}]}},{"id":"legion-honneur","title":"Légion d’honneur","chineseTitle":"法国荣誉军团勋章","level":"B1","topic":"history","summary":"共和国最高荣誉如何表彰军事功绩与公共贡献。","groups":[["La plus haute des distinctions françaises a été créée en 1802 par le Premier consul Bonaparte, futur empereur Napoléon Ier.","Pour lui, la Légion d’honneur, parfois appelée la « croix des braves », devait « récompenser les militaires mais aussi les services et vertus civils ».","Cette récompense, dont la devise est « Honneur et Patrie », est décernée par le président de la République."],["Il existe trois grades et deux dignités dans la hiérarchie de cette distinction : Chevalier, Officier, Commandeur, puis Grand Officier et Grand’Croix.","Parmi les récipiendaires de la plus haute distinction, très rarement attribuée, figurent Louis Pasteur, Gustave Eiffel, Claude Lévi-Strauss et l’abbé Pierre.","Selon un décret du général de Gaulle, le nombre des « légionnaires vivants » de tous grades, français ou non français, ne peut pas dépasser 125 000.","Les deux tiers de ces légionnaires sont des militaires, le reste est composé de civils."],["Les femmes constituent actuellement 10 % seulement du corps de la Légion d’honneur.","Toutefois, le nombre de femmes ayant reçu cette distinction est en forte augmentation depuis ces vingt dernières années.","Certains nominés notoires ont choisi de ne pas accepter cet honneur, comme George Sand, Guy de Maupassant, Pierre et Marie Curie, Jean-Paul Sartre, Simone de Beauvoir, Albert Camus, Catherine Deneuve, Brigitte Bardot."]],"highlights":["a été créée en 1802 par","est décernée par","Il existe","ne peut pas dépasser","est composé de","Toutefois","ont choisi de"],"sentenceTranslations":["法国最高等级的勋章于1802年**由第一执政波拿巴——后来的拿破仑一世皇帝——创立**。","对他而言，荣誉军团勋章有时被称为“勇士十字”，应当“奖励军人，也奖励公民服务与美德”。","这项以“荣誉与祖国”为格言的荣誉，**由共和国总统授予**。","这一荣誉的等级体系**包括**三个级别与两个尊位：骑士、军官、司令，随后是大军官和大十字。","极少授予的最高级别获得者包括路易·巴斯德、古斯塔夫·埃菲尔、克洛德·列维-斯特劳斯和皮埃尔神父。","根据戴高乐将军的一项法令，所有级别、法国籍或非法国籍的“在世荣誉军团成员”人数**不得超过**125000人。","这些成员中三分之二是军人，其余**由平民组成**。","女性当时仅占荣誉军团成员总数的10%。","**不过**，此前二十年间获得这一荣誉的女性人数大幅增加。","一些知名被提名者**选择不接受**这项荣誉，例如乔治·桑、居伊·德·莫泊桑、皮埃尔与玛丽·居里、让-保罗·萨特、西蒙娜·德·波伏娃、阿尔贝·加缪、凯瑟琳·德纳芙和碧姬·芭铎。"],"culture":[{"title":"Une distinction née après la Révolution","fr":"La Révolution française avait supprimé les anciens ordres liés à la monarchie et aux privilèges de naissance. Bonaparte crée la Légion d’honneur pour récompenser des services individuels tout en organisant une nouvelle élite du mérite. La distinction concerne les militaires, mais aussi les scientifiques, artistes, enseignants, entrepreneurs, fonctionnaires ou bénévoles. Elle n’accorde pas un titre de noblesse et ne se transmet pas aux enfants. Le président de la République est le grand maître de l’ordre, tandis qu’une administration examine les propositions et prépare les nominations. Recevoir la décoration suppose donc une procédure, des critères et une cérémonie. Ce système traduit une tension durable : la République proclame l’égalité, mais elle choisit aussi de distinguer publiquement certaines contributions exceptionnelles.","zhSentences":["法国大革命曾废除与君主制和出生特权相连的旧勋章体系。","波拿巴创立荣誉军团，以奖励个人贡献，同时组织一套以功绩为基础的新精英制度。","这一荣誉面向军人，也面向科学家、艺术家、教师、企业家、公务员或志愿者。","它不授予贵族头衔，也不能传给子女。","共和国总统是勋章体系的最高主持者，行政机构则审查提议并准备任命。","获得勋章因此需要程序、标准与仪式。","这一制度体现出持久张力：共和国宣告平等，同时又选择公开表彰某些杰出贡献。"],"zh":"法国大革命曾废除与君主制和出生特权相连的旧勋章体系。波拿巴创立荣誉军团，以奖励个人贡献，同时组织一套以功绩为基础的新精英制度。这一荣誉面向军人，也面向科学家、艺术家、教师、企业家、公务员或志愿者。它不授予贵族头衔，也不能传给子女。共和国总统是勋章体系的最高主持者，行政机构则审查提议并准备任命。获得勋章因此需要程序、标准与仪式。这一制度体现出持久张力：共和国宣告平等，同时又选择公开表彰某些杰出贡献。"},{"title":"Grades, promotions et cérémonial","fr":"On entre normalement dans l’ordre au grade de chevalier. Une promotion vers officier ou commandeur demande de nouveaux services et un certain temps, tandis que les dignités de grand officier et de grand-croix restent exceptionnelles. La décoration change selon le rang, mais elle conserve l’étoile blanche, la couronne végétale et le ruban rouge facilement reconnaissable. Lors d’une remise, une personne habilitée prononce une formule officielle et fixe l’insigne sur le vêtement du récipiendaire. Être nommé ne suffit pas toujours : la réception marque l’entrée effective dans l’ordre. Les listes publiées à certaines dates donnent une visibilité nationale aux parcours récompensés. Derrière le mot unique de « médaille », il existe donc une hiérarchie, un vocabulaire et des gestes précis.","zhSentences":["通常人们先以骑士级进入荣誉军团。","晋升军官或司令需要新的贡献和一定年限，大军官与大十字尊位则非常少见。","装饰会随级别变化，但都保留容易辨认的白色星章、植物冠饰和红色绶带。","授勋时，有资格的人员会说出正式用语，并把徽章别在受勋者服装上。","仅被任命有时还不够：正式授勋才标志着真正进入该体系。","特定日期公布的名单，会让获奖者的经历得到全国关注。","因此，一个简单的“勋章”背后其实有等级、专门词汇和明确仪式。"],"zh":"通常人们先以骑士级进入荣誉军团。晋升军官或司令需要新的贡献和一定年限，大军官与大十字尊位则非常少见。装饰会随级别变化，但都保留容易辨认的白色星章、植物冠饰和红色绶带。授勋时，有资格的人员会说出正式用语，并把徽章别在受勋者服装上。仅被任命有时还不够：正式授勋才标志着真正进入该体系。特定日期公布的名单，会让获奖者的经历得到全国关注。因此，一个简单的“勋章”背后其实有等级、专门词汇和明确仪式。"},{"title":"Lire avec la date du livre","fr":"Les chiffres donnés dans le texte sur le nombre de membres, la part des militaires ou celle des femmes reflètent l’époque de publication du manuel. Les règles, les effectifs et la politique de parité peuvent évoluer par décret et par pratique. Il serait donc trompeur de présenter automatiquement ces pourcentages comme des données actuelles. Le principe général reste valable : l’ordre est contingenté, les nominations sont encadrées et les pouvoirs publics ont cherché à mieux représenter les femmes et la diversité des formes d’engagement. Pour une statistique récente, il faut consulter le site officiel de la Grande Chancellerie. Cette précaution est utile pour toute lecture documentaire : une institution peut être ancienne, mais les nombres qui la décrivent ont toujours une date.","zhSentences":["正文关于成员数量、军人比例和女性比例的数字，反映的是教材出版时的情况。","规则、人数与性别平衡政策都可能通过法令和实践发生变化。","因此，不能自动把这些百分比当作当前数据。","总体原则仍然成立：勋章名额受到限制，任命受程序规范，公共部门也一直努力更好地体现女性与不同形式的社会贡献。","要获得近期统计，应查阅荣誉军团大法官署的官方网站。","这种谨慎适用于所有资料阅读：一项制度可能很古老，但描述它的数字永远带有日期。"],"zh":"正文关于成员数量、军人比例和女性比例的数字，反映的是教材出版时的情况。规则、人数与性别平衡政策都可能通过法令和实践发生变化。因此，不能自动把这些百分比当作当前数据。总体原则仍然成立：勋章名额受到限制，任命受程序规范，公共部门也一直努力更好地体现女性与不同形式的社会贡献。要获得近期统计，应查阅荣誉军团大法官署的官方网站。这种谨慎适用于所有资料阅读：一项制度可能很古老，但描述它的数字永远带有日期。"}],"hasAudio":true,"audioPack":{"chunks":["audio-packs/legion-honneur/01.bin"],"segments":[{"start":0,"end":6.864},{"start":6.864,"end":15.192},{"start":15.192,"end":21.408},{"start":21.408,"end":29.856},{"start":29.856,"end":38.496},{"start":38.496,"end":47.256},{"start":47.256,"end":51.792},{"start":51.792,"end":55.968},{"start":55.968,"end":61.8},{"start":61.8,"end":74.424}]}},{"id":"mai-68","title":"Mai 68","chineseTitle":"五月风暴","level":"B1","topic":"history","summary":"学生抗议、工人罢工与社会想象共同震动了1968年的法国。","groups":[["Les événements qui ont eu lieu en mai 1968 sont à la fois le résultat d’une crise en gestation et le point de départ de nombreux changements dans la société française.","La révolte de 68 a été le fait d’une jeunesse lassée des valeurs consuméristes de la France conservatrice de l’après-guerre, menée par le général de Gaulle."],["Mai 68 a été marqué par les manifestations massives des étudiants à Paris et dans toutes les villes de France, les grèves générales des employés et des ouvriers solidaires, les violents affrontements avec la police, la paralysie économique du pays.","La France était soudainement confrontée à un mouvement radical de sa jeunesse et des travailleurs réclamant une société plus juste, plus libre, plus centrée sur la dimension humaine de ses citoyens.","Un célèbre graffiti sur un mur de l’Université Censier à Paris résume l’esprit de 68 : « L’émancipation de l’homme sera totale ou ne sera pas »."],["Une solution politique a permis de sortir de la crise : le parlement a été dissous fin mai et les élections du mois suivant ont assuré une majorité encore plus solide aux députés conservateurs.","Le mouvement s’est ainsi éteint, mais les idées de Mai 68 ont survécu.","De nombreuses réformes qui ont suivi ont été inspirées par les revendications des manifestants.","Beaucoup de responsables politiques et économiques aujourd’hui sont d’anciens « soixante-huitards »."]],"highlights":["à la fois","le point de départ","lassée des","a été marqué par","était soudainement confrontée à","a permis de","sortir de la crise","ont été inspirées par"],"sentenceTranslations":["1968年5月发生的事件**既是一场酝酿中危机的结果，也是**法国社会众多变化的**起点**。","六八反抗来自一代**厌倦了**戴高乐领导下战后保守法国消费主义价值观的青年。","五月风暴**以巴黎及法国各城市的大规模学生示威、雇员与工人的团结总罢工、同警方的暴力冲突以及国家经济瘫痪为标志**。","法国突然**面对**一场由青年和劳动者发起的激进运动，他们要求社会更加公正、自由，更关注公民的人性层面。","巴黎桑西耶大学墙上的一句著名涂鸦概括了六八精神：“人的解放要么是彻底的，要么就不存在。”","一个政治方案**使法国得以****走出危机**：议会在5月底解散，次月选举让保守派议员获得更稳固的多数。","运动由此平息，但五月风暴的思想延续下来。","随后许多改革都**受到示威者诉求的启发**。","文中写作当时的不少政治与经济负责人，都是昔日的“六八一代”。"],"culture":[{"title":"D’une crise étudiante à une grève générale","fr":"Le mouvement commence dans les universités, où les étudiants contestent les règles, les conditions d’étude et une société jugée autoritaire. Après la fermeture de la Sorbonne et des affrontements avec la police, les manifestations prennent de l’ampleur. Les syndicats ouvriers appellent à la grève et, en quelques semaines, des millions de salariés cessent le travail. Usines, transports, bureaux et services sont touchés. Les revendications ne sont pas toutes identiques : les étudiants parlent de liberté et de rapports sociaux, tandis que les travailleurs demandent notamment des salaires plus élevés et de meilleures conditions. Mai 68 ne forme donc pas un bloc unique. Sa force vient justement de la rencontre provisoire entre plusieurs mécontentements, dans un pays presque paralysé.","zhSentences":["运动从大学开始，学生反对规章、学习条件以及他们认为过于权威的社会。","索邦大学关闭并发生与警方的冲突后，示威迅速扩大。","工会号召罢工，几周内数百万劳动者停止工作。","工厂、交通、办公室和公共服务都受到影响。","各方诉求并不完全相同：学生谈自由与社会关系，工人则尤其要求加薪和改善劳动条件。","因此，五月风暴并不是一个完全统一的整体。","它的力量恰恰来自多种不满在一个几乎瘫痪的国家中暂时相遇。"],"zh":"运动从大学开始，学生反对规章、学习条件以及他们认为过于权威的社会。索邦大学关闭并发生与警方的冲突后，示威迅速扩大。工会号召罢工，几周内数百万劳动者停止工作。工厂、交通、办公室和公共服务都受到影响。各方诉求并不完全相同：学生谈自由与社会关系，工人则尤其要求加薪和改善劳动条件。因此，五月风暴并不是一个完全统一的整体。它的力量恰恰来自多种不满在一个几乎瘫痪的国家中暂时相遇。"},{"title":"Des slogans qui veulent changer la vie","fr":"Les murs de Paris se couvrent d’affiches et de formules brèves : elles refusent l’autorité, se moquent de la publicité et invitent à imaginer autrement le travail, l’école ou l’amour. Beaucoup sont créées collectivement dans l’Atelier populaire installé aux Beaux-Arts. Leur style direct, souvent imprimé en peu de couleurs, permet une reproduction rapide. Ces slogans ne donnent pas un programme gouvernemental détaillé ; ils ouvrent un espace de désir, de critique et de provocation. Certaines phrases sont ensuite devenues mythiques et parfois attribuées à tort à Mai 68. Il faut donc vérifier les sources, les lieux et les dates. Mais leur postérité est réelle : elles ont transformé la manière dont une génération associe image, parole et action politique.","zhSentences":["巴黎墙上布满海报和短句：它们拒绝权威，嘲讽广告，并邀请人们重新想象工作、学校或爱情。","很多作品在设于美术学院的“人民工作室”集体创作。","直接、少色的风格方便快速复制。","这些口号没有提出详细的政府纲领，而是打开欲望、批判与挑衅的空间。","后来有些句子被神话，甚至被错误归于五月风暴。","因此需要核对来源、地点和日期。","但其影响真实存在：它们改变了一代人把图像、语言与政治行动联系起来的方式。"],"zh":"巴黎墙上布满海报和短句：它们拒绝权威，嘲讽广告，并邀请人们重新想象工作、学校或爱情。很多作品在设于美术学院的“人民工作室”集体创作。直接、少色的风格方便快速复制。这些口号没有提出详细的政府纲领，而是打开欲望、批判与挑衅的空间。后来有些句子被神话，甚至被错误归于五月风暴。因此需要核对来源、地点和日期。但其影响真实存在：它们改变了一代人把图像、语言与政治行动联系起来的方式。"},{"title":"Un héritage discuté","fr":"Dire que « Mai 68 a tout changé » serait trop simple. Certaines transformations avaient commencé auparavant, et plusieurs évolutions se sont faites lentement. Le mouvement a néanmoins rendu visibles des questions sur l’autorité, les rapports entre générations, la sexualité, la place des femmes, l’éducation et la vie au travail. Il a aussi obtenu des avancées sociales immédiates, notamment lors des négociations de Grenelle, même si tous les grévistes ne les ont pas jugées suffisantes. Pour certains Français, Mai 68 représente une libération nécessaire ; pour d’autres, le début d’un individualisme excessif ou d’une perte de repères. Cette opposition continue d’animer les discours politiques. Étudier l’événement consiste donc moins à choisir une légende qu’à comparer expériences, résultats et mémoires concurrentes.","zhSentences":["说“五月风暴改变了一切”过于简单。","有些变化此前已经开始，另一些则经历了缓慢过程。","不过，运动确实让权威、代际关系、性、女性地位、教育和劳动生活等问题变得可见。","它也带来格勒内勒谈判等即时社会成果，虽然并非所有罢工者都认为这些成果足够。","对一些法国人而言，五月风暴代表必要的解放；对另一些人而言，它开启了过度个人主义或价值失序。","这种对立至今仍活跃在政治话语中。","研究这一事件，与其选择一个传说，不如比较不同经历、结果和彼此竞争的记忆。"],"zh":"说“五月风暴改变了一切”过于简单。有些变化此前已经开始，另一些则经历了缓慢过程。不过，运动确实让权威、代际关系、性、女性地位、教育和劳动生活等问题变得可见。它也带来格勒内勒谈判等即时社会成果，虽然并非所有罢工者都认为这些成果足够。对一些法国人而言，五月风暴代表必要的解放；对另一些人而言，它开启了过度个人主义或价值失序。这种对立至今仍活跃在政治话语中。研究这一事件，与其选择一个传说，不如比较不同经历、结果和彼此竞争的记忆。"}],"hasAudio":true,"audioPack":{"chunks":["audio-packs/mai-68/01.bin"],"segments":[{"start":0,"end":8.112},{"start":8.112,"end":16.104},{"start":16.104,"end":28.536},{"start":28.536,"end":37.944},{"start":37.944,"end":46.272},{"start":46.272,"end":55.608},{"start":55.608,"end":60.288},{"start":60.288,"end":65.088},{"start":65.088,"end":70.656}]}},{"id":"marianne","title":"Marianne","chineseTitle":"玛丽安娜","level":"B1","topic":"history","summary":"自由女神、弗里吉亚帽与市政厅半身像共同构成共和国的面孔。","groups":[["Le buste de Marianne est présent dans toutes les mairies françaises, les écoles, ainsi que dans de nombreux édifices officiels.","Marianne est aussi représentée sur les timbres-poste et, jusqu’à récemment, sur les pièces de monnaie.","Ce personnage symbolise la France, la République et la principale de ses valeurs : la liberté."],["L’origine de Marianne remonte à la Révolution française et plus particulièrement à 1792, lorsque la République a été proclamée.","Marianne porte un bonnet phrygien, comme la plupart des révolutionnaires à cette époque.","Le bonnet phrygien est une référence aux esclaves affranchis sous l’Empire romain, qui portaient ce bonnet pour marquer leur liberté retrouvée.","Au 18e siècle, Marianne était un prénom très fréquent en France, il associe Marie, la mère du Christ, et Anne, la mère de Marie."],["Le tableau d’Eugène Delacroix, La Liberté guidant le peuple, de 1831, représente Marianne combattant avec le peuple parisien pendant les trois journées révolutionnaires de juillet 1830.","Plus récemment, des Françaises célèbres ont servi de modèles au buste de Marianne : les actrices Brigitte Bardot et Catherine Deneuve, la chanteuse Mireille Mathieu, la mannequin de mode et actrice Laetitia Casta."]],"highlights":["ainsi que","remonte à","lorsque","une référence aux","pour marquer","ont servi de modèles"],"sentenceTranslations":["玛丽安娜半身像出现在法国所有市政厅、学校，**以及**许多官方建筑中。","玛丽安娜也出现在邮票上，直到不久前还出现在硬币上。","这个人物象征法国、共和国及其最重要的价值：自由。","玛丽安娜的起源**可以追溯到**法国大革命，尤其是1792年共和国宣布成立**之时**。","玛丽安娜像当时多数革命者一样戴着弗里吉亚帽。","弗里吉亚帽**指向**罗马帝国时期获得自由的奴隶；他们佩戴这种帽子，**以标志**重获自由。","十八世纪，Marianne是法国非常常见的名字，它结合了基督之母Marie与Marie之母Anne。","欧仁·德拉克罗瓦1831年的画作《自由引导人民》，表现玛丽安娜在1830年七月革命的三天中与巴黎人民共同战斗。","近现代，一些著名法国女性曾**成为玛丽安娜半身像的原型**：演员碧姬·芭铎与凯瑟琳·德纳芙、歌手米雷耶·马蒂厄，以及模特兼演员莱蒂西娅·卡斯塔。"],"culture":[{"title":"Une allégorie plutôt qu’une personne","fr":"Marianne n’a pas de biographie unique parce qu’elle est une allégorie, c’est-à-dire une idée représentée sous une forme humaine. Les artistes lui donnent un visage de femme, un bonnet phrygien, parfois une pique, un drapeau ou un sein découvert. Chaque attribut propose une lecture : liberté, révolution, courage, République nourricière ou vigilance citoyenne. Son apparence change selon les régimes et les sensibilités. Elle peut être combative sur une affiche, solennelle dans une mairie ou familière sur un timbre. Cette souplesse explique sa durée. Au lieu d’imposer un portrait définitif de la France, Marianne offre une figure que chaque époque peut redessiner. Lire une image de Marianne demande donc d’observer la posture, les vêtements, les objets et le contexte de diffusion.","zhSentences":["玛丽安娜没有唯一传记，因为她是一种寓意，也就是用人的形象表现一个理念。","艺术家赋予她女性面孔、弗里吉亚帽，有时还有长矛、旗帜或裸露的胸部。","每种属性都提供一种理解：自由、革命、勇气、养育人民的共和国或公民警觉。","她的外观随政体和时代感受而改变。","海报上她可以充满战斗性，市政厅里庄严，邮票上则亲切。","这种灵活性解释了她为何长久存在。","玛丽安娜并不强加一张永恒的法国肖像，而是让每个时代重新绘制。","阅读她的图像，需要观察姿势、服装、物品和传播语境。"],"zh":"玛丽安娜没有唯一传记，因为她是一种寓意，也就是用人的形象表现一个理念。艺术家赋予她女性面孔、弗里吉亚帽，有时还有长矛、旗帜或裸露的胸部。每种属性都提供一种理解：自由、革命、勇气、养育人民的共和国或公民警觉。她的外观随政体和时代感受而改变。海报上她可以充满战斗性，市政厅里庄严，邮票上则亲切。这种灵活性解释了她为何长久存在。玛丽安娜并不强加一张永恒的法国肖像，而是让每个时代重新绘制。阅读她的图像，需要观察姿势、服装、物品和传播语境。"},{"title":"Le bonnet phrygien et la liberté","fr":"Le bonnet rouge est devenu un signe révolutionnaire à la fin du dix-huitième siècle. Les révolutionnaires le rapprochent du bonnet porté dans l’Antiquité par des esclaves affranchis, même si l’histoire exacte des formes est plus complexe. Il rend la liberté immédiatement visible sur une tête humaine. Pendant certaines périodes, les autorités préfèrent une Marianne sans bonnet, jugée plus calme et plus institutionnelle ; dans d’autres, le bonnet souligne l’énergie populaire. Aujourd’hui encore, il apparaît dans le logo de la République française et lors de cérémonies ou de manifestations. Un vêtement très simple peut donc porter une longue mémoire politique. Comme tous les symboles, il change de sens selon celui qui le porte, le lieu où il apparaît et le public qui le regarde.","zhSentences":["红色帽子在十八世纪末成为革命标志。","革命者把它同古代获释奴隶佩戴的帽子联系起来，虽然具体形制的历史更复杂。","它让“自由”在人的头顶变得一眼可见。","某些时期，官方偏好不戴帽、更安静而制度化的玛丽安娜；另一些时期，帽子则突出人民的力量。","今天它仍出现在法兰西共和国标识、典礼或示威中。","一件非常简单的服饰由此承载漫长政治记忆。","像所有象征一样，它的意义取决于佩戴者、出现地点与观看者。"],"zh":"红色帽子在十八世纪末成为革命标志。革命者把它同古代获释奴隶佩戴的帽子联系起来，虽然具体形制的历史更复杂。它让“自由”在人的头顶变得一眼可见。某些时期，官方偏好不戴帽、更安静而制度化的玛丽安娜；另一些时期，帽子则突出人民的力量。今天它仍出现在法兰西共和国标识、典礼或示威中。一件非常简单的服饰由此承载漫长政治记忆。像所有象征一样，它的意义取决于佩戴者、出现地点与观看者。"},{"title":"Des bustes différents dans les mairies","fr":"La présence d’un buste dans la salle du conseil municipal rappelle que la commune agit au nom de la République. Il n’existe pourtant pas un modèle obligatoire unique. Les mairies peuvent choisir des œuvres classiques, contemporaines ou inspirées par des personnalités connues. L’idée de faire élire une célébrité comme modèle a surtout été portée par des associations et des fabricants ; elle ne constitue pas une procédure officielle de l’État. Cette nuance est importante, car elle distingue une tradition médiatique d’une règle républicaine. Certaines communes commandent aujourd’hui des Marianne plus diverses ou utilisent des créations locales. Comparer plusieurs bustes révèle donc autant les goûts d’une époque que l’évolution de la représentation des femmes, de la citoyenneté et de la nation.","zhSentences":["市议会厅中的半身像提醒人们，市镇以共和国名义行事。","但并不存在一个强制统一的造型。","市政厅可以选择古典、当代或受知名人物启发的作品。","推选名人作为原型的做法主要由协会和制造商推动，并不是国家的正式程序。","这一点很重要，因为它区分了媒体传统与共和国规则。","今天有些市镇委托创作更多元的玛丽安娜，或采用本地艺术家的作品。","比较不同半身像，不仅能看出时代审美，也能看见女性、公民身份与国家形象如何变化。"],"zh":
