"市议会厅中的半身像提醒人们，市镇以共和国名义行事。但并不存在一个强制统一的造型。市政厅可以选择古典、当代或受知名人物启发的作品。推选名人作为原型的做法主要由协会和制造商推动，并不是国家的正式程序。这一点很重要，因为它区分了媒体传统与共和国规则。今天有些市镇委托创作更多元的玛丽安娜，或采用本地艺术家的作品。比较不同半身像，不仅能看出时代审美，也能看见女性、公民身份与国家形象如何变化。"}],"hasAudio":true,"audioPack":{"chunks":["audio-packs/marianne/01.bin"],"segments":[{"start":0,"end":6.48},{"start":6.48,"end":11.832},{"start":11.832,"end":17.448},{"start":17.448,"end":25.056},{"start":25.056,"end":29.664},{"start":29.664,"end":36.456},{"start":36.456,"end":44.544},{"start":44.544,"end":55.008},{"start":55.008,"end":65.808}]}},{"id":"marseillaise","title":"Marseillaise","chineseTitle":"马赛曲","level":"B1","topic":"history","summary":"一首革命战争歌曲如何成为法国国歌与共同仪式。","groups":[["Quand l’officier de l’armée révolutionnaire Rouget de Lisle a composé en une nuit d’avril 1792 Le Chant de guerre pour l’armée du Rhin, il ne se doutait pas que son œuvre allait connaître une telle prospérité.","En effet, quelques mois plus tard, les soldats volontaires de Marseille adoptaient ce chant et, en reconnaissance de leur bravoure exemplaire contre l’ennemi, l’œuvre de Rouget de Lisle est renommée La Marseillaise.","Mais c’est seulement en 1879, sous la IIIe République, que ce chant est définitivement déclaré hymne officiel français."],["Chaque enfant en France qui récite pour la première fois le texte de La Marseillaise éprouve une certaine appréhension : il est en effet question dans ce chant de « l’étendard sanglant » de la patrie qui doit repousser de « féroces soldats » venant « égorger nos fils et nos compagnes ».","Les « citoyens » sont ainsi appelés à prendre leurs « armes » et à « marcher » pour « qu’un sang impur abreuve nos sillons »."],["Cette rhétorique guerrière et patriotique ponctuée par une musique militaire constitue le chant sacré d’union que les Français entendent et prononcent avec émotion dans les moments où la Nation est invoquée."]],"highlights":["ne se doutait pas que","quelques mois plus tard","en reconnaissance de","pour la première fois","il est en effet question","sont ainsi appelés à"],"sentenceTranslations":["1792年4月的一个夜晚，革命军军官鲁热·德·利尔创作《莱茵军团战歌》时，**并不知道**自己的作品会获得如此长久的生命。","**几个月后**，马赛志愿兵采用这首歌；**为了表彰**他们抗敌时堪为榜样的英勇，鲁热·德·利尔的作品被改称《马赛曲》。","但直到1879年第三共和国时期，这首歌才被最终宣布为法国官方国歌。","法国孩子**第一次**朗诵《马赛曲》歌词时，往往会有些不安：歌中**谈到**祖国的“血色旗帜”，还要击退前来“割断我们儿女与伴侣喉咙”的“凶残士兵”。","“公民们”因此**被号召**拿起“武器”并“前进”，让“不洁之血灌溉我们的田野”。","这套由军乐强调的战争与爱国话语，构成法国人在召唤国家的时刻带着感情聆听和唱出的神圣团结之歌。"],"culture":[{"title":"Une chanson née dans la guerre","fr":"La Marseillaise est composée au printemps 1792, alors que la France révolutionnaire entre en guerre contre des monarchies européennes. Rouget de Lisle, officier à Strasbourg, écrit un chant destiné à encourager l’armée du Rhin. Des volontaires venus de Marseille le reprennent en marchant vers Paris, ce qui explique son nouveau nom. La chanson appartient donc d’abord à une situation d’urgence militaire et politique. Ses images violentes ne sont pas des métaphores paisibles : elles expriment la peur de l’invasion, la mobilisation des citoyens et la défense de la Révolution. Replacer les paroles dans ce contexte n’oblige pas à les approuver aujourd’hui, mais permet de comprendre leur intensité. Un hymne conserve souvent les mots du moment où une communauté a cru son existence menacée.","zhSentences":["《马赛曲》创作于1792年春，当时革命法国同欧洲君主国开战。","驻斯特拉斯堡军官鲁热·德·利尔写下这首歌，以鼓舞莱茵军团。","来自马赛的志愿兵向巴黎进发时唱起它，因此歌曲获得新名称。","它首先属于军事与政治紧急状态。","其中的暴力图像并非温和比喻，而是表达对入侵的恐惧、公民动员与保卫革命。","把歌词放回这种语境，并不要求今天的人赞同它，却有助于理解其强度。","国歌常会保留共同体认为自身生存受到威胁时的语言。"],"zh":"《马赛曲》创作于1792年春，当时革命法国同欧洲君主国开战。驻斯特拉斯堡军官鲁热·德·利尔写下这首歌，以鼓舞莱茵军团。来自马赛的志愿兵向巴黎进发时唱起它，因此歌曲获得新名称。它首先属于军事与政治紧急状态。其中的暴力图像并非温和比喻，而是表达对入侵的恐惧、公民动员与保卫革命。把歌词放回这种语境，并不要求今天的人赞同它，却有助于理解其强度。国歌常会保留共同体认为自身生存受到威胁时的语言。"},{"title":"De l’interdiction à l’hymne national","fr":"Le statut de la chanson a changé plusieurs fois avec les régimes politiques. Adoptée comme chant national pendant la Révolution, elle est ensuite interdite ou écartée sous l’Empire et certaines monarchies. Elle revient lors des mouvements révolutionnaires du dix-neuvième siècle, puis devient officiellement l’hymne national sous la Troisième République. Cette histoire mouvementée montre qu’un symbole national n’est pas toujours consensuel dès sa naissance. Il peut être combattu, oublié, réutilisé et finalement institutionnalisé. Aujourd’hui, la Constitution mentionne La Marseillaise comme hymne national. On l’entend lors des cérémonies officielles, des commémorations, des rencontres sportives et des moments de deuil collectif. Chaque contexte lui donne une émotion différente, de la solennité à l’enthousiasme.","zhSentences":["这首歌的地位随着政体变化多次改变。","它在革命时期被采用为民族歌曲，后来在帝国和某些君主制时期遭禁或被排除。","十九世纪革命运动中它重新出现，随后在第三共和国时期正式成为国歌。","这段曲折历史说明，国家象征从诞生起并不总能获得共识。","它可能被反对、遗忘、重新使用，最后才制度化。","今天法国宪法明确《马赛曲》是国歌。","官方仪式、纪念活动、体育比赛和集体哀悼时都能听到它。","每种情境都会赋予它不同情绪，从庄严到热烈。"],"zh":"这首歌的地位随着政体变化多次改变。它在革命时期被采用为民族歌曲，后来在帝国和某些君主制时期遭禁或被排除。十九世纪革命运动中它重新出现，随后在第三共和国时期正式成为国歌。这段曲折历史说明，国家象征从诞生起并不总能获得共识。它可能被反对、遗忘、重新使用，最后才制度化。今天法国宪法明确《马赛曲》是国歌。官方仪式、纪念活动、体育比赛和集体哀悼时都能听到它。每种情境都会赋予它不同情绪，从庄严到热烈。"},{"title":"Comment enseigner des paroles violentes ?","fr":"L’école ne présente pas seulement La Marseillaise comme une mélodie à mémoriser. Les enseignants peuvent expliquer le vocabulaire ancien, la guerre de 1792, la citoyenneté révolutionnaire et les débats suscités par certaines expressions. Cette mise à distance aide les élèves à distinguer un document historique d’un appel à la violence actuelle. Des propositions de modification des paroles apparaissent régulièrement, tandis que d’autres personnes défendent le texte au nom de l’histoire. Le débat lui-même est instructif : faut-il conserver exactement un héritage, le réinterpréter ou le transformer ? Chanter ensemble crée une unité sonore, mais les participants peuvent comprendre les mots de façons différentes. L’éducation civique consiste justement à rendre cette pluralité discutable plutôt qu’à faire disparaître les questions.","zhSentences":["学校并不只把《马赛曲》当成需要背诵的旋律。","教师可以解释古老词汇、1792年的战争、革命时期的公民身份，以及某些表达引发的争论。","这种历史距离帮助学生区分历史文献与当下的暴力号召。","修改歌词的建议经常出现，另一些人则以历史为理由维护原文。","争论本身很有教育意义：一份遗产应该原样保留、重新解释，还是加以改造？","共同歌唱能制造声音上的统一，但参与者可以用不同方式理解歌词。","公民教育正是要让这种多元理解可以被讨论，而不是让问题消失。"],"zh":"学校并不只把《马赛曲》当成需要背诵的旋律。教师可以解释古老词汇、1792年的战争、革命时期的公民身份，以及某些表达引发的争论。这种历史距离帮助学生区分历史文献与当下的暴力号召。修改歌词的建议经常出现，另一些人则以历史为理由维护原文。争论本身很有教育意义：一份遗产应该原样保留、重新解释，还是加以改造？共同歌唱能制造声音上的统一，但参与者可以用不同方式理解歌词。公民教育正是要让这种多元理解可以被讨论，而不是让问题消失。"}],"hasAudio":true,"audioPack":{"chunks":["audio-packs/marseillaise/01.bin"],"segments":[{"start":0,"end":10.056},{"start":10.056,"end":20.256},{"start":20.256,"end":27.576},{"start":27.576,"end":42.096},{"start":42.096,"end":49.68},{"start":49.68,"end":58.944}]}},{"id":"napoleon","title":"Napoléon","chineseTitle":"拿破仑","level":"B1","topic":"history","summary":"帝国虽短暂，拿破仑时代的法律、行政与记忆却延续至今。","groups":[["Les Français manquent-ils de constance ?","Ils renversent puis décapitent un roi en 1792 et douze ans plus tard, ils couronnent leur nouvel empereur, plus puissant et plus grand encore que le plus fameux de leurs rois, Louis XIV."],["La Révolution, de 1789 à 1799, a été faite par le peuple, mais le pouvoir reste le privilège de brillants tacticiens, et Napoléon est assurément l’un d’eux.","Né sur la magnifique île de la Corse, le général Bonaparte a remis de l’ordre dans les affaires de la France, sérieusement éprouvée par dix ans d’agitation révolutionnaire.","Il restaure la grandeur et la fierté nationales en bâtissant un vaste empire européen, allant même combattre les Anglais en Égypte.","Un vaste empire mais éphémère : Waterloo, le nom de la gare londonienne où arrivaient jusqu’à récemment les trains Eurostar en provenance de Paris, est synonyme de catastrophe et d’humiliation pour tous les Français."],["Mais de l’ère napoléonienne reste un héritage vital : un Code civil encore en usage aujourd’hui, des structures administratives toujours valides, des grandes écoles qui forment l’élite française, un système monétaire, la Banque de France, la Légion d’honneur, l’église de la Madeleine à Paris, le Pont de pierre à Bordeaux…","Il reste aussi le tombeau de l’empereur aux Invalides et les somptueux tableaux de David au musée du Louvre, célébrant une gloire passée."]],"highlights":["douze ans plus tard","a été faite par","a remis de l’ordre","en bâtissant","est synonyme de","en usage","Il reste"],"sentenceTranslations":["法国人是否缺乏一贯性？","他们在1792年推翻并斩首一位国王，**十二年后**却又为新皇帝加冕；他的权力与伟大甚至超过最著名的国王路易十四。","1789至1799年的大革命**由人民完成**，但权力仍是卓越策略家的特权，拿破仑无疑就是其中之一。","波拿巴将军出生在美丽的科西嘉岛，他为经历十年革命动荡、遭受重创的法国事务**恢复了秩序**。","他**通过建立**庞大的欧洲帝国，恢复国家的伟大与自豪，甚至前往埃及同英国人作战。","帝国庞大却短暂：滑铁卢也是伦敦一座火车站的名称，不久前来自巴黎的欧洲之星列车还抵达那里；对所有法国人来说，它都**意味着**灾难与屈辱。","但拿破仑时代留下了重要遗产：至今仍**在使用的**《民法典》、依然有效的行政结构、培养法国精英的大学校、货币体系、法兰西银行、荣誉军团、巴黎玛德莱娜教堂和波尔多石桥……","**还留下了**荣军院中的皇帝陵墓，以及卢浮宫里大卫那些歌颂昔日荣耀的华丽画作。"],"culture":[{"title":"De Bonaparte à l’empereur","fr":"Né en Corse en 1769, Bonaparte progresse rapidement dans l’armée pendant la Révolution. Ses victoires lui donnent une réputation nationale, puis il prend le pouvoir par le coup d’État du 18 Brumaire en 1799. D’abord Premier consul, il concentre progressivement l’autorité avant de devenir empereur des Français en 1804. Le couronnement ne signifie pas un simple retour à l’ancienne monarchie : le régime conserve certains acquis révolutionnaires, comme l’égalité juridique masculine, tout en limitant les libertés politiques. Napoléon utilise le plébiscite, l’administration, la censure et la gloire militaire pour légitimer son pouvoir. Son parcours montre ainsi comment une révolution peut produire un régime autoritaire qui se présente néanmoins comme son héritier et son stabilisateur.","zhSentences":["1769年出生于科西嘉的波拿巴在大革命时期迅速升迁。","军事胜利为他带来全国声望，随后他通过1799年雾月十八日政变夺取权力。","他先任第一执政，逐渐集中权力，并于1804年成为法国人的皇帝。","加冕并不等于简单恢复旧君主制：政权保留男性法律平等等部分革命成果，同时限制政治自由。","拿破仑利用公民投票、行政体系、审查和军事荣耀使权力正当化。","他的经历说明，一场革命如何产生威权政体，而这个政体仍自称是革命的继承者与稳定者。"],"zh":"1769年出生于科西嘉的波拿巴在大革命时期迅速升迁。军事胜利为他带来全国声望，随后他通过1799年雾月十八日政变夺取权力。他先任第一执政，逐渐集中权力，并于1804年成为法国人的皇帝。加冕并不等于简单恢复旧君主制：政权保留男性法律平等等部分革命成果，同时限制政治自由。拿破仑利用公民投票、行政体系、审查和军事荣耀使权力正当化。他的经历说明，一场革命如何产生威权政体，而这个政体仍自称是革命的继承者与稳定者。"},{"title":"Le Code civil et ses contradictions","fr":"Promulgué en 1804, le Code civil rassemble et unifie des règles qui variaient auparavant selon les régions. Il affirme la propriété, le contrat et l’égalité des hommes devant la loi, ce qui favorise une administration juridique commune. Son influence dépasse largement la France et inspire d’autres pays. Mais le texte renforce aussi l’autorité du mari et du père, réduit les droits des femmes mariées et organise une famille profondément inégalitaire. Dire qu’il est « encore en usage » ne signifie donc pas que chaque article de 1804 s’applique aujourd’hui. Le code a été continuellement modifié par des lois et par l’évolution de la société. Son importance tient autant à sa structure durable qu’aux combats nécessaires pour transformer les règles qu’il contenait.","zhSentences":["1804年颁布的《民法典》汇集并统一了此前因地区而异的规则。","它确认财产权、契约与男性在法律面前平等，推动了共同司法行政。","其影响远超法国，并启发其他国家。","但原文也强化丈夫和父亲的权威，削弱已婚女性权利，组织起深度不平等的家庭。","说它“至今仍在使用”，并不表示1804年的每一条今天仍然适用。","法律体系不断由新法律和社会演变加以修改。","其重要性既来自持久结构，也来自改变原有规则所经历的斗争。"],"zh":"1804年颁布的《民法典》汇集并统一了此前因地区而异的规则。它确认财产权、契约与男性在法律面前平等，推动了共同司法行政。其影响远超法国，并启发其他国家。但原文也强化丈夫和父亲的权威，削弱已婚女性权利，组织起深度不平等的家庭。说它“至今仍在使用”，并不表示1804年的每一条今天仍然适用。法律体系不断由新法律和社会演变加以修改。其重要性既来自持久结构，也来自改变原有规则所经历的斗争。"},{"title":"Pourquoi Napoléon divise-t-il encore ?","fr":"Pour certains, Napoléon représente l’efficacité de l’État, le mérite, la grandeur militaire et la diffusion de principes juridiques modernes. Pour d’autres, il incarne la guerre permanente, l’autoritarisme, les pertes humaines et le rétablissement de l’esclavage dans les colonies françaises en 1802. Les monuments, les commémorations et les expositions rendent ces lectures concurrentes visibles. Admirer une réforme administrative n’oblige pas à célébrer toutes les conquêtes ; condamner les violences n’empêche pas d’étudier l’héritage institutionnel. Cette séparation est essentielle pour sortir du choix entre héros parfait et tyran absolu. L’histoire de Napoléon traverse l’Europe, la Méditerranée et les colonies. Elle demande donc de croiser les points de vue français avec ceux des populations conquises, alliées, déplacées ou réduites en esclavage.","zhSentences":["对一些人而言，拿破仑代表国家效率、功绩、军事荣耀和现代法律原则的传播。","对另一些人而言，他象征持续战争、威权统治、人员损失，以及1802年在法国殖民地恢复奴隶制。","纪念碑、纪念活动和展览让这些竞争性解读变得可见。","欣赏某项行政改革不等于必须歌颂所有征服；谴责暴力也不妨碍研究制度遗产。","这种区分有助于摆脱“完美英雄”与“绝对暴君”的二选一。","拿破仑历史横跨欧洲、地中海和殖民地。","因此需要把法国视角同被征服、结盟、迁移或沦为奴隶的人群视角相互对照。"],"zh":"对一些人而言，拿破仑代表国家效率、功绩、军事荣耀和现代法律原则的传播。对另一些人而言，他象征持续战争、威权统治、人员损失，以及1802年在法国殖民地恢复奴隶制。纪念碑、纪念活动和展览让这些竞争性解读变得可见。欣赏某项行政改革不等于必须歌颂所有征服；谴责暴力也不妨碍研究制度遗产。这种区分有助于摆脱“完美英雄”与“绝对暴君”的二选一。拿破仑历史横跨欧洲、地中海和殖民地。因此需要把法国视角同被征服、结盟、迁移或沦为奴隶的人群视角相互对照。"}],"hasAudio":true,"audioPack":{"chunks":["audio-packs/napoleon/01.bin"],"segments":[{"start":0,"end":2.352},{"start":2.352,"end":12.216},{"start":12.216,"end":22.656},{"start":22.656,"end":31.296},{"start":31.296,"end":38.04},{"start":38.04,"end":48.864},{"start":48.864,"end":65.544},{"start":65.544,"end":71.952}]}},{"id":"republique","title":"République","chineseTitle":"共和国","level":"B1","topic":"history","summary":"从国家格言到世俗原则，理解法国公共生活的核心语汇。","groups":[["Pour mieux comprendre la société française, ses débats et ses polémiques, il faut les examiner à la lumière des principes républicains qui constituent l’identité politique du pays.","Ces principes, fondés sur les valeurs de justice et de démocratie, favorisent un État interventionniste et intégrationniste.","C’est sous la Révolution que la République française est établie sur la base de la Déclaration des droits de l’homme et du citoyen, de 1789, que résume la devise nationale : Liberté, Égalité, Fraternité.","Aujourd’hui, la France est définie par le premier article de la Constitution de 1958 comme une « République indivisible, laïque, démocratique et sociale »."],["La République est indivisible : les lois sont formulées par les représentants du peuple, le Parlement, elles s’appliquent à tous et sur tout le territoire français ; les citoyens sont égaux et bénéficient des mêmes droits, quelles que soient leur couleur, leur origine, leur religion."],["La République est laïque : l’État est neutre, il ne favorise ou ne finance aucun culte religieux mais garantit aux citoyens la liberté de conscience et de croyance ; toute démonstration d’appartenance religieuse par ceux qui servent l’État, les fonctionnaires, est interdite et les signes religieux ostentatoires dans les établissements scolaires sont proscrits depuis 2004."]],"highlights":["à la lumière de","fondés sur","sur la base de","s’appliquent à","quelles que soient","la liberté de conscience"],"sentenceTranslations":["为了更好理解法国社会及其辩论和争议，应当**依据**构成国家政治身份的共和国原则加以考察。","这些原则**建立在正义与民主价值之上**，支持一个积极干预并推动融入的国家。","法国共和国正是在大革命期间**以1789年《人权和公民权宣言》为基础**建立；国家格言“自由、平等、博爱”概括了这份宣言。","今天，1958年宪法第一条把法国定义为“不可分割、世俗、民主和社会的共和国”。","共和国不可分割：法律由人民代表——议会——制定，**适用于**所有人和法国全境；公民平等并享有相同权利，**无论**其肤色、出身或宗教为何。","共和国是世俗的：国家保持中立，不偏袒或资助任何宗教，但保障公民的**良心自由**与信仰自由；为国家服务的公务员不得展示宗教归属，学校中引人注目的宗教标志自2004年起受到禁止。"],"culture":[{"title":"Cinq Républiques, une histoire discontinue","fr":"La Première République est proclamée en 1792, mais la France n’est pas restée républicaine sans interruption depuis cette date. Empires, monarchies et régimes provisoires se succèdent avant que la Troisième République ne s’installe durablement à partir de 1870. La Quatrième naît après la Seconde Guerre mondiale, puis la crise de 1958 conduit à la Cinquième République actuelle. Numéroter les Républiques rappelle donc plusieurs constitutions et plusieurs équilibres du pouvoir. Les institutions changent, mais certains mots traversent les régimes : citoyen, souveraineté nationale, suffrage, droits et intérêt général. Parler de « la République » au singulier peut exprimer un idéal commun ; l’histoire oblige cependant à demander de quelle période, de quelle Constitution et de quelles pratiques il s’agit.","zhSentences":["第一共和国于1792年宣布成立，但法国从那以后并未不间断地保持共和制。","帝国、君主制和临时政权相继出现，直到1870年后第三共和国才长期稳定。","第四共和国诞生于二战后，1958年危机又带来今天的第五共和国。","为共和国编号，提醒人们存在多部宪法和多种权力平衡。","制度会改变，但一些词跨越不同政体：公民、国家主权、选举权、权利与公共利益。","用单数说“共和国”可以表达共同理想；历史则要求追问具体指哪个时期、哪部宪法和哪些实践。"],"zh":"第一共和国于1792年宣布成立，但法国从那以后并未不间断地保持共和制。帝国、君主制和临时政权相继出现，直到1870年后第三共和国才长期稳定。第四共和国诞生于二战后，1958年危机又带来今天的第五共和国。为共和国编号，提醒人们存在多部宪法和多种权力平衡。制度会改变，但一些词跨越不同政体：公民、国家主权、选举权、权利与公共利益。用单数说“共和国”可以表达共同理想；历史则要求追问具体指哪个时期、哪部宪法和哪些实践。"},{"title":"Liberté, Égalité, Fraternité","fr":"Les trois mots de la devise apparaissent pendant la Révolution, mais leur association et leur statut officiel se fixent progressivement. La liberté protège la possibilité d’agir, de penser et de s’exprimer dans les limites de la loi. L’égalité affirme que les citoyens ont les mêmes droits, sans promettre que toutes les situations économiques seront identiques. La fraternité insiste sur le lien, la solidarité et les devoirs envers les autres. Dans la vie publique, ces valeurs peuvent entrer en tension : une liberté individuelle peut-elle accroître une inégalité, et jusqu’où la solidarité doit-elle être organisée ? La devise ne donne pas automatiquement la réponse. Elle fournit plutôt un langage commun pour discuter des politiques, critiquer les institutions et rappeler que la démocratie ne se réduit pas au vote.","zhSentences":["“自由、平等、博爱”三个词在大革命时期出现，但它们的组合和官方地位是逐渐确定的。","自由保护人在法律范围内行动、思考与表达的可能。","平等确认公民拥有相同权利，却不承诺所有人的经济处境完全一样。","博爱强调联系、团结与对他人的责任。","在公共生活中，这些价值可能产生张力：个人自由会不会加剧不平等，社会团结又应组织到什么程度？","格言不会自动给出答案。","它更像共同语言，用来讨论政策、批评制度，并提醒人们民主不只是投票。"],"zh":"“自由、平等、博爱”三个词在大革命时期出现，但它们的组合和官方地位是逐渐确定的。自由保护人在法律范围内行动、思考与表达的可能。平等确认公民拥有相同权利，却不承诺所有人的经济处境完全一样。博爱强调联系、团结与对他人的责任。在公共生活中，这些价值可能产生张力：个人自由会不会加剧不平等，社会团结又应组织到什么程度？格言不会自动给出答案。它更像共同语言，用来讨论政策、批评制度，并提醒人们民主不只是投票。"},{"title":"Comprendre la laïcité avec précision","fr":"La laïcité garantit d’abord la liberté de conscience : chacun peut croire, ne pas croire ou changer de conviction. L’État et ses agents doivent rester neutres dans l’exercice du service public, mais les simples usagers ne sont pas soumis exactement aux mêmes obligations que les fonctionnaires. La loi de 1905 organise la séparation des Églises et de l’État, avec une histoire et certaines exceptions territoriales. Depuis 2004, les élèves des écoles, collèges et lycées publics ne peuvent porter des signes ou tenues manifestant ostensiblement une appartenance religieuse. Cette règle précise ne signifie pas que toute expression religieuse est interdite partout dans l’espace public. Distinguer agents, usagers, élèves et citoyens évite de transformer la laïcité en slogan vague et aide à comprendre les débats français.","zhSentences":["世俗原则首先保障良心自由：每个人都可以信教、不信教或改变信念。","国家及其工作人员在履行公共服务时必须保持中立，但普通服务使用者并不承担与公务员完全相同的义务。","1905年法律组织教会与国家分离，同时带有特定历史和部分地域例外。","自2004年起，公立小学、初中和高中学生不得佩戴明显显示宗教归属的标志或服装。","这项具体规则并不表示公共空间中的所有宗教表达都被禁止。","区分公务人员、公共服务使用者、学生与公民，可以避免把世俗原则变成含混口号，也有助于理解法国争论。"],"zh":"世俗原则首先保障良心自由：每个人都可以信教、不信教或改变信念。国家及其工作人员在履行公共服务时必须保持中立，但普通服务使用者并不承担与公务员完全相同的义务。1905年法律组织教会与国家分离，同时带有特定历史和部分地域例外。自2004年起，公立小学、初中和高中学生不得佩戴明显显示宗教归属的标志或服装。这项具体规则并不表示公共空间中的所有宗教表达都被禁止。区分公务人员、公共服务使用者、学生与公民，可以避免把世俗原则变成含混口号，也有助于理解法国争论。"}],"hasAudio":true,"audioPack":{"chunks":["audio-packs/republique/01.bin"],"segments":[{"start":0,"end":9.12},{"start":9.12,"end":16.344},{"start":16.344,"end":28.488},{"start":28.488,"end":38.352},{"start":38.352,"end":52.272},{"start":52.272,"end":70.056}]}}],"topics":[{"id":"food","fr":"Alimentation, gastronomie","zh":"食物、美味","total":14},{"id":"people","fr":"Célébrités","zh":"名人","total":12},{"id":"history","fr":"Histoire, institutions","zh":"历史、制度","total":13},{"id":"work","fr":"Industrie, éducation, travail","zh":"工业、教育、工作","total":12},{"id":"culture","fr":"Langue, médias, culture","zh":"语言、媒体、文化","total":15},{"id":"daily","fr":"Vie quotidienne","zh":"日常生活","total":14}]};const app=document.getElementById('app'),audio=new Audio(),audioCache=new Map(),requestedTopic=new URLSearchParams(location.search).get('topic');let art=null,cur=-1,expanded=-1,playing=false,continuous=false,nativeVoice=false,speed=1,view='topic',level='ALL',topic=DATA.topics.some(t=>t.id===requestedTopic)?request function render(){const a=route();app.innerHTML=a?page(a):home();if(!a)art=null}function finishReading(){const total=art?art.groups.flat().length:0;if(!art?.audioPack&&continuous&&cur<total-1){play(cur+1,true);return}cur=-1;playing=false;continuous=false;nativeVoice=false;render()}function preferredFrenchVoice(){if(!('speechSynthesis'in window))return null;const voices=speechSynthesis.getVoices().filter(v=>/^fr(-|_)/i.test(v.lang));return voices.find(v=>/(amélie|audrey|denise|hortense|julie|marie|sylvie|virginie|zoé|female|femme)/i.test(v.name))||voices[0]||null}function playNative(i,all){audioLoadToken++;if(!('speechSynthesis'in window)){playing=false;render();return}audio.pause();speechSynthesis.cancel();cur=i;continuous=!!all;nativeVoice=true;playing=true;const u=new SpeechSynthesisUtterance(art.groups.flat()[i]);u.lang='fr-FR';u.rate=speed;const voice=preferredFrenchVoice();if(voice)u.voice=voice;u.onend=()=>{if(nativeVoice)finishReading()};u.onerror=()=>{nativeVoice=false;playing=false;continuous=false;render()};render();speechSynthesis.speak(u)}function packedAudioUrl(a){if(audioCache.has(a.id))return audioCache.get(a.id);const p=Promise.all(a.audioPack.chunks.map(x=>fetch(withBase('/'+x)).then(r=>{if(!r.ok)throw new Error('audio '+r.status);return r.arrayBuffer()}))).then(parts=>URL.createObjectURL(new Blob(parts,{type:'audio/mpeg'}))).catch(e=>{audioCache.delete(a.id);throw e});audioCache.set(a.id,p);return p}function ensureAudioSource(src){if(audio.src===src&&audio.readyState>=1)return Promise.resolve();return new Promise((resolve,reject)=>{const done=()=>{clean();resolve()},fail=()=>{clean();reject(new Error('audio metadata'))},clean=()=>{audio.removeEventListener('loadedmetadata',done);audio.removeEventListener('error',fail)};audio.addEventListener('loadedmetadata',done);audio.addEventListener('error',fail);audio.src=src;audio.load()})}async function play(i,all){if(!art)return;if(!art.hasAudio){playNative(i,all);return}stopNative();const target=art,token=++audioLoadToken;cur=i;continuous=!!all;playing=true;audio.pause();render();try{if(target.audioPack){const src=await packedAudioUrl(target);if(token!==audioLoadToken||art!==target)return;await ensureAudioSource(src);if(token!==audioLoadToken||art!==target)return;const seg=target.audioPack.segments[i];audio.currentTime=seg.start;segmentEnd=seg.end}else{audio.src=withBase('/audio/'+target.id+'/'+String(i+1).padStart(2,'0')+'.mp3');audio.currentTime=0}audio.playbackRate=speed;await audio.play()}catch(e){if(token===audioLoadToken){playing=false;continuous=false;render()}}}function toggleSentence(i){if(!art)return;if(cur===i){if(nativeVoice&&'speechSynthesis'in window){if(speechSynthesis.paused){speechSynthesis.resume();playing=true}else{speechSynthesis.pause();playing=false;continuous=false}render();return}if(audio.src){if(audio.paused){audio.playbackRate=speed;audio.play().then(()=>{playing=true;render()}).catch(()=>{playing=false;render()})}else{audio.pause();playing=false;continuous=false;render()}return}}play(i,false)}audio.addEventListener('timeupdate',()=>{if(!art?.audioPack||!playing)return;const segs=art.audioPack.segments;if(continuous){let i=segs.findIndex((s,j)=>audio.currentTime<s.end-.02||j===segs.length-1);if(i>=0&&i!==cur){cur=i;render()}}else if(audio.currentTime>=segmentEnd-.03){audio.pause();finishReading()}});audio.addEventListener('ended',()=>{if(!nativeVoice)finishReading()});app.addEventListener('click',e=>{const l=e.target.closest('[data-link]');if(l){e.preventDefault();nav(l.getAttribute('href'));return}if(e.target.closest('[data-home]')){nav('/?topic='+(art?.topic||topic));return}const v=e.target.closest('[data-view]');if(v){view=v.dataset.view;render();return}const f=e.target.closest('[data-level]');if(f){level=f.dataset.level;render();return}const t=e.target.closest('[data-topic]');if(t){topic=t.dataset.topic;history.replaceState({},'',withBase('/?topic='+topic));render();return}const s=e.target.closest('[data-sentence]');if(s){clearTimeout(clickTimer);clickTimer=setTimeout(()=>{clickTimer=0;toggleSentence(Number(s.dataset.sentence))},300);return}if(e.target.closest('[data-play-all]')){play(0,true);return}const b=e.target.closest('[data-speed]');if(b){speed=Number(b.dataset.speed);audio.playbackRate=speed;render()}});app.addEventListener('dblclick',e=>{const s=e.target.closest('[data-sentence]');if(!s)return;e.preventDefault();clearTimeout(clickTimer);clickTimer=0;const i=Number(s.dataset.sentence);expanded=expanded===i?-1:i;render()});addEventListener('popstate',()=>{audio.pause();audioLoadToken++;stopNative();cur=-1;expanded=-1;playing=false;render()});render();</script></body></html>
