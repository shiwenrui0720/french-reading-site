13.923,"end":24.581},{"start":24.581,"end":32.157},{"start":32.157,"end":39.602},{"start":39.602,"end":43.86},{"start":43.86,"end":53.211},{"start":53.211,"end":58.331},{"start":58.331,"end":62.145}]}},{"id":"truffes","title":"Truffes","chineseTitle":"松露","level":"B1","topic":"food","summary":"地下生长的“厨房钻石”，以及它的采集和香气。","groups":[["Brillat-Savarin, auteur de la Physiologie du Goût (1825), qualifiait la truffe de diamant de la cuisine.","Depuis le Moyen-Âge en France, on connaît en effet ce champignon qui pousse sous la terre, mêlé aux racines de certains arbres.","On ramasse les truffes à la fin de l’automne ou en hiver, avec un chien truffier ou un cochon qui sait les trouver par l’odeur, ou même à l’aide de certaines mouches qui les adorent."],["La plupart des truffes françaises viennent de Provence, mais c’est la truffe noire, aussi appelée truffe du Périgord, qui est la plus recherchée pour son parfum très riche.","On trouve également des truffes en Italie et en Espagne, ainsi qu’en Chine, aux pieds de l’Himalaya."],["Tout comme les diamants, les truffes ont un prix : celles du Périgord valent de cinq cents à mille euros le kilo.","Une truffe pèse entre vingt et cent grammes, mais on en trouve parfois qui pèsent plus d’une livre !"],["La saveur délicate de la truffe se marie bien aux mets de viandes, de gibier en particulier, ou aux pâtés de foie gras, une autre spécialité du Périgord.","La recette de l’omelette aux truffes est simple : on conserve pendant 24 heures une truffe avec quelques œufs frais, le parfum de la truffe sera alors capté par les œufs et merveilleusement rendu pendant la cuisson."]],"culture":[{"title":"Un champignon sous terre","fr":"La truffe est le fruit d’un champignon qui vit en relation avec les racines de certains arbres, notamment les chênes et les noisetiers. Comme elle se développe sous terre, elle ne se voit pas directement. Le producteur observe le sol, les arbres et la saison, puis utilise l’odorat d’un animal dressé. Le chien truffier est aujourd’hui très courant : il apprend à signaler l’emplacement sans abîmer la truffe. Le cochon possède naturellement un grand intérêt pour son odeur, mais il est plus difficile à transporter et peut vouloir manger sa découverte. Dans quelques régions, les caveurs surveillent aussi une petite mouche qui se pose au-dessus d’un endroit prometteur. La récolte s’appelle le cavage. Elle demande de l’expérience, de la patience et un sol favorable.","zh":"松露是一种真菌的子实体，这种真菌与某些树木的根系共生，尤其是橡树和榛树。由于它在地下生长，人们无法直接看见。生产者观察土壤、树木和季节，然后利用受训动物的嗅觉寻找。如今，松露犬非常常见：它学会标示位置，同时不损坏松露。猪天生对松露气味很感兴趣，但运输更困难，而且可能想把发现的松露吃掉。在一些地区，采集者还会观察一种小蝇，它会停在可能有松露的位置上方。这种采集称为 cavage。它需要经验、耐心和适合的土壤。","zhSentences":["松露是一种真菌的子实体，这种真菌与某些树木的根系共生，尤其是橡树和榛树。","由于它在地下生长，人们无法直接看见。","生产者观察土壤、树木和季节，然后利用受训动物的嗅觉寻找。","如今，松露犬非常常见：它学会标示位置，同时不损坏松露。","猪天生对松露气味很感兴趣，但运输更困难，而且可能想把发现的松露吃掉。","在一些地区，采集者还会观察一种小蝇，它会停在可能有松露的位置上方。","这种采集称为 cavage。","它需要经验、耐心和适合的土壤。"]},{"title":"Périgord, Provence et marchés","fr":"La « truffe du Périgord » est le nom courant de la truffe noire Tuber melanosporum, mais sa production française ne se limite pas au Périgord. Le Vaucluse et d’autres zones du sud-est jouent un rôle majeur. En hiver, des marchés spécialisés réunissent producteurs, courtiers, restaurateurs et particuliers. Les truffes y sont examinées pour vérifier leur maturité, leur parfum, leur fermeté et leur état. Le prix varie fortement selon la récolte, la qualité et la période ; les chiffres imprimés dans un livre vieillissent donc rapidement. La culture reste incertaine, car planter des arbres mycorhizés ne garantit pas une production régulière. Sécheresse, température et entretien de la parcelle influencent le résultat. Cette rareté explique à la fois la valeur du produit et l’atmosphère particulière des marchés de saison.","zh":"“佩里戈尔松露”是黑孢块菌的常用名称，但它在法国的产地并不限于佩里戈尔。沃克吕兹和东南部其他地区也发挥着重要作用。冬季，专业市场会聚集生产者、中间商、餐馆经营者和普通消费者。松露会在市场上接受检查，以确认成熟度、香气、硬度和整体状态。价格会随着收成、品质和时期大幅变化，因此书中印出的数字很快就会过时。种植结果仍不确定，因为种下带菌根的树木并不能保证稳定产量。干旱、温度和地块维护都会影响结果。这种稀缺性既解释了产品的价值，也解释了季节性市场的特殊气氛。","zhSentences":["“佩里戈尔松露”是黑孢块菌的常用名称，但它在法国的产地并不限于佩里戈尔。","沃克吕兹和东南部其他地区也发挥着重要作用。","冬季，专业市场会聚集生产者、中间商、餐馆经营者和普通消费者。","松露会在市场上接受检查，以确认成熟度、香气、硬度和整体状态。","价格会随着收成、品质和时期大幅变化，因此书中印出的数字很快就会过时。","种植结果仍不确定，因为种下带菌根的树木并不能保证稳定产量。","干旱、温度和地块维护都会影响结果。","这种稀缺性既解释了产品的价值，也解释了季节性市场的特殊气氛。"]},{"title":"Parfumer plutôt que remplir","fr":"La truffe s’utilise en petite quantité, car son intérêt principal réside dans son parfum. On la brosse avec soin et on la tranche finement sur des œufs, des pâtes, une purée ou une volaille. Les matières grasses captent bien ses composés aromatiques : beurre, crème, fromage et jaune d’œuf sont donc des partenaires classiques. Enfermer une truffe fraîche avec des œufs peut parfumer ceux-ci à travers leur coquille poreuse, mais il faut conserver l’ensemble correctement au froid et éviter une humidité excessive. Une cuisson longue détruit une partie des arômes ; on ajoute souvent les lamelles à la fin ou on utilise doucement les parures dans une sauce. Les huiles dites « à la truffe » n’offrent pas toujours le même parfum qu’une truffe fraîche, car certaines reposent surtout sur des arômes ajoutés.","zh":"松露只需少量使用，因为它最重要的价值在于香气。人们会仔细刷净松露，再切成薄片，放在鸡蛋、意面、土豆泥或禽肉上。脂肪能很好地吸收松露的芳香成分，因此黄油、奶油、奶酪和蛋黄都是经典搭配。把新鲜松露与鸡蛋密封存放，可以让香气穿过多孔蛋壳进入鸡蛋；但必须正确冷藏，并避免湿度过高。长时间烹煮会破坏一部分香气，因此薄片常在最后加入，边角料则会被轻柔地用于酱汁。所谓“松露油”并不总能提供与鲜松露相同的香气，因为有些产品主要依赖额外添加的香料。","zhSentences":["松露只需少量使用，因为它最重要的价值在于香气。","人们会仔细刷净松露，再切成薄片，放在鸡蛋、意面、土豆泥或禽肉上。","脂肪能很好地吸收松露的芳香成分，因此黄油、奶油、奶酪和蛋黄都是经典搭配。","把新鲜松露与鸡蛋密封存放，可以让香气穿过多孔蛋壳进入鸡蛋；但必须正确冷藏，并避免湿度过高。","长时间烹煮会破坏一部分香气，因此薄片常在最后加入，边角料则会被轻柔地用于酱汁。","所谓“松露油”并不总能提供与鲜松露相同的香气，因为有些产品主要依赖额外添加的香料。"]}],"highlights":["qualifiait la truffe de","à la fin de","à l’aide de","La plupart des","On trouve également","Tout comme les","se marie bien aux","pendant 24 heures"],"sentenceTranslations":["《味觉生理学》作者布里亚-萨瓦兰把松露**称为**“厨房的钻石”。","自中世纪以来，法国人便认识这种在地下生长、与某些树根混在一起的蘑菇。","人们**在秋末**或冬季采集松露，借助松露犬、能靠气味找到它们的猪，甚至**借助**一些喜爱松露的苍蝇。","法国松露**大多**来自普罗旺斯，但最受追捧的是香气极浓的黑松露，也叫佩里戈尔松露。","在意大利、西班牙以及中国喜马拉雅山脚下**也能找到**松露。","**正如**钻石一样，松露也有价格：佩里戈尔松露每公斤价值五百至一千欧元。","一颗松露重二十至一百克，但有时也能找到重逾一磅的。","松露的细腻风味**很适合搭配**肉类菜肴，尤其是野味，或搭配鹅肝酱——另一种佩里戈尔特色。","松露煎蛋的做法很简单：把松露与几枚新鲜鸡蛋放在一起**保存二十四小时**，松露香气便会被鸡蛋吸收，并在烹饪时美妙地释放出来。"],"hasAudio":true,"audioPack":{"chunks":["audio-packs/truffes/01.bin"],"segments":[{"start":0,"end":6.87},{"start":6.87,"end":14.132},{"start":14.132,"end":22.779},{"start":22.779,"end":31.817},{"start":31.817,"end":37.773},{"start":37.773,"end":44.356},{"start":44.356,"end":50.416},{"start":50.416,"end":58.697},{"start":58.697,"end":69.851}]}},{"id":"vache-qui-rit","title":"Vache qui rit","chineseTitle":"乐芝牛","level":"B1","topic":"food","summary":"一头会笑、戴着递归耳环的法国奶酪品牌形象。","groups":[["Le logo universellement connu de la société Bel a intrigué des générations d’enfants.","Cette tête hilare d’une vache sympathique dessinée par Benjamin Rabier est omniprésente depuis 1921 sur les tables, dans les réfrigérateurs, sur les voitures de livraison, dans les épiceries et les supermarchés.","Depuis 2009, on peut aussi visiter la Maison de la Vache qui rit à Lons-le-Saunier (Jura)."],["Apparemment, la Vache qui rit c’est seulement un fromage fondant présenté en portions préemballées qu’on « tartine » sur des tranches de pain.","Mais ce n’est pas tout : de même qu’on ne sait pas pourquoi un cercle n’a pas de côtés, on ne sait pas non plus pourquoi elle rit, cette vache qui rit..."],["Ses boucles d’oreilles en forme de boîte de Vache qui rit sont aussi très énigmatiques : on remarque en effet que sur ces boucles d’oreilles, il y a une autre vache qui rit qui porte des boucles d’oreilles sur lesquelles on distingue une nouvelle vache qui rit qui porte des boucles d’oreilles et ainsi de suite...","Bref, cette vache qui rit est une démonstration de l’infini, offerte à l’imagination des enfants."]],"culture":[{"title":"D’un dessin militaire à une marque","fr":"L’histoire de La Vache qui rit commence autour de la Première Guerre mondiale. Léon Bel, fromager dans le Jura, voit un dessin humoristique de Benjamin Rabier représentant une vache joyeuse sur des véhicules militaires. Après la guerre, il développe un fromage fondu en portions et dépose sa marque en 1921. Rabier retravaille ensuite l’animal : la vache devient rouge, souriante et immédiatement visible. Le nom joue avec l’expression et avec le dessin, ce qui le rend facile à retenir par les enfants comme par les adultes. Le produit répond aussi à une innovation pratique. Le fromage fondu se conserve et se transporte plus facilement que de nombreux fromages traditionnels. L’association d’une technique industrielle, d’un emballage individuel et d’un personnage sympathique a permis à la marque de franchir les frontières et les générations.","zh":"乐芝牛的故事始于第一次世界大战前后。汝拉地区的奶酪商莱昂·贝尔看到本杰明·拉比耶的一幅幽默画：军用车辆上出现了一头快乐的牛。战后，他开发出独立包装的再制奶酪，并于1921年注册商标。随后，拉比耶重新设计这只动物：牛变成红色，面带笑容，而且一眼可见。名称同时呼应表达和图像，因此儿童和成年人都容易记住。这款产品也回应了一项实用创新。与许多传统奶酪相比，再制奶酪更容易保存和运输。工业技术、独立包装和亲切角色的结合，使这个品牌跨越了国界和世代。","zhSentences":["乐芝牛的故事始于第一次世界大战前后。","汝拉地区的奶酪商莱昂·贝尔看到本杰明·拉比耶的一幅幽默画：军用车辆上出现了一头快乐的牛。","战后，他开发出独立包装的再制奶酪，并于1921年注册商标。","随后，拉比耶重新设计这只动物：牛变成红色，面带笑容，而且一眼可见。","名称同时呼应表达和图像，因此儿童和成年人都容易记住。","这款产品也回应了一项实用创新。","与许多传统奶酪相比，再制奶酪更容易保存和运输。","工业技术、独立包装和亲切角色的结合，使这个品牌跨越了国界和世代。"]},{"title":"Pourquoi un fromage fondu ?","fr":"Le fromage fondu est fabriqué à partir de fromages sélectionnés puis mélangés, chauffés et émulsionnés afin d’obtenir une texture régulière. Cette transformation limite les variations, facilite le portionnement et améliore la stabilité du produit. La Vache qui rit se tartine sur du pain, entre dans un goûter, un pique-nique ou une cuisine familiale très simple. Elle n’occupe pas la même place qu’un comté affiné ou un camembert : son identité repose sur la douceur, la praticité et un goût constant. Pour les enfants, ouvrir le petit triangle fait partie de l’expérience. Pour les historiens de l’alimentation, le produit illustre le passage vers une consommation moderne faite de marques, d’emballages, de conservation plus longue et de distribution internationale. Un objet ordinaire peut ainsi raconter l’industrialisation de la nourriture au vingtième siècle.","zh":"再制奶酪以选定的奶酪为原料，经过混合、加热和乳化，从而获得均匀质地。这种加工可以减少差异、方便分装，并提高产品稳定性。乐芝牛可以抹在面包上，也可以出现在加餐、野餐或非常简单的家庭烹饪中。它与熟成孔泰或卡芒贝尔奶酪的地位不同：它的特色在于温和、便利和味道稳定。对儿童来说，打开小三角包装也是体验的一部分。对饮食史学者而言，这款产品体现了向现代消费方式的转变，其中包括品牌、包装、更长保存期和国际分销。一个普通物件由此也能讲述二十世纪食品工业化的故事。","zhSentences":["再制奶酪以选定的奶酪为原料，经过混合、加热和乳化，从而获得均匀质地。","这种加工可以减少差异、方便分装，并提高产品稳定性。","乐芝牛可以抹在面包上，也可以出现在加餐、野餐或非常简单的家庭烹饪中。","它与熟成孔泰或卡芒贝尔奶酪的地位不同：它的特色在于温和、便利和味道稳定。","对儿童来说，打开小三角包装也是体验的一部分。","对饮食史学者而言，这款产品体现了向现代消费方式的转变，其中包括品牌、包装、更长保存期和国际分销。","一个普通物件由此也能讲述二十世纪食品工业化的故事。"]},{"title":"Une image dans l’image","fr":"Les boucles d’oreilles de la vache représentent des boîtes de La Vache qui rit. Sur chacune de ces petites boîtes apparaît la même vache, qui porte encore des boîtes aux oreilles, et le dessin semble pouvoir continuer sans fin. Cet effet s’appelle souvent une mise en abyme : une œuvre contient une petite représentation d’elle-même. Le phénomène rappelle aussi la récursion en mathématiques et en informatique. L’idée visuelle attire le regard parce qu’elle transforme un simple emballage en jeu d’observation. Beaucoup d’enfants essaient d’apercevoir la plus petite vache possible. Le logo montre ainsi qu’une marque peut devenir mémorable sans raconter une histoire compliquée. Un sourire, une couleur forte et une énigme graphique suffisent. La Maison de La Vache qui rit, à Lons-le-Saunier, présente cette histoire industrielle et publicitaire.","zh":"笑牛的耳环画的是乐芝牛奶酪盒。每只小盒上又出现同一头牛，它的耳朵上仍戴着盒子，图案仿佛可以无限继续。这种效果常称为 mise en abyme，即一件作品内部包含它自身的小型形象。这个现象也让人想到数学和计算机科学中的递归。这个视觉构思很吸引目光，因为它把普通包装变成观察游戏。许多孩子会努力寻找自己能够看见的最小那头牛。这个标志由此说明，品牌不必讲述复杂故事，也能令人难忘。一个笑容、一种强烈颜色和一个图形谜题就足够了。位于隆斯勒索涅的乐芝牛之家展示了这段工业与广告史。","zhSentences":["笑牛的耳环画的是乐芝牛奶酪盒。","每只小盒上又出现同一头牛，它的耳朵上仍戴着盒子，图案仿佛可以无限继续。","这种效果常称为 mise en abyme，即一件作品内部包含它自身的小型形象。","这个现象也让人想到数学和计算机科学中的递归。","这个视觉构思很吸引目光，因为它把普通包装变成观察游戏。","许多孩子会努力寻找自己能够看见的最小那头牛。","这个标志由此说明，品牌不必讲述复杂故事，也能令人难忘。","一个笑容、一种强烈颜色和一个图形谜题就足够了。","位于隆斯勒索涅的乐芝牛之家展示了这段工业与广告史。"]}],"highlights":["depuis 1921","on peut aussi visiter","présenté en portions","de même qu’on ne sait pas","on ne sait pas non plus","et ainsi de suite","Bref","offerte à l’imagination"],"sentenceTranslations":["贝尔公司的这一举世知名标志曾让几代儿童感到好奇。","本杰明·拉比耶画的这张友善笑牛头像，**自1921年起**无处不在：餐桌、冰箱、送货车、杂货店和超市中都能看到。","自2009年起，人们**还可以参观**位于汝拉省隆斯勒索涅的乐芝牛之家。","表面看来，乐芝牛只是抹在面包片上的一种软质奶酪，装在**独立小份包装中**。","但事情不止如此：**正如人们不知道**为什么圆没有边，人们**也不知道**这头笑牛为什么笑。","它盒子形耳环同样神秘：每个耳环上的盒子里又有一头戴盒子形耳环的笑牛，如此**一直延续下去**。","**总之**，这头笑牛是对无限的演示，**献给儿童的想象力**。"],"hasAudio":true,"audioPack":{"chunks":["audio-packs/vache-qui-rit/01.bin"],"segments":[{"start":0,"end":5.433},{"start":5.433,"end":17.711},{"start":17.711,"end":22.727},{"start":22.727,"end":29.544},{"start":29.544,"end":37.486},{"start":37.486,"end":53.943},{"start":53.943,"end":59.977}]}},{"id":"vins-eaux","title":"Vins et eaux","chineseTitle":"佳酿与甘泉","level":"A2","topic":"food","summary":"从葡萄酒产区、餐酒搭配到法国人的饮水习惯。","groups":[["En France, les vignobles sont surtout situés dans la partie sud du pays, à l’exception du champagne et des vins d’Alsace, qui sont produits dans le nord-est.","Les régions viticoles les plus célèbres sont la Bourgogne et le Bordelais, où l’on cultive la vigne depuis plus de deux mille ans.","Mais d’excellents vins sont produits dans la vallée du Rhône, en Provence, dans le Languedoc et Roussillon, la vallée de la Loire, l’Anjou."],["Les vins ont une personnalité, un corps, un esprit.","Un vin est le résultat d’une alchimie complexe entre le climat, la terre et le travail du vigneron après la cueillette du raisin au moment des vendanges, généralement en septembre.","Le temps fait le reste.","Un bordeaux est meilleur après quelques années, il est plus robuste et ses parfums se sont développés.","Le bourgogne vieillit moins bien, mais il est acide s’il est trop jeune.","Le beaujolais doit être bu rapidement, dans les mois qui suivent sa fabrication."],["Le vin, c’est également un subtil mariage avec les mets : le vin blanc convient mieux en général au poisson et à la volaille, le rouge se marie bien avec les viandes et le fromage.","Au cours d’un repas, plusieurs vins différents peuvent être servis."],["Depuis une trentaine d’années, la consommation de vin en France a fortement baissé.","En fait, la boisson préférée des Français est l’eau.","La France est l’un des premiers producteurs du monde d’eaux minérales et chaque Français en consomme en moyenne plus de 200 litres par an."]],"culture":[{"title":"Une carte de terroirs","fr":"La carte viticole française est plus diverse qu’une simple opposition entre nord et sud. Bordeaux, Bourgogne, Champagne, Alsace, vallée de la Loire, vallée du Rhône, Provence, Languedoc, Jura, Savoie, Sud-Ouest et Corse possèdent chacun des climats, des sols, des cépages et des traditions propres. Le mot « terroir » réunit ces conditions naturelles et le travail humain qui leur donne une expression. Une appellation délimite souvent une zone et fixe des règles de production. Deux vins issus du même cépage peuvent donc goûter très différemment selon le lieu et la méthode. Les vendanges ont souvent lieu à la fin de l’été ou en automne, mais leur date varie avec la région, le millésime et le type de vin. Pour apprendre, mieux vaut retenir quelques régions et styles plutôt qu’une liste interminable de noms.","zh":"法国葡萄酒地图远比简单的南北对立更加多样。波尔多、勃艮第、香槟、阿尔萨斯、卢瓦尔河谷、罗讷河谷、普罗旺斯、朗格多克、汝拉、萨瓦、西南产区和科西嘉都拥有各自的气候、土壤、葡萄品种和传统。“terroir”一词把这些自然条件与赋予它们表达方式的人类劳动结合起来。一个原产地名称通常会划定区域，并规定生产规则。因此，由同一葡萄品种酿成的两款酒，会因地点和方法不同而呈现非常不同的味道。采收通常发生在夏末或秋季，但具体日期会随地区、年份和葡萄酒类型变化。学习时，与其死记无穷无尽的名称，不如先掌握几个产区和风格。","zhSentences":["法国葡萄酒地图远比简单的南北对立更加多样。","波尔多、勃艮第、香槟、阿尔萨斯、卢瓦尔河谷、罗讷河谷、普罗旺斯、朗格多克、汝拉、萨瓦、西南产区和科西嘉都拥有各自的气候、土壤、葡萄品种和传统。","“terroir”一词把这些自然条件与赋予它们表达方式的人类劳动结合起来。","一个原产地名称通常会划定区域，并规定生产规则。","因此，由同一葡萄品种酿成的两款酒，会因地点和方法不同而呈现非常不同的味道。","采收通常发生在夏末或秋季，但具体日期会随地区、年份和葡萄酒类型变化。","学习时，与其死记无穷无尽的名称，不如先掌握几个产区和风格。"]},{"title":"Accorder sans dogme","fr":"La règle « blanc avec le poisson, rouge avec la viande » est un point de départ, pas une loi. L’accord dépend de la sauce, de la cuisson, des épices, de la texture et surtout du goût des convives. Un pinot noir léger peut accompagner certains poissons ; un blanc puissant peut convenir à une volaille rôtie ou à un fromage. Les vins doux s’accordent parfois avec un dessert, mais aussi avec un fromage bleu ou un plat épicé. Au restaurant, on peut demander conseil et préciser son budget. À table, il n’est pas nécessaire de servir plusieurs bouteilles pour réussir le repas. Un seul vin bien choisi, de l’eau et des options sans alcool suffisent. La culture contemporaine insiste davantage sur la modération et sur la liberté de ne pas boire.","zh":"“白葡萄酒配鱼，红葡萄酒配肉”是一条入门原则，而不是法律。搭配取决于酱汁、烹饪方式、香料、质地，尤其取决于用餐者的口味。轻盈的黑皮诺可以搭配某些鱼类；酒体饱满的白葡萄酒则可搭配烤禽或奶酪。甜酒有时搭配甜点，也可以配蓝纹奶酪或辛辣菜肴。在餐厅里，可以请服务人员建议，并说明自己的预算。餐桌上并不需要开好几瓶酒，才能成就一顿成功的饭。一款选择得当的酒、饮用水和无酒精选项就足够了。当代文化更加重视适量饮酒，以及选择不喝酒的自由。","zhSentences":["“白葡萄酒配鱼，红葡萄酒配肉”是一条入门原则，而不是法律。","搭配取决于酱汁、烹饪方式、香料、质地，尤其取决于用餐者的口味。","轻盈的黑皮诺可以搭配某些鱼类；酒体饱满的白葡萄酒则可搭配烤禽或奶酪。","甜酒有时搭配甜点，也可以配蓝纹奶酪或辛辣菜肴。","在餐厅里，可以请服务人员建议，并说明自己的预算。","餐桌上并不需要开好几瓶酒，才能成就一顿成功的饭。","一款选择得当的酒、饮用水和无酒精选项就足够了。","当代文化更加重视适量饮酒，以及选择不喝酒的自由。"]},{"title":"L’eau à table","fr":"L’eau occupe une place centrale sur les tables françaises. Au restaurant, une carafe d’eau du robinet peut accompagner le repas ; on peut aussi choisir une eau minérale plate ou gazeuse. De nombreuses marques sont associées à une source et à une région, avec des compositions minérales et des goûts différents. Les chiffres de consommation changent selon les années et les méthodes de calcul, il faut donc lire avec prudence les données anciennes. Ce qui reste vrai, c’est que l’eau est la boisson quotidienne de base, même dans un pays célèbre pour son vin. Les campagnes de santé publique rappellent aussi que l’alcool n’est pas indispensable à la convivialité. À la maison comme au café, proposer de l’eau est un geste simple d’accueil. Cette présence discrète complète l’image gastronomique de la France.","zh":"水在法国餐桌上占据核心位置。在餐厅，一壶自来水可以伴随用餐；人们也可以选择无气或有气矿泉水。许多品牌与一处泉源和一个地区相联系，矿物质构成和味道各不相同。消费数据会随年份和计算方法变化，因此阅读旧数据时必须谨慎。始终不变的是，即使在一个以葡萄酒闻名的国家，水仍是日常生活的基础饮料。公共健康宣传也提醒人们，欢聚并不一定需要酒精。无论在家里还是咖啡馆，主动提供水都是一种简单的待客举动。这种不张扬的存在补充了法国的美食形象。","zhSentences":["水在法国餐桌上占据核心位置。","在餐厅，一壶自来水可以伴随用餐；人们也可以选择无气或有气矿泉水。","许多品牌与一处泉源和一个地区相联系，矿物质构成和味道各不相同。","消费数据会随年份和计算方法变化，因此阅读旧数据时必须谨慎。","始终不变的是，即使在一个以葡萄酒闻名的国家，水仍是日常生活的基础饮料。","公共健康宣传也提醒人们，欢聚并不一定需要酒精。","无论在家里还是咖啡馆，主动提供水都是一种简单的待客举动。","这种不张扬的存在补充了法国的美食形象。"]}],"highlights":["à l’exception du","depuis plus de deux mille ans","au moment des vendanges","Le temps fait le reste","en général","se marie bien avec","Au cours d’un repas","en moyenne"],"sentenceTranslations":["法国葡萄园主要位于南部，**只有**香槟和阿尔萨斯葡萄酒在东北部生产。","最著名的葡萄酒产区是勃艮第和波尔多，那里种植葡萄已有**两千多年**。","不过，罗讷河谷、普罗旺斯、朗格多克-鲁西永、卢瓦尔河谷和安茹也生产优质葡萄酒。","葡萄酒有个性、有身体、有精神。","一款酒是气候、土地，以及葡萄采收后、通常在九月**葡萄收获时**酒农工作的复杂炼金结果。","**时间会完成其余工作**。","波尔多酒经过几年后会更好，它更强劲，香气也得到发展。","勃艮第酒不太适合久藏，但太年轻时会显得酸。","博若莱酒应在酿成后的几个月内尽快饮用。","葡萄酒也与食物构成细腻搭配：**通常**白葡萄酒更适合鱼和禽类，红葡萄酒则**适合搭配**肉类和奶酪。","**在一顿饭中**，可以供应几种不同的葡萄酒。","三十多年来，法国的葡萄酒消费量大幅下降。","实际上，法国人最喜欢的饮料是水。","法国是世界主要矿泉水生产国之一，每位法国人**平均**每年饮用两百多升。"],"hasAudio":true,"audioPack":{"chunks":["audio-packs/vins-eaux/01.bin"],"segments":[{"start":0,"end":8.856},{"start":8.856,"end":15.621},{"start":15.621,"end":23.406},{"start":23.406,"end":26.697},{"start":26.697,"end":36.362},{"start":36.362,"end":38.113},{"start":38.113,"end":43.442},{"start":43.442,"end":47.569},{"start":47.569,"end":51.722},{"start":51.722,"end":61.701},{"start":61.701,"end":65.62},{"start":65.62,"end":70.687},{"start":70.687,"end":73.9},{"start":73.9,"end":81.398}]}},{"id":"abbe-pierre","title":"Abbé Pierre","chineseTitle":"皮埃尔神父","level":"B1","topic":"people","summary":"一位终身为无家可归者奔走的法国公益人物。","groups":[["Ce petit monsieur en pèlerine noire et à barbe blanche reste l’une des personnalités les plus respectées en France aujourd’hui.","L’abbé Pierre a défendu toute sa vie les pauvres de manière énergique et concrète, illustrant ainsi ses propres paroles : « Vivre, c’est apprendre à aimer »."],["Né à Lyon en 1912, Henri-Antoine Grouès a été ordonné prêtre en 1938.","Son surnom Pierre lui vient de la période de son engagement dans la Résistance, de 1942 à 1944.","À partir de 1949, il fonde la communauté d’Emmaüs, une association laïque composée d’hommes et de femmes - les « chiffonniers » - qui récupèrent, réparent et revendent de vieux meubles pour financer la construction d’abris pour les sans-logis."],["L’abbé Pierre devient soudain célèbre durant le terrible hiver de 1954 lorsqu’il parle aux Français à la radio pour leur demander de donner généreusement pour ceux qui meurent de froid dans la rue.","Son appel est largement entendu et, depuis, la communauté d’Emmaüs n’a pas cessé de grandir ; elle emploie aujourd’hui 4 000 « compagnons » répartis dans trente pays."],["L’abbé Pierre, Grand’Croix de l’Ordre de la Légion d’honneur, la plus haute distinction française, a été un infatigable combattant de l’injustice et des inégalités.","Il intervenait sans cesse avec conviction et sincérité dans tous les débats sur la misère et la pauvreté.","Il est mort en janvier 2007, il avait 94 ans."]],"culture":[{"title":"Une figure née d’un appel","fr":"En France, l’abbé Pierre est longtemps resté une figure de confiance très rare. Son appel radiophonique de l’hiver 1954 a marqué les mémoires : il demandait des couvertures, des logements et de l’aide pour des personnes qui dormaient dehors pendant une période de grand froid. La réaction du public a été immense. Cet épisode explique pourquoi son nom est encore associé à l’urgence sociale, mais aussi à une parole directe et accessible. Il ne parlait pas seulement de charité ; il rappelait que se loger dignement est une question de justice. Cette manière de relier émotion, action concrète et responsabilité collective a donné à son engagement une place particulière dans l’histoire sociale française.","zh":"在法国，皮埃尔神父长期是一位少有的、令人信任的公众人物。他在1954年寒冬发出的电台呼吁深深留在人们记忆中：他为在严寒中露宿的人请求毛毯、住房和援助。公众反应极其强烈。这一事件解释了为什么他的名字至今仍与社会紧急援助、直接而易懂的话语相联系。他所谈的不只是慈善，也提醒人们有尊严地居住是一项正义问题。把情感、具体行动和集体责任联系起来，赋予了他的投入在法国社会史中的特殊位置。","zhSentences":["在法国，皮埃尔神父长期是一位少有的、令人信任的公众人物。","他在1954年寒冬发出的电台呼吁深深留在人们记忆中：他为在严寒中露宿的人请求毛毯、住房和援助。","公众反应极其强烈。","这一事件解释了为什么他的名字至今仍与社会紧急援助、直接而易懂的话语相联系。","他所谈的不只是慈善，也提醒人们有尊严地居住是一项正义问题。","把情感、具体行动和集体责任联系起来，赋予了他的投入在法国社会史中的特殊位置。"]},{"title":"Emmaüs : travailler et reconstruire","fr":"La communauté d’Emmaüs repose sur une idée simple : des personnes en difficulté peuvent retrouver une place sociale en travaillant ensemble. Les compagnons récupèrent des objets donnés, les trient, les réparent et les vendent dans des magasins solidaires. L’argent permet de financer l’accueil, le logement et de nouveaux projets. Ce modèle ne réduit pas les personnes à des bénéficiaires d’aide ; il reconnaît leur capacité à agir, à produire et à participer à une communauté. Les bric-à-brac et les grandes ventes Emmaüs sont ainsi connus dans de nombreuses villes françaises. On y trouve des meubles, des livres, des vêtements ou de la vaisselle à prix modeste, mais aussi une autre manière de donner une seconde vie aux objets et aux personnes.","zh":"埃马乌斯团体建立在一个简单观念之上：处于困境中的人可以通过共同劳动重新找到社会位置。成员回收捐赠物品，分类、修理，再在公益商店出售。所得收入用于接待、住房和新的项目。这个模式不把人简单视为受助者，而是承认他们行动、创造和参与共同体的能力。埃马乌斯旧货集市和大型义卖在许多法国城市都很有名。那里能买到价格亲民的家具、书籍、衣物或餐具，也能看到另一种让物品与人获得新生的方式。","zhSentences":["埃马乌斯团体建立在一个简单观念之上：处于困境中的人可以通过共同劳动重新找到社会位置。","成员回收捐赠物品，分类、修理，再在公益商店出售。","所得收入用于接待、住房和新的项目。","这个模式不把人简单视为受助者，而是承认他们行动、创造和参与共同体的能力。","埃马乌斯旧货集市和大型义卖在许多法国城市都很有名。","那里能买到价格亲民的家具、书籍、衣物或餐具，也能看到另一种让物品与人获得新生的方式。"]},{"title":"Un vocabulaire de la solidarité","fr":"Le texte permet de rencontrer plusieurs mots importants de la solidarité française. Un sans-logis est une personne qui n’a pas de logement stable ; on emploie aussi aujourd’hui le terme sans-abri. Faire un don signifie donner de l’argent, du temps ou des objets pour aider une cause. Une association est un groupe de personnes qui s’organisent autour d’un objectif commun, souvent sans but commercial. Enfin, le mot compagnon, chez Emmaüs, désigne les personnes qui vivent et travaillent dans la communauté. Ces mots sont utiles au-delà de cette histoire : ils apparaissent dans les appels aux dons, les journaux locaux et les conversations sur la pauvreté. Les comprendre aide à lire la France comme une société où l’aide bénévole et les associations jouent un rôle concret.","zh":"这篇文章还让我们接触到法国团结互助领域的几个重要词语。sans-logis 指没有稳定住所的人，如今也常用 sans-abri。faire un don 意为捐赠金钱、时间或物品来支持一项事业。association 是围绕共同目标组织起来的团体，通常不以商业盈利为目的。最后，在埃马乌斯，compagnon 指在共同体中生活和工作的人。这些词不限于这段历史，在募捐呼吁、地方新闻和关于贫困的谈话中都很常见。理解它们，有助于把法国视为一个志愿援助和社团组织发挥具体作用的社会。","zhSentences":["这篇文章还让我们接触到法国团结互助领域的几个重要词语。","sans-logis 指没有稳定住所的人，如今也常用 sans-abri。","faire un don 意为捐赠金钱、时间或物品来支持一项事业。","association 是围绕共同目标组织起来的团体，通常不以商业盈利为目的。","最后，在埃马乌斯，compagnon 指在共同体中生活和工作的人。","这些词不限于这段历史，在募捐呼吁、地方新闻和关于贫困的谈话中都很常见。","理解它们，有助于把法国视为一个志愿援助和社团组织发挥具体作用的社会。"]}],"highlights":["l’une des personnalités les plus respectées","toute sa vie","de manière énergique et concrète","Né à","lui vient de","À partir de","sans-logis","devient soudain célèbre","leur demander de donner généreusement","n’a pas cessé de grandir","sans cesse"],"sentenceTranslations":["这位身披黑斗篷、留着白胡子的小个子先生，至今仍是法国**最受尊敬的人物之一**。","皮埃尔神父**一生都在**以**坚定而务实的方式**捍卫贫困者，印证了他自己的话：“活着，就是学会爱。”","亨利-安托万·格鲁埃1912年**出生于**里昂，1938年被祝圣为神父。","“皮埃尔”这个别名**来自**他1942年至1944年参加抵抗运动的时期。","**从1949年起**，他创立了埃马乌斯团体：这是一个由男女成员组成的非宗教协会；“拾荒者”们回收、修理并转卖旧家具，为**无家可归者**的住所建设筹资。","在1954年严酷的冬天，皮埃尔神父通过电台**请求法国人慷慨捐助**那些在街头冻死的人，于是**突然成名**。","他的呼吁得到广泛回应；此后，埃马乌斯团体**一直在发展壮大**，如今在三十个国家拥有四千名“伙伴”。","皮埃尔神父获得法国最高勋章“荣誉军团大十字勋章”，并且是一位不知疲倦地反对不公与不平等的斗士。","他以信念和真诚，**不断地**参与关于困苦与贫困的各种讨论。","他于2007年1月去世，享年94岁。"],"hasAudio":true,"audioPack":{"chunks":["audio-packs/abbe-pierre/01.bin"],"segments":[{"start":0,"end":5.928},{"start":5.928,"end":14.448},{"start":14.448,"end":20.04},{"start":20.04,"end":26.592},{"start":26.592,"end":39.624},{"start":39.624,"end":48.672},{"start":48.672,"end":58.032},{"start":58.032,"end":66.888},{"start":66.888,"end":72.216},{"start":72.216,"end":75.744}]}},{"id":"brigitte-bardot","title":"Brigitte Bardot","chineseTitle":"碧姬·芭铎","level":"B1","topic":"people","summary":"从银幕偶像到动物保护者，她映照了战后法国的自由想象。","groups":[["On pense aujourd’hui à Brigitte Bardot avec un mélange d’ironie, d’admiration, d’irritation et d’amusement.","Sa carrière d’actrice dans les années cinquante et soixante symbolise une époque idéale et révolue, lorsqu’en France on savourait l’atmosphère optimiste de l’après-guerre, avec insouciance et joie de vivre."],["Sa beauté légendaire est révélée au monde entier en 1956 par le film de Roger Vadim Et Dieu créa la femme.","Mais Bardot cultivait aussi une ingénuité, un air rebelle que toute jeune fille voulait imiter.","Femme-enfant insoumise, libre et audacieuse, BB incarnait les exigences des femmes, leur désir d’émancipation.","Le grand moment de BB au cinéma a lieu en 1963 lorsqu’elle apparaît avec Jack Palance dans Le Mépris de Jean-Luc Godard."],["Idole française globale, le buste de BB représentant Marianne, symbole de la République, a trôné au cours des années soixante dans toutes les mairies du pays.","BB a joué dans 50 films et enregistré des dizaines de chansons, dont la fameuse Harley Davidson, écrite par Serge Gainsbourg.","En 1974, à l’âge de 39 ans, elle décide d’arrêter le cinéma et se retire dans sa propriété de Saint-Tropez, sur la Côte d’Azur."],["Sans quitter l’attention des médias, BB s’est alors totalement dévouée à la défense des animaux, elle a refusé en 1985 la Légion d’honneur que lui offrait François Mitterrand, provoqué des scandales à la suite de déclarations controversées et rédigé plusieurs volumes de mémoires.","Une exposition rétrospective a été consacrée à BB en 2009, à l’occasion de ses 75 ans."]],"highlights":["un mélange d’ironie","joie de vivre","au monde entier","voulait imiter","à l’âge de","décide d’arrêter","s’est alors totalement dévouée à","à la suite de","à l’occasion de"],"sentenceTranslations":["如今，人们谈起碧姬·芭铎时，心情中**混合着**讽刺、欣赏、恼怒与好笑。","她在二十世纪五六十年代的演员生涯象征着一个理想而逝去的时代；当时的法国人无忧无虑，带着**生活的喜悦**，享受战后乐观的氛围。","1956年，罗杰·瓦迪姆的电影《上帝创造女人》让她传奇般的美貌展现在**全世界**面前。","但芭铎也塑造出一种天真和叛逆气质，所有年轻女孩都**想要模仿**。","这个不顺从、自由而大胆的“女人—孩子”体现了女性的诉求和她们对解放的渴望。","1963年，芭铎与杰克·帕兰斯出演让-吕克·戈达尔的《蔑视》，迎来电影生涯的高光时刻。","作为享誉世界的法国偶像，以芭铎为原型的共和国象征玛丽安娜半身像在二十世纪六十年代陈列于全国各地的市政厅。","芭铎出演了50部电影，录制了数十首歌曲，其中包括塞尔日·甘斯布创作的著名歌曲《Harley Davidson》。","1974年，**39岁时**，她**决定退出**电影界，隐居在蔚蓝海岸圣特罗佩的住所。","在媒体持续关注下，芭铎随后**全身心投入**动物保护；她在1985年拒绝了弗朗索瓦·密特朗授予的荣誉军团勋章，**由于**争议言论引发风波，并写下多卷回忆录。","2009年，**为庆祝**她75岁，人们举办了一场关于芭铎的回顾展。"],"culture":[{"title":"Une icône de l’après-guerre","fr":"Dans la France des années 1950, Brigitte Bardot devient le visage d’une jeunesse qui veut respirer après les privations de la guerre. Son allure naturelle, ses cheveux libres et sa manière de bouger contrastent avec l’élégance plus contrôlée des vedettes précédentes. Le cinéma, les magazines et la photographie diffusent cette image bien au-delà de la France. À Saint-Tropez, le tournage de Et Dieu créa la femme contribue aussi à transformer un petit port en destination internationale. Bardot représente alors moins un modèle unique qu’un changement de ton : davantage de spontanéité, de désir et d’indépendance. Cette liberté fascine, mais elle provoque aussi des jugements moraux très sévères, surtout lorsqu’elle est portée par une jeune femme.","zhSentences":["在二十世纪五十年代的法国，碧姬·芭铎成为一代渴望摆脱战争匮乏、自由呼吸的年轻人的面孔。","她自然的仪态、散开的头发和身体动作，与前一代明星更受约束的优雅形成对照。","电影、杂志和摄影把这一形象传播到法国之外。","《上帝创造女人》在圣特罗佩的拍摄，也推动这个小港口变成国际旅游目的地。","芭铎代表的与其说是某一种固定榜样，不如说是一种语调的转变：更多自发、欲望与独立。","这种自由令人着迷，也招致严厉的道德评判，尤其因为它由一位年轻女性来体现。"],"zh":"在二十世纪五十年代的法国，碧姬·芭铎成为一代渴望摆脱战争匮乏、自由呼吸的年轻人的面孔。她自然的仪态、散开的头发和身体动作，与前一代明星更受约束的优雅形成对照。电影、杂志和摄影把这一形象传播到法国之外。《上帝创造女人》在圣特罗佩的拍摄，也推动这个小港口变成国际旅游目的地。芭铎代表的与其说是某一种固定榜样，不如说是一种语调的转变：更多自发、欲望与独立。这种自由令人着迷，也招致严厉的道德评判，尤其因为它由一位年轻女性来体现。"},{"title":"Marianne et les célébrités","fr":"Marianne n’est pas une personne historique précise, mais l’allégorie féminine de la République française. On la reconnaît à son bonnet phrygien dans les mairies, sur les timbres ou dans les représentations officielles. À partir du vingtième siècle, certains bustes prennent les traits de femmes célèbres, dont Brigitte Bardot. Ce choix rapproche le symbole politique de la culture populaire, mais il rappelle aussi que l’image nationale change avec les époques. Marianne peut incarner la liberté, la raison, la résistance ou la citoyenneté. Utiliser le visage d’une actrice ne signifie donc pas que celle-ci représente toutes les valeurs de la République. Cela montre plutôt comment une société cherche un visage familier pour rendre visible une idée abstraite.","zhSentences":["玛丽安娜并非某一位具体历史人物，而是法兰西共和国的女性寓意形象。","在市政厅、邮票和官方图像中，人们常凭弗里吉亚帽认出她。","从二十世纪起，一些半身像采用知名女性的面容，碧姬·芭铎便是其中之一。","这种选择让政治象征靠近大众文化，也提醒人们国家形象会随时代变化。","玛丽安娜可以象征自由、理性、抵抗或公民身份。","因此，采用一位演员的面孔并不表示她代表共和国的全部价值。","更准确地说，这表明社会会借一张熟悉的脸，使抽象理念变得可见。"],"zh":"玛丽安娜并非某一位具体历史人物，而是法兰西共和国的女性寓意形象。在市政厅、邮票和官方图像中，人们常凭弗里吉亚帽认出她。从二十世纪起，一些半身像采用知名女性的面容，碧姬·芭铎便是其中之一。这种选择让政治象征靠近大众文化，也提醒人们国家形象会随时代变化。玛丽安娜可以象征自由、理性、抵抗或公民身份。因此，采用一位演员的面孔并不表示她代表共和国的全部价值。更准确地说，这表明社会会借一张熟悉的脸，使抽象理念变得可见。"},{"title":"De la célébrité à la cause animale","fr":"Après avoir quitté le cinéma, Bardot consacre une grande partie de sa notoriété à la protection des animaux. Cette reconversion montre qu’une célébrité peut utiliser l’attention médiatique pour rendre une cause visible, collecter des fonds et faire pression sur les responsables publics. En France, la défense animale rassemble des associations très diverses, qui travaillent sur l’abandon, les refuges, l’élevage, la chasse ou les espèces sauvages. L’engagement de Bardot a durablement marqué ce domaine, même si ses prises de position politiques et plusieurs déclarations ont suscité de fortes controverses. Il faut donc distinguer l’influence d’une campagne, la personnalité qui la porte et l’ensemble de ses opinions. Cette distinction aide à comprendre pourquoi une figure publique peut être admirée pour une action et vivement critiquée pour une autre.","zhSentences":["退出电影界后，芭铎把很大一部分知名度投入动物保护。","这种转型说明，名人可以利用媒体关注让某项事业被看见、募集资金，并推动公共决策者采取行动。","在法国，动物保护包含许多不同协会，议题涉及遗弃、收容所、养殖、狩猎和野生物种。","芭铎的投入长期影响了这一领域，但她的政治立场和若干言论也引发强烈争议。","因此，需要区分一场行动的影响、倡议者本人以及她的全部观点。","这种区分有助于理解：一个公众人物可能因某项行动受人敬佩，也可能因另一件事受到严厉批评。"],"zh":"退出电影界后，芭铎把很大一部分知名度投入动物保护。这种转型说明，名人可以利用媒体关注让某项事业被看见、募集资金，并推动公共决策者采取行动。在法国，动物保护包含许多不同协会，议题涉及遗弃、收容所、养殖、狩猎和野生物种。芭铎的投入长期影响了这一领域，但她的政治立场和若干言论也引发强烈争议。因此，需要区分一场行动的影响、倡议者本人以及她的全部观点。这种区分有助于理解：一个公众人物可能因某项行动受人敬佩，也可能因另一件事受到严厉批评。"}],"hasAudio":true,"audioPack":{"chunks":["audio-packs/brigitte-bardot/01.bin"],"segments":[{"start":0,"end":5.928},{"start":5.928,"end":15.48},{"start":15.48,"end":21.72},{"start":21.72,"end":26.688},{"start":26.688,"end":33.552},{"start":33.552,"end":40.2},{"start":40.2,"end":48.84},{"start":48.84,"end":55.968},{"start":55.968,"end":64.224},{"start":64.224,"end":78.408},{"start":78.408,"end":84.288}]}},{"id":"belmondo-delon","title":"Belmondo et Delon","chineseTitle":"贝尔蒙多与德隆","level":"B1","topic":"people","summary":"两位气质相反的巨星，共同塑造了法国电影中的男性形象。","groups":[["Il existe dans l’histoire du cinéma français quelques duos célèbres, formés par des couples d’acteurs ou d’actrices qui ont marqué la mémoire collective : c’est le cas de Bourvil et de Louis de Funès dans La Grande Vadrouille (1966), mais aussi d’Alain Delon et de Jean-Paul Belmondo dans Borsalino (1970), un film qui raconte l’histoire de deux gangsters de Marseille dans les années 20."],["Un duo réussi est d’abord un duo où les qualités de chaque individualité contribuent au succès et à la force du tandem.","En d’autres termes, Delon et Belmondo sont invincibles parce qu’ils sont associés.","L’autre dimension essentielle est dans le contraste qui est produit : les deux éléments du couple sont fondamentalement différents, ils ne se ressemblent pas, ils sont même aux antipodes l’un de l’autre, mais ils se complètent merveilleusement pour former un tout."],["On ne peut pas en effet imaginer deux personnalités aussi distinctes : Delon est froid, mesuré, mystérieux, de peu de mots et beau garçon ; Belmondo est chaleureux, spontané, franc, séducteur et beau parleur…","Malgré toutes ces différences, ce que ces deux hommes ont en commun, c’est leur talent d’acteurs, leur élégance, leur charme.","Delon et Belmondo, pendant plusieurs décennies et dans des dizaines de films, ont ainsi incarné au cinéma deux portraits de la masculinité."]],"highlights":["ont marqué la mémoire collective","contribuent au succès","En d’autres termes","aux antipodes l’un de l’autre","se complètent merveilleusement","de peu de mots","Malgré toutes ces différences","ont en commun"],"sentenceTranslations":["法国电影史上有一些著名搭档，由给集体记忆**留下深刻印记**的男女演员组合而成：例如《虎口脱险》（1966）中的布尔维尔和路易·德·菲奈斯，以及讲述二十世纪二十年代马赛两名黑帮分子故事的《江湖龙虎斗》（1970）中的阿兰·德隆和让-保罗·贝尔蒙多。","成功的搭档首先意味着每个人的特质都能**促成组合的成功**与力量。","**换句话说**，德隆和贝尔蒙多因为联手而所向披靡。","另一个关键维度是对比：两个人截然不同，彼此不像，甚至**处在两个极端**，却能**极其完美地互补**，组成一个整体。","很难想象两个如此不同的人：德隆冷静、克制、神秘、**话不多**而且英俊；贝尔蒙多热情、自发、坦率、迷人又能说会道……","**尽管有这些差异**，两人却**共同拥有**演员的才华、优雅与魅力。","几十年来，德隆和贝尔蒙多通过数十部电影，在银幕上体现了两种男性气质。"],"culture":[{"title":"Deux stars, deux présences","fr":"Jean-Paul Belmondo et Alain Delon appartiennent à la génération qui renouvelle le cinéma français à partir de la fin des années 1950. Belmondo impose une présence physique, mobile et souvent ironique ; il réalise volontiers ses cascades et passe du cinéma d’auteur au grand spectacle. Delon construit plutôt une beauté distante, un silence tendu et une élégance inquiétante, particulièrement efficaces dans le film policier. Les opposer est pratique, mais leurs carrières sont plus variées que ces deux étiquettes. Tous deux travaillent avec de grands réalisateurs et deviennent des vedettes populaires au-delà de la France. Leur duo fonctionne parce que le spectateur reconnaît immédiatement deux manières différentes d’occuper l’écran.","zhSentences":["让-保罗·贝尔蒙多与阿兰·德隆属于从二十世纪五十年代末开始革新法国电影的一代。","贝尔蒙多形成了富有身体感、灵活且常带反讽的银幕气质；他乐于亲自完成特技，也能从作者电影转向商业大片。","德隆则更多塑造疏离的美、紧张的沉默和略带危险的优雅，在警匪片中尤其有效。","把两人对立起来很方便，但他们的演艺生涯其实比这些标签更丰富。","两人都曾与重要导演合作，并成为跨越法国国界的大众明星。","他们的组合之所以有效，是因为观众能立刻认出两种不同的银幕存在方式。"],"zh":"让-保罗·贝尔蒙多与阿兰·德隆属于从二十世纪五十年代末开始革新法国电影的一代。贝尔蒙多形成了富有身体感、灵活且常带反讽的银幕气质；他乐于亲自完成特技，也能从作者电影转向商业大片。德隆则更多塑造疏离的美、紧张的沉默和略带危险的优雅，在警匪片中尤其有效。把两人对立起来很方便，但他们的演艺生涯其实比这些标签更丰富。两人都曾与重要导演合作，并成为跨越法国国界的大众明星。他们的组合之所以有效，是因为观众能立刻认出两种不同的银幕存在方式。"},{"title":"Le polar à la française","fr":"Le mot « polar » est une abréviation familière de roman ou de film policier. Dans le cinéma français, ce genre peut mêler enquête, gangsters, trahison, amitié masculine et critique sociale. Les décors urbains, les voitures, les costumes et les dialogues comptent souvent autant que l’intrigue. Borsalino regarde vers le Marseille des années 1930 et transforme ses deux héros en figures élégantes du milieu criminel. D’autres films de Delon ou de Belmondo montrent des policiers solitaires, des voyous séduisants ou des hommes poursuivis. Le polar permet ainsi d’explorer l’autorité, la loyauté et la violence tout en offrant un spectacle populaire. Il constitue une porte d’entrée utile pour comprendre une partie importante de l’imaginaire cinématographique français.","zhSentences":["“polar”是侦探小说或警匪电影的口语缩写。","在法国电影中，这一类型可以混合调查、黑帮、背叛、男性友谊和社会批判。","城市布景、汽车、服装和对白常常与情节同样重要。","《江湖龙虎斗》回望二十世纪三十年代的马赛，把两位主角塑造成犯罪世界中衣着考究的人物。","德隆或贝尔蒙多的其他影片还展现孤独的警察、迷人的混混和被追捕的男人。","因此，polar 在提供大众娱乐的同时，也探索权威、忠诚与暴力。","它是理解法国电影想象中重要部分的一个有用入口。"],"zh":"“polar”是侦探小说或警匪电影的口语缩写。在法国电影中，这一类型可以混合调查、黑帮、背叛、男性友谊和社会批判。城市布景、汽车、服装和对白常常与情节同样重要。《江湖龙虎斗》回望二十世纪三十年代的马赛，把两位主角塑造成犯罪世界中衣着考究的人物。德隆或贝尔蒙多的其他影片还展现孤独的警察、迷人的混混和被追捕的男人。因此，polar 在提供大众娱乐的同时，也探索权威、忠诚与暴力。它是理解法国电影想象中重要部分的一个有用入口。"},{"title":"Une masculinité mise en scène","fr":"Le texte présente Delon et Belmondo comme deux portraits de la masculinité, mais un portrait de cinéma n’est jamais une nature fixe. Il résulte du jeu de l’acteur, du scénario, du costume, de la lumière, de la voix et du regard des spectateurs. Le héros silencieux et le charmeur bavard proposent deux façons d’être puissant, vulnérable ou désirable. Aujourd’hui, ces images peuvent être relues avec distance : que cachent-elles, quelles émotions autorisent-elles, et quelle place laissent-elles aux femmes ? Cette lecture ne retire rien au plaisir des films. Elle permet au contraire de voir comment une époque fabrique ses modèles, puis comment les générations suivantes les admirent, les discutent ou les transforment.","zhSentences":["文章把德隆和贝尔蒙多视为两种男性气质，但电影中的人物形象从来不是固定天性。","它由演员表演、剧本、服装、光线、声音和观众目光共同产生。","沉默的英雄和健谈的魅力人物，提出了两种表现力量、脆弱或吸引力的方式。","今天，人们可以带着距离重新阅读这些形象：它们遮蔽了什么，允许男性表达哪些情绪，又给女性留下怎样的位置？","这种阅读不会削弱观看电影的乐趣。","相反，它帮助我们看到一个时代如何制造榜样，后来的世代又如何欣赏、讨论或改造它们。"],"zh":"文章把德隆和贝尔蒙多视为两种男性气质，但电影中的人物形象从来不是固定天性。它由演员表演、剧本、服装、光线、声音和观众目光共同产生。沉默的英雄和健谈的魅力人物，提出了两种表现力量、脆弱或吸引力的方式。今天，人们可以带着距离重新阅读这些形象：它们遮蔽了什么，允许男性表达哪些情绪，又给女性留下怎样的位置？这种阅读不会削弱观看电影的乐趣。相反，它帮助我们看到一个时代如何制造榜样，后来的世代又如何欣赏、讨论或改造它们。"}],"hasAudio":true,"audioPack":{"chunks":["audio-packs/belmondo-delon/01.bin"],"segments":[{"start":0,"end":19.632},{"start":19.632,"end":25.92},{"start":25.92,"end":30.696},{"start":30.696,"end":42.672},{"start":42.672,"end":54.888},{"start":54.888,"end":61.608},{"start":61.608,"end":68.976}]}},{"id":"les-bleus","title":"Les Bleus","chineseTitle":"法国蓝衣军团","level":"B1","topic":"people","summary":"一件蓝色球衣，承载国家认同、胜利记忆与多元法国的想象。","groups":[["Une expression métonymique s’est installée dans la langue française depuis vingt ans, regroupant un certain nombre de sentiments et de significations : « les Bleus », c’est la France et ses sportifs, et plus particulièrement son équipe de football.","Ce nom simple, qui se réfère à la couleur des maillots des joueurs et au drapeau national, représente l’unité de la nation, le pays entier dans son effort de conquête et de gloire internationale."],["La grande période des « Bleus » se situe entre 1998 et 2000, lorsque l’équipe de France de football remporte successivement la Coupe du Monde et la Coupe d’Europe.","La France célébrait alors les victoires d’une équipe composée de joueurs aux couleurs et origines différentes : Marcel Desailly le noir, Didier Deschamps le blanc et Zinédine Zidane le « beur » symbolisaient une France métissée, ouverte sur le monde, enrichie par des talents venus « d’ailleurs ».","La France unie n’avait qu’un seul slogan, apolitique et chauvin : « Allez les Bleus »."],["Les échecs de 2002 et 2004 en Coupe du Monde et en Coupe d’Europe, le geste malencontreux de Zidane lors de la finale perdue contre les Italiens en 2006 ont terni l’image des « Bleus ».","Les Français sont revenus aujourd’hui à plus de modestie et de réalisme, la gloire en sport est une chose difficile à faire durer.","Mais les Bleus ont réussi à donner à la France un visage uni dans sa diversité, un succès auquel les politiciens ne peuvent que rêver."]],"highlights":["s’est installée dans la langue","se réfère à","se situe entre","composée de","ouverte sur le monde","talents venus","ont terni l’image","difficile à faire durer","ne peuvent que rêver"],"sentenceTranslations":["二十年来，一个转喻表达逐渐**进入法语**，汇聚了许多情感与意义：“蓝衣军团”就是法国及其运动员，更具体地说，是法国国家足球队。","这个简单名称**指的是**球员队服和国旗的颜色，代表国家团结，也代表整个国家追求胜利与国际荣耀的努力。","“蓝衣军团”的辉煌时期**位于**1998年至2000年之间，当时法国队接连赢得世界杯和欧洲杯。","法国当时庆祝一支由不同肤色与出身球员**组成的**球队取得胜利：黑人马塞尔·德塞利、白人迪迪埃·德尚和“北非裔”齐内丁·齐达内，象征着一个混合、多元、**向世界开放**，并因**来自他乡**的才华而丰富的法国。","团结的法国只有一句超越党派而又爱国的口号：“法国队加油！”","2002年世界杯、2004年欧洲杯的失利，以及齐达内在2006年负于意大利的决赛中的不当举动，都**损害了蓝衣军团的形象**。","法国人后来变得更加谦逊和现实，因为体育荣耀**很难长久维持**。","但蓝衣军团成功赋予法国一张多元而团结的面孔，这种成功是政治家们**只能梦想的**。"],"culture":[{"title":"Pourquoi dit-on « les Bleus » ?","fr":"En français, une équipe nationale est souvent désignée par la couleur dominante de son maillot. « Les Bleus » peut donc nommer plusieurs sélections françaises, même si le football occupe la place la plus visible. Le bleu renvoie aussi au drapeau tricolore, où il accompagne le blanc et le rouge. Dans un stade, la formule « Allez les Bleus ! » est courte, collective et facile à chanter. Elle transforme onze joueurs en représentants symboliques d’un pays entier. Cette identification reste pourtant une construction : les supporters peuvent se sentir très unis pendant un match et retrouver ensuite leurs désaccords ordinaires. Le sport produit ainsi des moments intenses d’appartenance, sans effacer durablement la diversité sociale et politique.","zhSentences":["在法语中，国家队常以球衣的主色来称呼。","因此，“蓝衣军团”可以指法国多个项目的国家队，只是足球最受关注。","蓝色也让人想到三色旗，在旗帜上与白色和红色并列。","在球场上，“法国队加油！”简短、集体性强，也容易齐声高唱。","它把十一名球员转化为整个国家的象征性代表。","不过，这种认同是一种建构：球迷可以在比赛期间高度团结，赛后又回到日常分歧。","体育由此制造强烈的归属时刻，却不会永久消除社会与政治的多样性。"],"zh":"在法语中，国家队常以球衣的主色来称呼。因此，“蓝衣军团”可以指法国多个项目的国家队，只是足球最受关注。蓝色也让人想到三色旗，在旗帜上与白色和红色并列。在球场上，“法国队加油！”简短、集体性强，也容易齐声高唱。它把十一名球员转化为整个国家的象征性代表。不过，这种认同是一种建构：球迷可以在比赛期间高度团结，赛后又回到日常分歧。体育由此制造强烈的归属时刻，却不会永久消除社会与政治的多样性。"},{"title":"1998, une mémoire collective","fr":"La victoire française à la Coupe du monde de 1998 a dépassé le cadre sportif. Les célébrations sur les Champs-Élysées, l’image de Zidane et le slogan « black-blanc-beur » ont nourri l’espoir d’une société réconciliée avec sa diversité. Cette formule associait de façon très simplifiée des joueurs noirs, blancs et issus de l’immigration maghrébine. Elle a eu une grande force symbolique, mais elle ne pouvait pas résoudre les discriminations, les inégalités territoriales ou les tensions politiques. Les succès sportifs peuvent ouvrir un récit commun ; ils ne remplacent pas les politiques publiques ni le travail social. Relire 1998 aujourd’hui, c’est donc comprendre à la fois la joie réelle d’un événement partagé et les limites d’une unité produite par la victoire.","zhSentences":["法国队赢得1998年世界杯的意义超出了体育。","香榭丽舍大街上的庆祝、齐达内的形象以及“黑—白—北非裔”口号，激发了社会与自身多样性和解的希望。","这个说法以非常简化的方式把黑人、白人和具有北非移民背景的球员联系起来。","它具有强大的象征力量，却无法解决歧视、地区不平等或政治紧张。","体育成功可以开启共同叙事，但不能取代公共政策和社会工作。","今天重读1998年，需要同时理解共享事件带来的真实欢乐，以及由胜利制造的团结所具有的局限。"],"zh":"法国队赢得1998年世界杯的意义超出了体育。香榭丽舍大街上的庆祝、齐达内的形象以及“黑—白—北非裔”口号，激发了社会与自身多样性和解的希望。这个说法以非常简化的方式把黑人、白人和具有北非移民背景的球员联系起来。它具有强大的象征力量，却无法解决歧视、地区不平等或政治紧张。体育成功可以开启共同叙事，但不能取代公共政策和社会工作。今天重读1998年，需要同时理解共享事件带来的真实欢乐，以及由胜利制造的团结所具有的局限。"},{"title":"Le football comme langage social","fr":"En France, parler de football permet souvent de parler d’autre chose : de quartier, de famille, de migration, d’argent, de médias ou de politique. Les clubs locaux créent des liens entre enfants, éducateurs et bénévoles, tandis que le football professionnel devient une industrie mondiale. Une sélection nationale rassemble des joueurs formés dans des territoires et des milieux très différents. Leurs parcours donnent lieu à des récits de mérite et d’intégration, mais ces récits peuvent cacher les obstacles rencontrés. Le vocabulaire du match entre aussi dans la conversation quotidienne : marquer un but, jouer collectif, être hors-jeu ou changer de terrain. Comprendre les Bleus, ce n’est donc pas seulement connaître des résultats ; c’est observer comment un sport devient un langage pour raconter la société française.","zhSentences":["在法国，谈论足球往往也意味着谈论其他问题：街区、家庭、移民、金钱、媒体或政治。","地方俱乐部在儿童、教练与志愿者之间建立联系，而职业足球则成为全球产业。","国家队汇集了在不同地区和社会环境中成长的球员。","他们的经历常被讲述为个人努力与社会融入的故事，但这些叙事也可能遮蔽他们遇到的障碍。","比赛词汇还进入日常交谈：进球、团队配合、越位或换场。","因此，理解蓝衣军团不只是了解赛果，也是在观察一种运动如何成为讲述法国社会的语言。"],"zh":"在法国，谈论足球往往也意味着谈论其他问题：街区、家庭、移民、金钱、媒体或政治。地方俱乐部在儿童、教练与志愿者之间建立联系，而职业足球则成为全球产业。国家队汇集了在不同地区和社会环境中成长的球员。他们的经历常被讲述为个人努力与社会融入的故事，但这些叙事也可能遮蔽他们遇到的障碍。比赛词汇还进入日常交谈：进球、团队配合、越位或换场。因此，理解蓝衣军团不只是了解赛果，也是在观察一种运动如何成为讲述法国社会的语言。"}],"hasAudio":true,"audioPack":{"chunks":["audio-packs/les-bleus/01.bin"],"segments":[{"start":0,"end":12.096},{"start":12.096,"end":21.744},{"start":21.744,"end":30.768},{"start":30.768,"end":45.672},{"start":45.672,"end":50.616},{"start":50.616,"end":60},{"start":60,"end":66.48},{"start":66.48,"end":72.936}]}},{"id":"coco-chanel","title":"Coco Chanel","chineseTitle":"可可·香奈儿","level":"B1","topic":"people","summary":"她用简洁、舒适与自由重新书写女性服装的规则。","groups":[["La grande dame de la haute couture française est bien plus qu’un nom sur un flacon de parfum.","Au cours des années vingt et trente, Coco Chanel a reconstruit l’identité des femmes en révolutionnant les codes du vêtement féminin.","Indépendante et ambitieuse, la petite couseuse orpheline, Gabrielle Bonheur Chasnel, a finalement imposé au monde sa conception de l’élégance féminine par des lignes sobres, qui sont devenues depuis la référence classique du monde de la mode."],["Coco Chanel, en libérant les femmes de leurs corsets et jupons, a pratiquement tout inventé : le pantalon, le tailleur, la jupe courte, mais qui cachait les genoux, le jersey, le tweed, les bijoux fantaisie…","Elle voulait des femmes aux cheveux courts, à la peau bronzée et naturelle, à l’aise dans leurs vêtements.","Même si ses créations s’inspiraient souvent du vêtement masculin, Coco Chanel ne craignait pas de dire que « plus une femme est féminine, plus elle est forte »."],["L’art de Coco Chanel se résume dans ces trois mots : confort, simplicité et élégance.","La grande styliste précise ceci : « Une femme est toujours trop habillée, jamais assez élégante »."],["Coco Chanel est morte en 1971, dans sa suite de l’Hôtel Ritz à Paris, elle avait 87 ans.","Dans le film d’Anne Fontaine, Coco avant Chanel (2009), qui retrace les débuts de sa carrière, Audrey Tautou incarne avec vérité le caractère déterminé d’une femme qui a changé toutes les femmes."]],"highlights":["bien plus qu’un","Au cours des","a finalement imposé","à l’aise dans","Même si","ne craignait pas de","se résume dans","retrace les débuts de"],"sentenceTranslations":["这位法国高级时装界的重要女性，**远不只是**香水瓶上的一个名字。","**在**二十世纪二三十年代，可可·香奈儿通过革新女装规范，重塑了女性身份。","独立而有抱负的孤儿小裁缝加布里埃勒·博纳尔·香奈儿，最终以简洁线条**成功让全世界接受**她对女性优雅的理解；这些线条后来成为时尚界的经典参照。","可可·香奈儿把女性从紧身胸衣和衬裙中解放出来，几乎发明了一切：长裤、套装、遮住膝盖的短裙、针织布、粗花呢和时装首饰……","她希望女性留短发、拥有自然健康的肤色，并在衣服里感到**自在**。","**即使**她的设计经常从男装中汲取灵感，香奈儿也**敢于说**：“女人越有女性气质，就越强大。”","可可·香奈儿的艺术可以**概括为**三个词：舒适、简洁和优雅。","这位设计大师还说：“女人总是穿得太多，却从来不够优雅。”","可可·香奈儿1971年在巴黎丽兹酒店的套房中去世，享年87岁。","安妮·芳婷的电影《时尚先锋香奈儿》（2009）**追溯了其事业起点**，奥黛丽·塔图真实演绎了这位改变所有女性的坚定女子。"],"culture":[{"title":"Libérer le mouvement","fr":"Au début du vingtième siècle, les vêtements féminins élégants peuvent être lourds, structurés et difficiles à porter dans une vie active. Chanel propose des matières souples, des coupes simples et des éléments empruntés au vestiaire masculin. Le jersey, jusque-là associé à des usages modestes ou sportifs, devient une matière de mode. Cette transformation ne signifie pas que Chanel a inventé seule chaque vêtement cité. Elle a surtout su sélectionner, combiner et imposer des formes qui correspondaient à une nouvelle manière de vivre. Marcher, travailler, conduire ou voyager demandait davantage de liberté corporelle. La mode devient ainsi un lieu où se négocient les changements sociaux : le corps féminin n’est plus seulement décoré, il doit pouvoir agir.","zhSentences":["二十世纪初，优雅女装可能沉重、结构复杂，也难以适应活跃生活。","香奈儿采用柔软面料、简洁剪裁和从男装借来的元素。","此前多用于普通或运动服装的针织布，也被带入时尚领域。","这种变化并不意味着文中每一种服装都由香奈儿独自发明。","她更重要的能力，是挑选、组合并推广符合新生活方式的造型。","行走、工作、开车或旅行都要求身体拥有更多自由。","时尚由此成为协商社会变化的场所：女性身体不再只供装饰，也必须能够行动。"],"zh":"二十世纪初，优雅女装可能沉重、结构复杂，也难以适应活跃生活。香奈儿采用柔软面料、简洁剪裁和从男装借来的元素。此前多用于普通或运动服装的针织布，也被带入时尚领域。这种变化并不意味着文中每一种服装都由香奈儿独自发明。她更重要的能力，是挑选、组合并推广符合新生活方式的造型。行走、工作、开车或旅行都要求身体拥有更多自由。时尚由此成为协商社会变化的场所：女性身体不再只供装饰，也必须能够行动。"},{"title":"Le noir, le tweed et les codes","fr":"La maison Chanel a construit un langage visuel immédiatement reconnaissable. La petite robe noire transforme une couleur associée au deuil ou au service en signe d’élégance moderne. Le tailleur en tweed associe confort, structure et liberté de mouvement. Les chaînes dorées, les perles, les camélias et le motif matelassé deviennent d’autres codes régulièrement réinterprétés. Dans la mode, un code n’est pas une règle immobile : c’est un élément que le public reconnaît malgré les variations. Cette continuité aide une maison à traverser les générations et à vendre bien plus que des vêtements. Elle produit un univers, une histoire et une promesse de style. C’est pourquoi le nom Chanel reste lié à la fois à une personne et à une marque mondiale.","zhSentences":["香奈儿品牌建立了一套一眼可辨的视觉语言。","小黑裙把原本与哀悼或服务工作联系的颜色转化为现代优雅的标志。","粗花呢套装结合了舒适、结构和行动自由。","金色链条、珍珠、山茶花和菱格纹也成为不断被重新解释的符码。","在时尚中，符码并非静止规则，而是即使发生变化仍能被公众识别的元素。","这种连续性帮助品牌跨越世代，销售的远不止衣服。","它还生产一个世界、一段历史和一种风格承诺。","因此，Chanel这个名字既属于一个人，也属于一个全球品牌。"],"zh":"香奈儿品牌建立了一套一眼可辨的视觉语言。小黑裙把原本与哀悼或服务工作联系的颜色转化为现代优雅的标志。粗花呢套装结合了舒适、结构和行动自由。金色链条、珍珠、山茶花和菱格纹也成为不断被重新解释的符码。在时尚中，符码并非静止规则，而是即使发生变化仍能被公众识别的元素。这种连续性帮助品牌跨越世代，销售的远不止衣服。它还生产一个世界、一段历史和一种风格承诺。因此，Chanel这个名字既属于一个人，也属于一个全球品牌。"},{"title":"Une mémoire à regarder en face","fr":"L’histoire culturelle gagne à éviter les portraits entièrement héroïques. Chanel a transformé la mode, mais sa vie pendant l’Occupation allemande et ses relations de cette période ont fait l’objet de recherches et de débats. Étudier une créatrice célèbre demande donc de tenir ensemble plusieurs dimensions : l’innovation esthétique, l’entreprise, la construction d’une légende et les zones controversées d’une biographie. Cette méthode vaut pour beaucoup de grandes figures françaises. Elle ne consiste ni à effacer leur œuvre ni à excuser leurs choix. Elle cherche à comprendre comment une réputation se fabrique, ce qu’elle met en lumière et ce qu’elle laisse dans l’ombre. Une culture vivante accepte cette complexité au lieu de transformer ses célébrités en monuments sans contradictions.","zhSentences":["文化史应避免把人物写成毫无阴影的英雄。","香奈儿革新了时尚，但她在德国占领时期的生活与人际关系也受到研究和争论。","研究一位著名设计师，需要同时把握审美创新、商业经营、传奇塑造和传记中的争议地带。","这种方法同样适用于许多法国名人。","它既不是抹去作品，也不是为人物选择开脱。","它试图理解声誉如何被制造、照亮了什么，又把什么留在阴影中。","活的文化会接受这种复杂性，而不是把名人变成没有矛盾的纪念碑。"],"zh":"文化史应避免把人物写成毫无阴影的英雄。香奈儿革新了时尚，但她在德国占领时期的生活与人际关系也受到研究和争论。研究一位著名设计师，需要同时把握审美创新、商业经营、传奇塑造和传记中的争议地带。这种方法同样适用于许多法国名人。它既不是抹去作品，也不是为人物选择开脱。它试图理解声誉如何被制造、照亮了什么，又把什么留在阴影中。活的文化会接受这种复杂性，而不是把名人变成没有矛盾的纪念碑。"}],"hasAudio":true,"audioPack":{"chunks":["audio-packs/coco-chanel/01.bin"],"segments":[{"start":0,"end":4.344},{"start":4.344,"end":10.8},{"start":10.8,"end":22.896},{"start":22.896,"end":34.944},{"start":34.944,"end":39.912},{"start":39.912,"end":48.144},{"start":48.144,"end":53.76},{"start":53.76,"end":59.712},{"start":59.712,"end":65.856},{"start":65.856,"end":76.8}]}},{"id":"coluche","title":"Coluche","chineseTitle":"科吕什","level":"B1","topic":"people","summary":"他用粗粝幽默嘲讽权力，也把名气变成切实的社会援助。","groups":[["Ce personnage provocateur, à l’humour trivial, a été détesté autant qu’adoré par le public, craint et respecté par les médias et la classe politique.","Fils d’un immigré italien et d’une mère fleuriste, Michel Colucci, dit Coluche, a transformé la manière dont l’humour s’exprime en France, à la radio, à la télévision, sur la scène publique."],["En 1969, Coluche fonde avec des amis le Café de la Gare, où le prix du billet d’entrée est variable et déterminé par une loterie : les plus chanceux reçoivent même de l’argent pour voir le spectacle.","Devenu bientôt le comédien le plus célèbre de France, Coluche dénonce simultanément l’hypocrisie des politiciens et celle des journalistes : « Les journalistes ne croient pas les mensonges des hommes politiques mais ils les répètent, c’est pire ! »."],["Coluche se présente à l’élection présidentielle de 1981 comme « candidat nul ».","Habillé en clown, son objectif est de tourner en dérision cet événement essentiel du calendrier politique.","Trois ans plus tard, il obtient un César du meilleur acteur pour son rôle dans Tchao Pantin, où il montre une autre facette de lui-même, celle d’acteur tragique."],["Coluche crée en 1985 les Restos du Cœur, une entreprise caritative pour venir en aide aux défavorisés.","La générosité de Coluche se résume dans sa fameuse maxime : « Je ne suis pas un nouveau riche, je suis un ancien pauvre »."],["Coluche meurt brutalement en mai 1986, dans un accident de moto.","Il avait 42 ans.","La cérémonie funéraire a été conduite par l’abbé Pierre."]],"highlights":["détesté autant qu’adoré","dit Coluche","avec des amis","les plus chanceux","se présente à","tourner en dérision","Trois ans plus tard","une autre facette de","venir en aide aux","se résume dans"],"sentenceTranslations":["这个幽默粗俗、富于挑衅的人物，**被公众憎恨如同被热爱**，也受到媒体和政界的畏惧与尊重。","作为意大利移民与花店女工之子，米歇尔·科吕奇，**人称科吕什**，改变了幽默在法国广播、电视和公共舞台上的表达方式。","1969年，科吕什**与朋友们一起**创办“火车站咖啡剧场”，票价浮动并由抽签决定：**最幸运的人**甚至能拿钱来看演出。","科吕什很快成为法国最著名的喜剧演员，同时揭露政治家和记者的虚伪：“记者不相信政治家的谎言，却把它们重复一遍，这更糟！”","科吕什以“零分候选人”的身份**参加**1981年总统选举。","他打扮成小丑，目的是**嘲弄**政治日程中的这一重大事件。","**三年后**，他凭借《末路刑警》获得凯撒最佳男演员奖，在片中展现了自己**不同的另一面**：悲剧演员。","1985年，科吕什创办“爱心餐厅”，这一慈善组织旨在**帮助**弱势群体。","科吕什的慷慨可以**概括在**他的名言中：“我不是新富，我是过去的穷人。”","1986年5月，科吕什在一场摩托车事故中突然去世。","他当时42岁。","葬礼仪式由皮埃尔神父主持。"],"culture":[{"title":"Rire contre les puissants","fr":"La tradition satirique française accorde une place importante à ceux qui se moquent du pouvoir, des habitudes sociales et du langage officiel. Coluche utilise une tenue simple, un salopette rayée, un nez rouge et une parole volontairement populaire. Ses sketches mettent souvent en scène des personnages maladroits, pauvres, racistes ou absurdes, afin de faire entendre les contradictions de la société. Ce comique peut mettre mal à l’aise, car il joue avec les stéréotypes et les mots interdits. Son intérêt ne tient donc pas seulement à la plaisanterie, mais à la position depuis laquelle elle est prononcée. Coluche construit la figure d’un homme ordinaire qui ose répondre aux journalistes et aux responsables politiques sans adopter leurs codes.","zhSentences":["法国讽刺传统重视那些嘲笑权力、社会习惯和官方语言的人。","科吕什穿着简单的条纹背带裤，戴红鼻子，故意使用大众化语言。","他的段子常塑造笨拙、贫穷、带有偏见或荒诞的人物，以呈现社会矛盾。","这种喜剧会让人不适，因为它玩弄刻板印象和禁忌词语。","它的意义因此不只在笑话本身，也在于笑话从何种社会位置被说出。","科吕什塑造了一个普通人的形象，敢于不遵循媒体与政治人物的规则，直接回应他们。"],"zh":"法国讽刺传统重视那些嘲笑权力、社会习惯和官方语言的人。科吕什穿着简单的条纹背带裤，戴红鼻子，故意使用大众化语言。他的段子常塑造笨拙、贫穷、带有偏见或荒诞的人物，以呈现社会矛盾。这种喜剧会让人不适，因为它玩弄刻板印象和禁忌词语。它的意义因此不只在笑话本身，也在于笑话从何种社会位置被说出。科吕什塑造了一个普通人的形象，敢于不遵循媒体与政治人物的规则，直接回应他们。"},{"title":"Une candidature pour troubler le jeu","fr":"Lorsque Coluche annonce sa candidature présidentielle, le geste commence comme une provocation comique mais rencontre un écho réel. Il promet de représenter les abstentionnistes, les mécontents et tous ceux qui ne se reconnaissent pas dans le langage politique. La candidature brouille alors la frontière entre spectacle et démocratie : un humoriste peut-il être candidat, et une plaisanterie peut-elle révéler une crise de confiance ? Coluche finit par se retirer, mais l’épisode reste dans la mémoire politique française. Depuis, d’autres artistes ont utilisé la satire pour interroger les campagnes électorales. L’événement rappelle qu’en démocratie le rire peut délégitimer les puissants, tout en posant la question de ce qui vient après la moquerie.","zhSentences":["科吕什宣布参选总统时，这一行动起初像喜剧挑衅，却获得真实回应。","他声称要代表弃权者、不满者，以及所有无法在政治语言中认出自己的人。","这场参选模糊了表演与民主的边界：喜剧演员能否成为候选人，玩笑能否揭示信任危机？","科吕什最终退出，但这段经历留在法国政治记忆中。","此后，也有其他艺术家用讽刺质问选举活动。","这件事提醒人们，在民主社会中，笑声可以削弱权力的正当性，但也会留下一个问题：嘲笑之后要做什么？"],"zh":"科吕什宣布参选总统时，这一行动起初像喜剧挑衅，却获得真实回应。他声称要代表弃权者、不满者，以及所有无法在政治语言中认出自己的人。这场参选模糊了表演与民主的边界：喜剧演员能否成为候选人，玩笑能否揭示信任危机？科吕什最终退出，但这段经历留在法国政治记忆中。此后，也有其他艺术家用讽刺质问选举活动。这件事提醒人们，在民主社会中，笑声可以削弱权力的正当性，但也会留下一个问题：嘲笑之后要做什么？"},{"title":"Les Restos du Cœur","fr":"En 1985, Coluche lance à la radio une idée simple : récupérer les surplus et offrir des repas aux personnes qui n’ont pas assez à manger. Les Restos du Cœur deviennent rapidement un vaste réseau associatif soutenu par des bénévoles. L’organisation distribue de l’aide alimentaire, mais propose aussi un accompagnement dans des domaines comme le logement, l’emploi, la santé ou l’accès à la culture. Chaque année, le spectacle des Enfoirés réunit des artistes afin de collecter de l’argent et de maintenir la cause dans l’espace public. Cette institution montre la force de la solidarité bénévole, mais son existence durable révèle aussi la persistance de la pauvreté. L’héritage de Coluche réunit ainsi humour, générosité et critique sociale.","zhSentences":["1985年，科吕什在广播中提出一个简单想法：回收剩余物资，为吃不饱的人提供餐食。","“爱心餐厅”很快发展成由志愿者支持的大型协会网络。","该组织不仅分发食品，也在住房、就业、健康和文化参与等方面提供陪伴与支持。","每年，“混蛋慈善演唱会”汇集艺人募款，并让这一议题持续进入公共视野。","这个机构展示了志愿团结的力量，但它长期存在也表明贫困问题依旧持续。","因此，科吕什的遗产把幽默、慷慨与社会批判连接在一起。"],"zh":"1985年，科吕什在广播中提出一个简单想法：回收剩余物资，为吃不饱的人提供餐食。“爱心餐厅”很快发展成由志愿者支持的大型协会网络。该组织不仅分发食品，也在住房、就业、健康和文化参与等方面提供陪伴与支持。每年，“混蛋慈善演唱会”汇集艺人募款，并让这一议题持续进入公共视野。这个机构展示了志愿团结的力量，但它长期存在也表明贫困问题依旧持续。因此，科吕什的遗产把幽默、慷慨与社会批判连接在一起。"}],"hasAudio":true,"audioPack":{"chunks":["audio-packs/coluche/01.bin"],"segments":[{"start":0,"end":8.28},{"start":8.28,"end":19.104},{"start":19.104,"end":29.52},{"start":29.52,"end":41.424},{"start":41.424,"end":47.064},{"start":47.064,"end":53.136},{"start":53.136,"end":61.248},{"start":61.248,"end":67.944},{"start":67.944,"end":74.952},{"start":74.952,"end":79.68},{"start":79.68,"end":81.288},{"start":81.288,"end":84.672}]}},{"id":"catherine-deneuve","title":"Catherine Deneuve","chineseTitle":"凯瑟琳·德纳芙","level":"B1","topic":"people","summary":"跨越半个多世纪的法国银幕面孔，也始终警惕被单一形象定义。","groups":[["L’actrice principale du cinéma français contemporain a tourné en 50 ans de carrière plus d’une centaine de films avec les plus grands metteurs en scène.","Catherine Deneuve n’a que 21 ans lorsqu’elle apparaît dans Les Parapluies de Cherbourg, un film de Jacques Demy, récompensé en 1964 par une Palme d’or au Festival de Cannes."],["François Truffaut disait que le caractère mystérieux de Catherine Deneuve apportait de l’ambiguïté et du secret aux situations, aux scénarios, aux rôles qu’elle jouait.","Catherine Deneuve a souvent réfléchi sur cette image qu’elle projette : « Vous connaissez les clichés qui me collent à la peau : glaciale, distante, le feu sous la glace… »","Elle ajoute plus tard : « Il y a un cliché que je ne supporte pas à mon sujet, c’est la grande dame du cinéma français. […] Je ne veux pas être une dame, encore moins une grande »."],["Deneuve, dont le visage a inspiré le buste de Marianne dans les années 80, a reçu de nombreuses récompenses, parmi lesquelles deux Césars de la meilleure actrice pour Le Dernier Métro (1981) de François Truffaut et pour Indochine (1992) de Régis Wargnier.","Plus récemment, elle a obtenu le prix d’Actrice européenne de l’année en 2002 pour son rôle dans Huit Femmes, de François Ozon, ainsi qu’un prix pour l’ensemble de sa carrière au Festival de Cannes de 2008."],["Catherine Deneuve parle avec lucidité de sa profession : « C’est très difficile de vieillir. Pour une femme, c’est déjà difficile de vieillir dans la vie, mais pour une actrice, c’est effrayant de vieillir au cinéma »."]],"highlights":["plus d’une centaine de","n’a que","a souvent réfléchi sur","me collent à la peau","ne supporte pas","encore moins","a reçu de nombreuses récompenses","avec lucidité"],"sentenceTranslations":["这位当代法国电影的重要女演员，在50年职业生涯中与最杰出的导演合作，出演了**一百多部**影片。","凯瑟琳·德纳芙出演雅克·德米的《瑟堡的雨伞》时**只有**21岁；该片于1964年获得戛纳电影节金棕榈奖。","弗朗索瓦·特吕弗曾说，德纳芙的神秘气质为她出演的情境、剧本和角色增添了暧昧与秘密。","德纳芙经常**反思**自己投射出的形象：“你们知道那些**紧贴着我不放**的陈词滥调：冷若冰霜、疏离、冰下之火……”","她后来又说：“有一种关于我的套话，我**无法忍受**，那就是‘法国电影的贵妇’。……我不想做一位夫人，**更不想**做什么伟大的夫人。”","德纳芙的面容曾启发二十世纪八十年代的玛丽安娜半身像；她**获得过许多奖项**，包括凭特吕弗的《最后一班地铁》（1981）和雷吉斯·瓦格涅的《印度支那》（1992）两次获得凯撒最佳女演员奖。","后来，她凭弗朗索瓦·欧容的《八美图》获得2002年欧洲年度女演员奖，并在2008年戛纳电影节获颁终身成就奖。","凯瑟琳·德纳芙**清醒地**谈到自己的职业：“衰老非常困难。对女人来说，在生活中变老已经很难；对女演员来说，在银幕上变老更令人恐惧。”"],"culture":[{"title":"Une présence plutôt qu’un personnage","fr":"Catherine Deneuve est souvent décrite par des mots comme froide, distante ou mystérieuse. Or cette impression vient d’un ensemble très concret : une voix posée, une économie de gestes, un visage que la caméra laisse difficile à lire et des rôles qui jouent avec le secret. Dans Les Parapluies de Cherbourg, sa jeunesse lumineuse accompagne un film entièrement chanté et pourtant traversé par la séparation. Chez Truffaut, Buñuel, Demy ou Ozon, la même actrice peut devenir romantique, ironique, inquiétante ou comique. Une grande carrière ne se réduit donc pas à une image naturelle. Elle repose sur la capacité à laisser les réalisateurs transformer cette image, tout en conservant une présence immédiatement reconnaissable.","zhSentences":["凯瑟琳·德纳芙常被形容为冷淡、疏离或神秘。","但这种印象来自一些非常具体的元素：平稳的声音、克制的动作、镜头难以读懂的面孔，以及围绕秘密展开的角色。","在《瑟堡的雨伞》中，她明亮的青春伴随着一部全程歌唱、却被离别贯穿的电影。","在特吕弗、布努埃尔、德米或欧容的作品里，同一位演员可以变得浪漫、反讽、令人不安或充满喜感。","因此，漫长而重要的演艺生涯不能被简化为一种天生形象。","它依赖演员让导演不断改造这一形象，同时保留一眼可辨的银幕存在感。"],"zh":"凯瑟琳·德纳芙常被形容为冷淡、疏离或神秘。但这种印象来自一些非常具体的元素：平稳的声音、克制的动作、镜头难以读懂的面孔，以及围绕秘密展开的角色。在《瑟堡的雨伞》中，她明亮的青春伴随着一部全程歌唱、却被离别贯穿的电影。在特吕弗、布努埃尔、德米或欧容的作品里，同一位演员可以变得浪漫、反讽、令人不安或充满喜感。因此，漫长而重要的演艺生涯不能被简化为一种天生形象。它依赖演员让导演不断改造这一形象，同时保留一眼可辨的银幕存在感。"},{"title":"Cannes, César et reconnaissance","fr":"Le Festival de Cannes et les César occupent deux places différentes dans le cinéma français. Cannes est un festival international où des films du monde entier sont présentés, discutés et récompensés ; la Palme d’or distingue un film de la compétition principale. Les César, créés dans les années 1970, sont les grandes récompenses annuelles du cinéma français, comparables dans leur fonction aux Oscars américains. Un prix peut attirer le public, faciliter la diffusion d’un film et renforcer une carrière, mais il ne mesure jamais toute la valeur d’une œuvre. Deneuve a traversé ces institutions pendant plusieurs décennies. Sa filmographie permet donc d’observer à la fois l’évolution des styles, la circulation internationale des films français et la manière dont une profession célèbre ses artistes.","zhSentences":["戛纳电影节与凯撒奖在法国电影中扮演不同角色。","戛纳是国际电影节，来自世界各地的影片在此展映、讨论并接受评奖；金棕榈授予主竞赛单元的一部影片。","创立于二十世纪七十年代的凯撒奖，是法国电影界的年度重要奖项，在功能上类似美国奥斯卡。","奖项可以吸引观众、帮助影片传播并巩固职业生涯，但从来不能衡量作品的全部价值。","德纳芙几十年来穿行于这些制度之间。","她的作品目录由此也让人看到电影风格的演变、法国影片的国际流通，以及行业表彰艺术家的方式。"],"zh":"戛纳电影节与凯撒奖在法国电影中扮演不同角色。戛纳是国际电影节，来自世界各地的影片在此展映、讨论并接受评奖；金棕榈授予主竞赛单元的一部影片。创立于二十世纪七十年代的凯撒奖，是法国电影界的年度重要奖项，在功能上类似美国奥斯卡。奖项可以吸引观众、帮助影片传播并巩固职业生涯，但从来不能衡量作品的全部价值。德纳芙几十年来穿行于这些制度之间。她的作品目录由此也让人看到电影风格的演变、法国影片的国际流通，以及行业表彰艺术家的方式。"},{"title":"Vieillir devant la caméra","fr":"La question du vieillissement est particulièrement sensible pour les actrices, car le cinéma et la publicité ont longtemps associé la valeur féminine à la jeunesse. Les rôles proposés aux hommes peuvent continuer à exprimer pouvoir, expérience ou désir, tandis que les femmes plus âgées deviennent moins visibles ou sont enfermées dans quelques types de personnages. En parlant de cette peur, Deneuve ne décrit pas seulement une inquiétude personnelle : elle met en lumière une organisation du regard. Depuis, de nombreuses actrices et réalisatrices réclament des récits plus variés pour tous les âges. Regarder qui apparaît à l’écran, qui est désiré, qui décide et qui raconte permet d’analyser le cinéma comme une institution sociale autant que comme un art.","zhSentences":["衰老问题对女演员尤其敏感，因为电影与广告长期把女性价值同青春联系起来。","男性角色可以继续表现权力、经验或欲望，而年长女性却可能变得不可见，或被限制在少数角色类型中。","德纳芙谈论这种恐惧时，不只是在描述个人忧虑，也照亮了一套观看机制。","此后，许多女演员和女导演要求为各个年龄段提供更多样的叙事。","观察谁出现在银幕上、谁被渴望、谁作决定以及谁讲述故事，可以帮助我们把电影既当作艺术，也当作社会制度来分析。"],"zh":"衰老问题对女演员尤其敏感，因为电影与广告长期把女性价值同青春联系起来。男性角色可以继续表现权力、经验或欲望，而年长女性却可能变得不可见，或被限制在少数角色类型中。德纳芙谈论这种恐惧时，不只是在描述个人忧虑，也照亮了一套观看机制。此后，许多女演员和女导演要求为各个年龄段提供更多样的叙事。观察谁出现在银幕上、谁被渴望、谁作决定以及谁讲述故事，可以帮助我们把电影既当作艺术，也当作社会制度来分析。"}],"hasAudio":true,"audioPack":{"chunks":["audio-packs/catherine-deneuve/01.bin"],"segments":[{"start":0,"end":7.128},{"start":7.128,"end":16.896},{"start":16.896,"end":25.152},{"start":25.152,"end":33.888},{"start":33.888,"end":43.176},{"start":43.176,"end":58.776},{"start":58.776,"end":68.904},{"start":68.904,"end":80.736}]}},{"id":"serge-gainsbourg","title":"Serge Gainsbourg","chineseTitle":"塞尔日·甘斯布","level":"B2","topic":"people","summary":"他以音乐、文字游戏与挑衅不断测试法国流行文化的边界。","groups":[["Le « beau Serge », ainsi qu’il est appelé par une sorte d’antiphrase, occupe une place centrale dans le monde de la chanson française.","Auteur-compositeur-interprète, musicien de talent, acteur, metteur en scène, Serge Gainsbourg a créé un style novateur et provocateur qui l’a rendu immensément populaire."],["Influencé par le jazz et Boris Vian, Gainsbourg écrit en 1958 Le Poinçonneur des Lilas, une chanson qui raconte la routine quotidienne d’un employé d’une station de métro et ses rêves d’évasion.","Gainsbourg produit ensuite des dizaines de chansons et musiques pour lui-même et pour d’autres, comme Juliette Gréco, Françoise Hardy, Brigitte Bardot et surtout France Gall, qui interprète au concours de l’Eurovision 1965 son premier succès planétaire : Poupée de cire, poupée de son."],["Gainsbourg ne craignait pas de choquer : en 1969, sa chanson Je t’aime… moi non plus, chantée en duo avec son épouse Jane Birkin, est interdite dans plusieurs pays.","En 1978, Aux armes et cætera, version reggae de La Marseillaise, provoque un énorme scandale.","En 1984, il brûle un billet de 500 francs dans une émission de télévision pour protester contre les taxes qui financent l’industrie nucléaire.","Gainsbourg cultivait une image d’asocial, d’iconoclaste, manipulant les paradoxes : « La laideur est supérieure à la beauté car elle dure plus longtemps »."],["Serge Gainsbourg meurt en 1991 à 63 ans d’une crise cardiaque, due à l’épuisement, l’excès de tabac et d’alcool."]],"highlights":["ainsi qu’il est appelé","occupe une place centrale","l’a rendu immensément populaire","raconte","la routine quotidienne","pour lui-même et pour d’autres","ne craignait pas de","est interdite dans","pour protester contre"],"sentenceTranslations":["“英俊的塞尔日”——人们以一种反语**这样称呼他**——在法国歌曲世界中**占据核心位置**。","作为创作歌手、才华出众的音乐家、演员和导演，塞尔日·甘斯布创造了一种新颖而挑衅的风格，**使他极受欢迎**。","受到爵士乐和鲍里斯·维昂影响，甘斯布于1958年写下《丁香门的检票员》，歌曲**讲述**一位地铁站员工的**日常重复生活**与逃离梦想。","此后，甘斯布为**自己和其他人**创作数十首歌曲与配乐，包括朱丽叶·格雷科、弗朗索瓦丝·阿尔迪、碧姬·芭铎，尤其是弗朗丝·加尔；后者在1965年欧洲歌唱大赛演唱了他的首支全球热门歌曲《蜡娃娃，声娃娃》。","甘斯布**敢于**冒犯公众：1969年，他与妻子简·伯金合唱的《我爱你……我也不爱你》**在多个国家遭禁**。","1978年，雷鬼版《马赛曲》——《拿起武器等等》——引发巨大争议。","1984年，他在电视节目中烧掉一张500法郎钞票，**以抗议**用于资助核工业的税收。","甘斯布刻意经营反社会、反传统的形象，操弄悖论：“丑高于美，因为它持续得更久。”","塞尔日·甘斯布于1991年因心脏病去世，享年63岁；病因与过度疲劳、烟酒过量有关。"],"culture":[{"title":"La chanson comme art du texte","fr":"La chanson française accorde souvent une grande importance aux paroles, à la voix et au personnage de l’interprète. Gainsbourg maîtrise les rimes, les doubles sens, les références littéraires et les jeux sonores. Il peut raconter un employé de métro, détourner un poème, écrire une chanson légère pour une jeune chanteuse ou construire un album conceptuel. Sa voix limitée selon les critères classiques devient justement un outil expressif : elle parle, murmure et installe une proximité ironique. Comprendre ses chansons demande parfois de reconnaître une citation ou un sous-entendu. Cette densité explique pourquoi ses textes sont étudiés, repris et discutés. Elle montre aussi que la chanson populaire peut dialoguer avec la poésie sans cesser d’être immédiatement mémorable.","zhSentences":["法国歌曲常常非常重视歌词、声音和演唱者塑造的人物。","甘斯布擅长押韵、双关、文学典故和声音游戏。","他可以讲述地铁员工，改写诗歌，为年轻歌手写轻快歌曲，也可以制作概念专辑。","按照传统标准并不宽广的嗓音，反而成为他的表达工具：它说话、低语，营造出反讽的亲近感。","理解他的歌曲有时需要辨认引文或言外之意。","这种密度解释了为什么他的歌词不断被研究、翻唱和讨论。","它也表明，大众歌曲可以与诗歌对话，同时保持令人过耳不忘的特质。"],"zh":"法国歌曲常常非常重视歌词、声音和演唱者塑造的人物。甘斯布擅长押韵、双关、文学典故和声音游戏。他可以讲述地铁员工，改写诗歌，为年轻歌手写轻快歌曲，也可以制作概念专辑。按照传统标准并不宽广的嗓音，反而成为他的表达工具：它说话、低语，营造出反讽的亲近感。理解他的歌曲有时需要辨认引文或言外之意。这种密度解释了为什么他的歌词不断被研究、翻唱和讨论。它也表明，大众歌曲可以与诗歌对话，同时保持令人过耳不忘的特质。"},{"title":"Provocation, scandale et médias","fr":"Gainsbourg comprend très tôt que la télévision ne diffuse pas seulement une chanson : elle fabrique un événement et un personnage. Ses gestes provocateurs attirent l’attention, brouillent la limite entre création et comportement public, puis deviennent eux-mêmes des archives médiatiques. Le scandale peut ouvrir un débat sur la censure, l’argent, le patriotisme ou la sexualité. Mais il peut aussi écraser la musique et blesser les personnes présentes. Il est donc utile de ne pas confondre audace artistique et permission de tout faire. La réception de Gainsbourg reste partagée parce que son œuvre et sa persona sont étroitement mêlées. Cette ambiguïté permet d’étudier la célébrité moderne : l’artiste crée des chansons, tandis que les médias créent continuellement « Gainsbourg » comme spectacle.","zhSentences":["甘斯布很早就明白，电视传播的不只是一首歌，也会制造事件和人物。","他的挑衅举动吸引注意，模糊创作与公共行为的边界，并最终成为媒体档案。","丑闻可以开启关于审查、金钱、爱国主义或性的讨论。","但它也可能压过音乐，并伤害现场的人。","因此，艺术大胆并不等于可以做任何事。","人们对甘斯布评价分裂，正因为他的作品与公众人格紧密交织。","这种暧昧使他成为研究现代名人的例子：艺术家创作歌曲，媒体则不断把“甘斯布”制造成一场表演。"],"zh":"甘斯布很早就明白，电视传播的不只是一首歌，也会制造事件和人物。他的挑衅举动吸引注意，模糊创作与公共行为的边界，并最终成为媒体档案。丑闻可以开启关于审查、金钱、爱国主义或性的讨论。但它也可能压过音乐，并伤害现场的人。因此，艺术大胆并不等于可以做任何事。人们对甘斯布评价分裂，正因为他的作品与公众人格紧密交织。这种暧昧使他成为研究现代名人的例子：艺术家创作歌曲，媒体则不断把“甘斯布”制造成一场表演。"},{"title":"Transformer les genres","fr":"Au fil de sa carrière, Gainsbourg traverse le jazz, le yé-yé, la pop, le rock, le reggae, le funk et les premiers sons électroniques. Il ne se contente pas d’adopter un genre : il le fait rencontrer avec la langue française et avec son propre personnage. La version reggae de La Marseillaise choque certains auditeurs parce qu’elle déplace un symbole national vers une musique venue de Jamaïque. Or cette transformation révèle aussi la circulation mondiale des formes musicales. Les chansons françaises ne sont jamais isolées ; elles empruntent, traduisent et recomposent. Écouter Gainsbourg permet donc d’entendre plusieurs décennies d’histoire culturelle, avec leurs échanges, leurs appropriations et leurs conflits. L’innovation naît souvent précisément à l’endroit où des traditions différentes se rencontrent.","zhSentences":["甘斯布的职业生涯穿越爵士、yé-yé流行、摇滚、雷鬼、放克和早期电子声音。","他不只是采用一种曲风，而是让它与法语以及自己的公众形象相遇。","雷鬼版《马赛曲》让一些听众震惊，因为它把国家象征移入源自牙买加的音乐。","但这种改变也揭示了音乐形式的全球流动。","法国歌曲从来并不孤立，而是不断借用、翻译与重组。","聆听甘斯布，因而可以听见几十年的文化史，包括交流、挪用与冲突。","创新往往正诞生于不同传统相遇之处。"],"zh":"甘斯布的职业生涯穿越爵士、yé-yé流行、摇滚、雷鬼、放克和早期电子声音。他不只是采用一种曲风，而是让它与法语以及自己的公众形象相遇。雷鬼版《马赛曲》让一些听众震惊，因为它把国家象征移入源自牙买加的音乐。但这种改变也揭示了音乐形式的全球流动。法国歌曲从来并不孤立，而是不断借用、翻译与重组。聆听甘斯布，因而可以听见几十年的文化史，包括交流、挪用与冲突。创新往往正诞生于不同传统相遇之处。"}],"hasAudio":true,"audioPack":{"chunks":["audio-packs/serge-gainsbourg/01.bin"],"segments":[{"start":0,"end":7.2},{"start":7.2,"end":17.4},{"start":17.4,"end":27.864},{"start":27.864,"end":42.696},{"start":42.696,"end":52.968},{"start":52.968,"end":59.712},{"start":59.712,"end":67.704},{"start":67.704,"end":76.152},{"start":76.152,"end":83.352}]}},{"id":"yannick-noah","title":"Yannick Noah","chineseTitle":"雅尼克·诺阿","level":"B1","topic":"people","summary":"从网球冠军到歌手，他以多重身份成为多元法国的公众形象。","groups":[["Yannick Noah, la personnalité préférée des Français, est un champion de tennis reconverti en chanteur et acteur de cinéma.","Né en 1960 à Sedan dans l’est de la France, son père camerounais était joueur de football.","Noah vit désormais à New York et son fils Joakim, qu’il a eu avec sa première épouse, Miss Suède 1978, joue dans l’équipe de basket-ball des Chicago Bulls."],["Lorsque Yannick Noah gagne en 1983 le tournoi de Roland-Garros à Paris, une grande émotion s’empare de la France, qui attendait son héros depuis que les « quatre mousquetaires », Lacoste, Borotra, Cochet et Brugnon, avaient régné sur la Coupe Davis à la fin des années 20.","Tout le monde aujourd’hui se souvient du style acrobatique et fantasque du grand Noah sur les courts de tennis, de son « look » à la Bob Marley mais aussi des hauts et des bas de sa carrière."],["Renonçant à la compétition au début des années 90, Noah se concentre alors sur la musique et depuis Saga Africa, qu’on entendait sur toutes les radios en 1991, Noah a produit plusieurs albums, très influencés par les musiques du monde.","Ses origines métisses lui permettent de représenter une France multiculturelle, ouverte sur la diversité.","Noah insère des messages politiques dans ses textes, défend les causes humanitaires, participe à des organisations caritatives, fait la promotion du commerce équitable, de l’agriculture biologique…","Comme il le dit dans une chanson : « Il est grand temps qu’on propose un monde pour demain »."]],"highlights":["reconverti en","vit désormais","une grande émotion s’empare de","se souvient du","des hauts et des bas","se concentre alors sur","ouverte sur la diversité","Il est grand temps qu’on"],"sentenceTranslations":["深受法国人喜爱的雅尼克·诺阿是一位网球冠军，后来**转型为**歌手和电影演员。","他1960年出生于法国东部的色当，父亲来自喀麦隆，曾是足球运动员。","诺阿**现在生活在**纽约；他与第一任妻子、1978年瑞典小姐所生的儿子乔金曾效力于芝加哥公牛篮球队。","1983年诺阿在巴黎赢得法网时，巨大的激动情绪**席卷法国**；法国自二十世纪二十年代末拉科斯特、博罗特拉、科歇和布吕尼翁“四个火枪手”统治戴维斯杯以来，一直等待自己的英雄。","今天，人们都**记得**高大的诺阿在网球场上杂技般、奔放的风格，记得他模仿鲍勃·马利的造型，也记得职业生涯的**起起落落**。","二十世纪九十年代初退出竞技后，诺阿开始**专注于**音乐；自1991年各电台反复播放《Saga Africa》以来，他制作了多张深受世界音乐影响的专辑。","他的混合族裔背景使他能够代表一个多元文化、**向多样性开放**的法国。","诺阿在歌词中加入政治信息，支持人道主义事业，参与慈善组织，并推广公平贸易和有机农业……","正如他在一首歌中所说：“**早就该**为明天提出一个新的世界了。”"],"culture":[{"title":"Roland-Garros et la terre battue","fr":"Roland-Garros est l’un des quatre tournois majeurs du tennis mondial et le seul joué sur terre battue. Cette surface ralentit la balle, prolonge les échanges et demande endurance, patience et capacité à glisser. Pour le public français, le tournoi est aussi un rendez-vous du printemps, suivi à la télévision et associé à un stade parisien très reconnaissable. La victoire de Noah en 1983 a pris une dimension particulière parce qu’aucun Français n’avait remporté le simple messieurs depuis longtemps. Les images de son père entrant sur le court et de leur embrassade ont renforcé l’émotion collective. Une performance sportive devient ainsi mémoire nationale lorsqu’elle réunit résultat, récit familial et moment partagé.","zhSentences":["罗兰·加洛斯是世界网球四大满贯之一，也是唯一在红土场上举行的一项。","这种场地会减慢球速、延长回合，要求耐力、耐心和滑步能力。","对法国公众来说，法网也是春季固定节目，人们通过电视观看，也熟悉那座巴黎球场。","诺阿1983年的胜利尤其重要，因为法国选手已多年没有赢得男单冠军。","他父亲走入球场以及父子拥抱的画面，进一步强化了集体情感。","当比赛结果、家庭叙事和共享时刻结合起来，体育表现便可能成为国家记忆。"],"zh":"罗兰·加洛斯是世界网球四大满贯之一，也是唯一在红土场上举行的一项。这种场地会减慢球速、延长回合，要求耐力、耐心和滑步能力。对法国公众来说，法网也是春季固定节目，人们通过电视观看，也熟悉那座巴黎球场。诺阿1983年的胜利尤其重要，因为法国选手已多年没有赢得男单冠军。他父亲走入球场以及父子拥抱的画面，进一步强化了集体情感。当比赛结果、家庭叙事和共享时刻结合起来，体育表现便可能成为国家记忆。"},{"title":"Changer de carrière publiquement","fr":"Passer du tennis professionnel à la chanson est une reconversion très visible. Le sportif est jugé sur des résultats mesurables, tandis que le chanteur doit construire une voix, un répertoire et une relation différente avec le public. Noah s’appuie sur son énergie scénique, son image chaleureuse et des rythmes faciles à reprendre ensemble. Cette continuité aide le public à accepter le changement, mais elle ne garantit pas le succès musical. En France, sa trajectoire nourrit l’image d’une personnalité proche des gens, capable de réunir plusieurs générations. Elle montre aussi qu’une célébrité peut circuler entre sport, musique, publicité et engagement associatif. Chaque domaine transforme pourtant la manière dont son authenticité est évaluée.","zhSentences":["从职业网球转向歌唱，是一种高度公开的职业转换。","运动员由可量化成绩评判，歌手则要建立声音、曲目和与公众之间的新关系。","诺阿借助舞台活力、温暖形象和容易合唱的节奏。","这种连续性有助于公众接受变化，却不能自动保证音乐成功。","在法国，他的经历塑造了一个亲近大众、能够连接几代人的公众人物形象。","它也表明，名人可以在体育、音乐、广告和公益投入之间流动。","不过，每个领域都会改变人们评判其真实性的方式。"],"zh":"从职业网球转向歌唱，是一种高度公开的职业转换。运动员由可量化成绩评判，歌手则要建立声音、曲目和与公众之间的新关系。诺阿借助舞台活力、温暖形象和容易合唱的节奏。这种连续性有助于公众接受变化，却不能自动保证音乐成功。在法国，他的经历塑造了一个亲近大众、能够连接几代人的公众人物形象。它也表明，名人可以在体育、音乐、广告和公益投入之间流动。不过，每个领域都会改变人们评判其真实性的方式。"},{"title":"Représenter la diversité","fr":"Les médias ont souvent présenté Noah comme le symbole d’une France métissée et ouverte. Une telle représentation peut être positive, car elle rend visible une identité française qui ne se réduit pas à une origine unique. Mais elle peut aussi demander à une seule personne de porter une diversité beaucoup plus complexe. Être franco-camerounais, champion, chanteur ou père d’un sportif américain ne compose pas automatiquement un message politique cohérent. Il faut écouter ce que la personne dit, mais aussi observer ce que le public projette sur elle. Cette distinction est utile pour comprendre les célébrités issues de l’immigration : elles sont souvent admirées pour leur réussite individuelle tout en devenant, parfois malgré elles, des preuves supposées de l’intégration nationale.","zhSentences":["媒体常把诺阿塑造成混合族裔、开放法国的象征。","这种表现具有积极意义，因为它让不被单一出身限制的法国身份变得可见。","但它也可能要求一个人承担远比个人复杂的多样性。","法国—喀麦隆背景、冠军、歌手或美国运动员之父等身份，并不会自动组成连贯的政治信息。","既要听这个人自己说了什么，也要观察公众把什么投射到他身上。","这种区分有助于理解具有移民背景的名人：他们常因个人成功受赞赏，同时又可能并非自愿地被当作国家融合的证明。"],"zh":"媒体常把诺阿塑造成混合族裔、开放法国的象征。这种表现具有积极意义，因为它让不被单一出身限制的法国身份变得可见。但它也可能要求一个人承担远比个人复杂的多样性。法国—喀麦隆背景、冠军、歌手或美国运动员之父等身份，并不会自动组成连贯的政治信息。既要听这个人自己说了什么，也要观察公众把什么投射到他身上。这种区分有助于理解具有移民背景的名人：他们常因个人成功受赞赏，同时又可能并非自愿地被当作国家融合的证明。"}],"hasAudio":true,"audioPack":{"chunks":["audio-packs/yannick-noah/01.bin"],"segments":[{"start":0,"end":6.912},{"start":6.912,"end":12.456},{"start":12.456,"end":21.696},{"start":21.696,"end":36.984},{"start":36.984,"end":45.816},{"start":45.816,"end":58.872},{"start":58.872,"end":64.752},{"start":64.752,"end":75.408},{"start":75.408,"end":80.112}]}},{"id":"edith-piaf","title":"Édith Piaf","chineseTitle":"艾迪特·皮雅芙","level":"B1","topic":"people","summary":"她把坎坷人生、爱情与巴黎大众世界唱成了法国歌曲神话。","groups":[["Sa personnalité, l’aventure de sa vie, ses œuvres, son talent exceptionnel, tout contribue à former un grand mythe : la « môme Piaf », 1,47 m, toute frêle, fille d’un acrobate et d’une chanteuse de rue, c’est l’histoire peu ordinaire d’une femme dont la passion et l’énergie étaient immenses, depuis ses débuts d’adolescente dans les cabarets de Pigalle des années trente jusqu’à la dame de la maturité, épuisée par la maladie, l’alcool, les médicaments et le travail."],["Les chansons de Piaf sont des classiques qui racontent l’amour : Mon légionnaire (1936), qui l’a rendue célèbre à 21 ans ; La Vie en rose, qu’elle a écrite en 1945, après les années noires de la guerre ; L’Hymne à l’amour, qu’elle compose en 1949, au soir de la mort dans un accident d’avion de son compagnon Marcel Cerdan, champion du monde de boxe ; plus tard, c’est Milord (1957), puis Non, je ne regrette rien (1959).","Au cours de sa carrière, Édith Piaf a écrit près de 80 titres et elle en a interprété beaucoup d’autres composés pour elle."],["Le public s’est identifié aux accents vrais et émouvants de cette femme qui chante la classe populaire, le monde de la prostitution, le petit peuple parisien.","La destinée de Piaf a été courte, chaotique et tragique, elle chantait ses chansons avec la même ferveur qu’elle vivait sa vie."],["Édith Piaf meurt en 1963, à l’âge de 47 ans.","Dans le film d’Olivier Dahan, La Môme (2007), Marion Cotillard fait revivre cette légende de la chanson française."]],"highlights":["tout contribue à","depuis ses débuts","l’a rendue célèbre","Au cours de sa carrière","s’est identifié aux","avec la même ferveur","à l’âge de","fait revivre"],"sentenceTranslations":["她的性格、人生历险、作品与非凡才华，**共同促成了**一个伟大神话：“小姑娘皮雅芙”身高1.47米，瘦小纤弱，是杂技演员和街头歌手之女；这位激情与能量都无比强烈的女性，有着不同寻常的人生——**从她初登台**于二十世纪三十年代皮加勒的歌舞厅，到成熟后被疾病、酒精、药物和工作耗尽。","皮雅芙的歌曲是讲述爱情的经典：《我的军团兵》（1936）让她在21岁时**成
