function cards(xs){return xs.length?xs.map(a=>'<a class="article-card" href="'+withBase('/article/'+a.id+'/')+'"><span class="level">'+a.level+'</span><span><h2 lang="fr">'+esc(a.title)+'</h2><p>'+esc(a.chineseTitle)+' · '+esc(a.summary)+'</p></span><span class="go">→</span></a>').join(''):'<p class="empty">这一组文章正在逐篇校对和制作中。</p>'}function home(){let controls='',xs=DATA.articles;if(view==='level'){xs=level==='ALL'?xs:xs.filter(a=>a.level===level);controls='<div class="filters">'+['ALL','A2','B1','B2'].map(x=>'<button class="filter '+(level===x?'active':'')+'" data-level="'+x+'">'+(x==='ALL'?'全部级别':x)+'</button>').join('')+'</div>'}else{xs=topic==='ALL'?xs:xs.filter(a=>a.topic===topic);controls='<div class="topic-grid">'+DATA.topics.map(t=>{const ready=DATA.articles.filter(a=>a.topic===t.id).length;return '<button class="topic '+(topic===t.id?'active':'')+'" data-topic="'+t.id+'"><span><strong>'+esc(t.zh)+'</strong>'+esc(t.fr)+'</span><span>'+ready+' / '+t.total+' 篇</span></button>'}).join('')+'</div>'}const legal='<aside class="site-legal" aria-label="版权说明"><strong>版权说明</strong><p>本网站为非商业个人学习项目。教材原文主要选自德尼·C.梅耶尔编著的《阅读法国80篇》，相关版权归原作者及出版机构所有。本站不提供原书下载，不替代原书购买与阅读；如权利人对相关内容有异议，将及时删除或调整。</p></aside>';return '<main class="shell">'+headerTemplate('读一篇，走近一种生活')+'<section class="home-hero"><p class="eyebrow">French reading library</p><h1>从一篇短文，走进法国的日常文化。</h1><p>按照法语级别或书中主题选读。每篇均有自然女声全文朗读、逐句点读，以及三段法中双语文化补充。</p></section><section><div class="library-head"><p class="section-label">文章目录 · Articles</p><span class="count">已上线 '+DATA.articles.length+' / 80 篇</span></div><div class="view-tabs"><button class="view-tab '+(view==='level'?'active':'')+'" data-view="level">按级别 A2–B2</button><button class="view-tab '+(view==='topic'?'active':'')+'" data-view="topic">按书中主题</button></div>'+controls+'<div class="catalogue">'+cards(xs)+'</div></section>'+legal+'<footer>France en textes · Lire, écouter, comprendre</footer></main>'}
function emphasis(a,s){const terms=(a.highlights||[]).slice().sort((x,y)=>y.length-x.length);if(!terms.length)return esc(s);const re=new RegExp('('+terms.map(reEsc).join('|')+')','g');return s.split(re).map(x=>terms.includes(x)?'<strong class="term">'+esc(x)+'</strong>':esc(x)).join('')}function richZh(s){return esc(s).replace(/\*\*(.+?)\*\*/g,'<strong class="term">$1</strong>')}function page(a){art=a;const flat=a.groups.flat(),meta=DATA.topics.find(t=>t.id===a.topic)||{};let n=0;const blocks=a.groups.map(g=>'<section class="reader-block">'+g.map(s=>{const i=n++;const translation=expanded===i?'<span class="sentence-zh">'+richZh(a.sentenceTranslations[i])+'</span>':'';return '<button class="sentence '+(cur===i?'current':'')+'" data-sentence="'+i+'" aria-pressed="'+(cur===i&&playing)+'"><span class="sentence-no">'+String(i+1).padStart(2,'0')+'</span><span class="sentence-fr" lang="fr">'+emphasis(a,s)+'</span>'+translation+'</button>'}).join('')+'</section>').join('');const culture=a.culture.map(x=>'<article class="culture-item"><h3 lang="fr">'+esc(x.title)+'</h3><p class="culture-fr" lang="fr">'+esc(x.fr)+'</p><p class="culture-zh">'+esc(x.zh)+'</p></article>').join('');const status=cur<0?'准备就绪':(playing?'正在朗读':'已暂停')+' · 第 '+(cur+1)+' / '+flat.length+' 句',visual=a.topic==='food';return '<main class="shell">'+headerTemplate('文章阅读')+'<article><header class="article-head '+(visual?'article-head-visual':'')+'"'+(visual?' style="--hero-image:url('+withBase('/images/'+a.id+'-hero.webp')+')"':'')+'><button class="back" data-home>← 返回文章目录</button><div class="article-meta"><span class="level">'+a.level+'</span><span>'+esc(meta.fr)+' · '+esc(meta.zh)+'</span></div><h1 lang="fr">'+esc(a.title)+'</h1><p class="article-cn-title">'+esc(a.chineseTitle)+' · 法语点读</p><p class="article-summary">'+esc(a.summary)+' 单击播放或暂停；双击句子显示对应中文；粗体标出重点表达及其中文对应。</p></header><section class="player"><button class="primary" data-play-all><span class="play-disc">'+ico(false)+'</span>朗读全篇</button><div class="speed"><span>语速</span><div class="speed-group"><button data-speed="0.85" class="'+(speed===.85?'active':'')+'">0.85× 慢速</button><button data-speed="1" class="'+(speed===1?'active':'')+'">1× 自然</button></div></div><div class="status"><span class="dot '+(playing?'playing':'')+'"></span><span>'+status+'</span></div></section><section>'+blocks+'</section><section class="culture"><p class="culture-kicker">Culture en contexte</p><h2>从 « '+esc(a.title)+' » 读懂法国文化</h2><p class="culture-intro">每段法语约 100–200 词；先读原文，再按句序对照中文，理解词语背后的生活方式。</p>'+culture+'</section></article><footer>Cliquer · Écouter · Répéter</footer></main>'}
function render(){const a=route();app.innerHTML=a?page(a):home();if(!a)art=null}function finishReading(){const total=art?art.groups.flat().length:0;if(!art?.audioPack&&continuous&&cur<total-1){play(cur+1,true);return}cur=-1;playing=false;continuous=false;nativeVoice=false;render()}function preferredFrenchVoice(){if(!('speechSynthesis'in window))return null;const voices=speechSynthesis.getVoices().filter(v=>/^fr(-|_)/i.test(v.lang));return voices.find(v=>/(amélie|audrey|denise|hortense|julie|marie|sylvie|virginie|zoé|female|femme)/i.test(v.name))||voices[0]||null}function playNative(i,all){audioLoadToken++;if(!('speechSynthesis'in window)){playing=false;render();return}audio.pause();speechSynthesis.cancel();cur=i;continuous=!!all;nativeVoice=true;playing=true;const u=new SpeechSynthesisUtterance(art.groups.flat()[i]);u.lang='fr-FR';u.rate=speed;const voice=preferredFrenchVoice();if(voice)u.voice=voice;u.onend=()=>{if(nativeVoice)finishReading()};u.onerror=()=>{nativeVoice=false;playing=false;continuous=false;render()};render();speechSynthesis.speak(u)}function packedAudioUrl(a){if(audioCache.has(a.id))return audioCache.get(a.id);const p=Promise.all(a.audioPack.chunks.map(x=>fetch(withBase('/'+x)).then(r=>{if(!r.ok)throw new Error('audio '+r.status);return r.arrayBuffer()}))).then(parts=>URL.createObjectURL(new Blob(parts,{type:'audio/mpeg'}))).catch(e=>{audioCache.delete(a.id);throw e});audioCache.set(a.id,p);return p}function ensureAudioSource(src){if(audio.src===src&&audio.readyState>=1)return Promise.resolve();return new Promise((resolve,reject)=>{const done=()=>{clean();resolve()},fail=()=>{clean();reject(new Error('audio metadata'))},clean=()=>{audio.removeEventListener('loadedmetadata',done);audio.removeEventListener('error',fail)};audio.addEventListener('loadedmetadata',done);audio.addEventListener('error',fail);audio.src=src;audio.load()})}async function play(i,all){if(!art)return;if(!art.hasAudio){playNative(i,all);return}stopNative();const target=art,token=++audioLoadToken;cur=i;continuous=!!all;playing=true;audio.pause();render();try{if(target.audioPack){const src=await packedAudioUrl(target);if(token!==audioLoadToken||art!==target)return;await ensureAudioSource(src);if(token!==audioLoadToken||art!==target)return;const seg=target.audioPack.segments[i];audio.currentTime=seg.start;segmentEnd=seg.end}else{audio.src=withBase('/audio/'+target.id+'/'+String(i+1).padStart(2,'0')+'.mp3');audio.currentTime=0}audio.playbackRate=speed;await audio.play()}catch(e){if(token===audioLoadToken){playing=false;continuous=false;render()}}}function toggleSentence(i){if(!art)return;if(cur===i){if(nativeVoice&&'speechSynthesis'in window){if(speechSynthesis.paused){speechSynthesis.resume();playing=true}else{speechSynthesis.pause();playing=false;continuous=false}render();return}if(audio.src){if(audio.paused){audio.playbackRate=speed;audio.play().then(()=>{playing=true;render()}).catch(()=>{playing=false;render()})}else{audio.pause();playing=false;continuous=false;render()}return}}play(i,false)}audio.addEventListener('timeupdate',()=>{if(!art?.audioPack||!playing)return;const segs=art.audioPack.segments;if(continuous){let i=segs.findIndex((s,j)=>audio.currentTime<s.end-.02||j===segs.length-1);if(i>=0&&i!==cur){cur=i;render()}}else if(audio.currentTime>=segmentEnd-.03){audio.pause();finishReading()}});audio.addEventListener('ended',()=>{if(!nativeVoice)finishReading()});app.addEventListener('click',e=>{const l=e.target.closest('[data-link]');if(l){e.preventDefault();nav(l.getAttribute('href'));return}if(e.target.closest('[data-home]')){nav('/?topic='+(art?.topic||topic));return}const v=e.target.closest('[data-view]');if(v){view=v.dataset.view;render();return}const f=e.target.closest('[data-level]');if(f){level=f.dataset.level;render();return}const t=e.target.closest('[data-topic]');if(t){topic=t.dataset.topic;history.replaceState({},'',withBase('/?topic='+topic));render();return}const s=e.target.closest('[data-sentence]');if(s){clearTimeout(clickTimer);clickTimer=setTimeout(()=>{clickTimer=0;toggleSentence(Number(s.dataset.sentence))},300);return}if(e.target.closest('[data-play-all]')){play(0,true);return}const b=e.target.closest('[data-speed]');if(b){speed=Number(b.dataset.speed);audio.playbackRate=speed;render()}});app.addEventListener('dblclick',e=>{const s=e.target.closest('[data-sentence]');if(!s)return;e.preventDefault();clearTimeout(clickTimer);clickTimer=0;const i=Number(s.dataset.sentence);expanded=expanded===i?-1:i;render()});addEventListener('popstate',()=>{audio.pause();audioLoadToken++;stopNative();cur=-1;expanded=-1;playing=false;render()});render();</script></body></html>
