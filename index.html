<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="theme-color" content="#76273a"><meta name="description" content="法语短文点读与法国文化双语阅读"><title>法国阅读 · France en textes</title><style>
    :root {
      --paper: #f5f0e7;
      --paper-deep: #ebe0d0;
      --ink: #24201e;
      --muted: #766e66;
      --wine: #76273a;
      --wine-deep: #591b2a;
      --line: rgba(79, 61, 49, .18);
      --card: rgba(255, 253, 248, .78);
      --soft: rgba(118, 39, 58, .08);
    }
    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      background: radial-gradient(circle at 12% 4%, rgba(255,255,255,.86), transparent 32rem), linear-gradient(180deg, #f8f3eb, var(--paper));
      font-family: Arial, Helvetica, sans-serif;
    }
    button, select { font: inherit; }
    button { cursor: pointer; }
    a { color: inherit; }
    .shell { width: min(980px, calc(100% - 34px)); margin: 0 auto; padding: 36px 0 54px; }
    .topbar { display: flex; align-items: center; justify-content: space-between; gap: 18px; padding-bottom: 34px; }
    .brand { display: flex; align-items: center; gap: 11px; text-decoration: none; }
    .brand-mark { display: grid; place-items: center; width: 34px; height: 34px; border-radius: 50%; background: var(--wine); color: white; font: italic 600 18px/1 Georgia, serif; }
    .brand-word { font: 600 15px/1 Georgia, serif; letter-spacing: .05em; }
    .top-note { color: var(--muted); font-size: 12px; letter-spacing: .08em; }
    .home-hero { padding: 40px 6px 54px; }
    .eyebrow { margin: 0 0 18px; color: var(--wine); font-size: 12px; font-weight: 700; letter-spacing: .16em; text-transform: uppercase; }
    h1, h2, h3, p { margin-top: 0; }
    h1 { max-width: 760px; margin-bottom: 22px; font: 400 clamp(48px, 8vw, 82px)/.96 Georgia, "Times New Roman", serif; letter-spacing: -.045em; }
    .home-hero p:last-child { max-width: 600px; margin: 0; color: var(--muted); font-size: 16px; line-height: 1.85; }
    .section-label { display: flex; align-items: center; gap: 12px; margin: 0 6px 18px; color: var(--muted); font-size: 12px; font-weight: 700; letter-spacing: .13em; text-transform: uppercase; }
    .section-label::after { content: ""; flex: 1; height: 1px; background: var(--line); }
    .catalogue { display: grid; gap: 14px; }
    .article-card { display: grid; grid-template-columns: auto 1fr auto; gap: 22px; align-items: center; width: 100%; padding: 27px; border: 1px solid rgba(255,255,255,.75); border-radius: 22px; background: var(--card); box-shadow: 0 18px 48px rgba(75,54,36,.08); text-align: left; text-decoration: none; transition: transform .18s ease, box-shadow .18s ease, border-color .18s ease; }
    .article-card:hover { transform: translateY(-3px); border-color: rgba(118,39,58,.28); box-shadow: 0 24px 56px rgba(75,54,36,.13); }
    .level { display: grid; place-items: center; width: 45px; height: 28px; border-radius: 999px; background: var(--ink); color: #f8f2e9; font-size: 12px; font-weight: 700; letter-spacing: .08em; }
    .article-card h2 { margin: 0 0 7px; font: italic 400 36px/1 Georgia, serif; letter-spacing: -.03em; }
    .article-card p { margin: 0; color: var(--muted); font-size: 14px; line-height: 1.55; }
    .go { display: grid; place-items: center; width: 38px; height: 38px; border: 1px solid var(--line); border-radius: 50%; color: var(--wine); font-size: 23px; }
    .article-head { padding: 22px 6px 32px; }
    .back { display: inline-flex; align-items: center; gap: 7px; margin-bottom: 34px; padding: 0; border: 0; color: var(--muted); background: transparent; font-size: 14px; }
    .back:hover { color: var(--wine); }
    .article-meta { display: flex; align-items: center; gap: 10px; margin-bottom: 24px; color: var(--muted); font-size: 12px; font-weight: 700; letter-spacing: .12em; text-transform: uppercase; }
    .article-title-row { display: flex; align-items: flex-end; justify-content: space-between; gap: 22px; }
    .article-head h1 { margin: 0; font-style: italic; }
    .article-cn-title { margin: 17px 0 0 5px; color: var(--wine); font-size: 14px; font-weight: 700; letter-spacing: .16em; }
    .article-summary { max-width: 600px; margin: 27px 0 0 5px; color: var(--muted); font-size: 15px; line-height: 1.8; }
    .player { position: sticky; top: 12px; z-index: 5; display: grid; grid-template-columns: auto auto 1fr auto; align-items: center; gap: 11px; margin: 0 0 20px; padding: 15px; border: 1px solid rgba(255,255,255,.8); border-radius: 20px; background: rgba(255,253,248,.9); box-shadow: 0 18px 48px rgba(75,54,36,.13); backdrop-filter: blur(16px); }
    .primary, .secondary, .speed button { border: 0; transition: background .16s ease, transform .16s ease, color .16s ease; }
    .primary { display: inline-flex; align-items: center; gap: 9px; padding: 9px 16px 9px 10px; border-radius: 999px; background: var(--wine); color: white; font-weight: 700; }
    .primary:hover { background: var(--wine-deep); transform: translateY(-1px); }
    .play-disc { display: grid; place-items: center; width: 30px; height: 30px; border-radius: 50%; background: rgba(255,255,255,.18); }
    .secondary { display: inline-flex; align-items: center; gap: 6px; padding: 10px 12px; border-radius: 10px; color: var(--muted); background: transparent; }
    .secondary:hover:not(:disabled) { background: var(--paper-deep); color: var(--ink); }
    .secondary:disabled { cursor: not-allowed; opacity: .35; }
    .play-icon { width: 18px; height: 18px; fill: none; stroke: currentColor; stroke-linecap: round; stroke-linejoin: round; stroke-width: 1.8; }
    .play-icon.triangle path { fill: currentColor; stroke: currentColor; }
    .speed { display: flex; align-items: center; justify-content: center; gap: 10px; color: var(--muted); font-size: 12px; font-weight: 700; }
    .speed span { white-space: nowrap; }

    .speed button { padding: 7px 10px; border-radius: 8px; color: var(--muted); background: transparent; font-size: 12px; }

    .status { display: flex; align-items: center; justify-content: flex-end; gap: 8px; color: var(--muted); font-size: 12px; white-space: nowrap; }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: #c1b6a8; }
    .dot.playing { background: var(--wine); box-shadow: 0 0 0 4px rgba(118,39,58,.12); }
    .reader-block { margin-top: 8px; }
    .reader-block + .reader-block { margin-top: 24px; padding-top: 24px; border-top: 1px solid rgba(118,39,58,.15); }
    .sentence { display: grid; grid-template-columns: 38px 1fr 36px; gap: 17px; align-items: start; width: 100%; padding: 21px 18px; border: 1px solid transparent; border-bottom-color: var(--line); border-radius: 14px; color: var(--ink); background: transparent; text-align: left; transition: background .16s ease, transform .16s ease, box-shadow .16s ease; }
    .sentence:hover { background: var(--card); transform: translateX(3px); }
    .sentence.current { border-color: rgba(118,39,58,.28); background: rgba(255,253,248,.94); box-shadow: inset 4px 0 0 var(--wine), 0 11px 25px rgba(72,49,33,.08); }
    .sentence-no { padding-top: 5px; color: #a19689; font-size: 11px; font-weight: 700; letter-spacing: .1em; }
    .sentence-fr { font: 400 clamp(19px, 2.3vw, 24px)/1.65 Georgia, "Times New Roman", serif; }
    .sentence.current .sentence-fr { color: var(--wine-deep); }
    .sentence-action { display: grid; place-items: center; width: 34px; height: 34px; border: 1px solid var(--line); border-radius: 50%; color: var(--muted); }
    .sentence.current .sentence-action { color: white; background: var(--wine); border-color: var(--wine); }
    .culture { margin-top: 56px; padding: 34px; border: 1px solid rgba(118,39,58,.16); border-radius: 26px; background: linear-gradient(135deg, rgba(255,253,248,.9), rgba(238,224,208,.76)); }
    .culture-kicker { margin: 0 0 11px; color: var(--wine); font-size: 12px; font-weight: 700; letter-spacing: .15em; text-transform: uppercase; }
    .culture h2 { margin-bottom: 10px; font: 400 40px/1.06 Georgia, serif; letter-spacing: -.03em; }
    .culture-intro { margin-bottom: 25px; color: var(--muted); line-height: 1.7; }
    .culture-item { padding: 24px 0; border-top: 1px solid rgba(118,39,58,.16); }
    .culture-item h3 { margin: 0 0 14px; color: var(--wine-deep); font: italic 400 26px/1.2 Georgia, serif; }
    .culture-fr { margin-bottom: 15px; font: 400 17px/1.8 Georgia, "Times New Roman", serif; }
    .culture-zh { margin: 0; padding: 15px 17px; border-left: 3px solid rgba(118,39,58,.55); color: #5f5750; background: rgba(255,255,255,.45); font-size: 14px; line-height: 1.85; }
    .culture-zh strong { display: block; margin-bottom: 5px; color: var(--wine); font-size: 12px; letter-spacing: .08em; }
    footer { padding: 44px 0 10px; color: var(--muted); font: italic 400 13px/1.5 Georgia, serif; letter-spacing: .16em; text-align: center; }
    button:focus-visible, a:focus-visible { outline: 3px solid rgba(118,39,58,.35); outline-offset: 3px; }
    @media (max-width: 720px) {
      .shell { width: min(100% - 22px, 980px); padding-top: 22px; }
      .topbar { padding-bottom: 18px; }
      .home-hero { padding: 32px 4px 42px; }
      .player { grid-template-columns: 1fr auto; }
      .speed { justify-content: flex-start; }
      .status { grid-column: 1 / -1; justify-content: flex-start; }
      .culture { padding: 25px 20px; }
    }
    @media (max-width: 520px) {
      .top-note { display: none; }

      .article-card .go { display: none; }
      .article-card h2 { font-size: 31px; }
      .player { position: static; grid-template-columns: 1fr; gap: 9px; }
      .speed { justify-content: space-between; }
      .status { grid-column: auto; }
      .sentence { grid-template-columns: 27px 1fr; gap: 9px; padding: 18px 8px; }
      .sentence-action { display: none; }
      .culture h2 { font-size: 34px; }
    }
    @media (prefers-reduced-motion: reduce) { *, *::before, *::after { scroll-behavior: auto !important; transition-duration: .01ms !important; } }

</style></head><body><div id="app"></div><script>
const BASE="/french-reading-site",DATA={"articles":[{"id":"aperitif","title":"Apéritif","chineseTitle":"开胃酒","level":"A2","topic":"food","summary":"餐前相聚，也是一种法国式社交时间。","groups":[["L’apéritif, qu’on appelle aussi l’apéro, est avant tout un rituel social, il a lieu avant les repas, déjeuner ou dîner.","On prend l’apéro au café ou à la maison, avec des amis, en famille."],["Le prétexte de l’apéritif est d’ouvrir l’appétit, de préparer au plaisir du repas.","Les boissons traditionnelles sont le pastis, le martini, le porto, le kir (mélange de vin blanc et de sirop de cassis), des cocktails ou tout simplement un jus de fruits pour ceux qui ne boivent pas d’alcool.","Les boissons sont servies avec des cacahuètes, des petits biscuits salés, des olives ou toutes sortes de bouchées imaginées par les hôtes.","Parfois, l’apéro peut même se substituer au repas."],["On arrive chez des amis « à l’heure de l’apéro », c’est-à-dire bien avant le repas.","Ce moment passé ensemble est l’occasion de conversations générales et détendues entre les convives ; mais si la discussion touche un sujet controversé, comme c’est souvent le cas, les débats peuvent devenir rapidement animés et bruyants."]],"culture":[{"title":"Un temps pour se retrouver","fr":"En France, l’apéritif n’est pas seulement une boisson prise avant le repas : c’est un moment de relation. On dit souvent « prendre l’apéro » ou simplement « faire un apéro » pour inviter des amis, des voisins ou la famille à se retrouver après le travail ou avant le dîner. La table est généralement simple : quelques verres, des chips, des olives, des noix ou un peu de fromage suffisent. L’idée principale est de parler sans se presser et de laisser la soirée commencer doucement. Dans beaucoup de familles, l’apéro marque la transition entre la journée privée et le temps partagé. Il peut durer vingt minutes ou beaucoup plus longtemps, selon les personnes et l’occasion. Aujourd’hui, des boissons sans alcool y trouvent aussi naturellement leur place.","zh":"在法国，开胃酒不只是正餐前喝的一杯饮料，更是一段维系关系的时间。人们常说“喝开胃酒”或简单地说“办一场 apéro”，邀请朋友、邻居或家人在下班后或晚餐前相聚。桌面通常很简单：几杯饮料、薯片、橄榄、坚果或少量奶酪就足够了。最重要的是不慌不忙地聊天，让夜晚徐徐展开。在许多家庭中，apéro 标志着个人的一天向共享时光的过渡。它可以持续二十分钟，也可以久得多，具体取决于参与者和场合。如今，无酒精饮料也自然而然地在其中占有一席之地。","zhSentences":["在法国，开胃酒不只是正餐前喝的一杯饮料，更是一段维系关系的时间。","人们常说“喝开胃酒”或简单地说“办一场 apéro”，邀请朋友、邻居或家人在下班后或晚餐前相聚。","桌面通常很简单：几杯饮料、薯片、橄榄、坚果或少量奶酪就足够了。","最重要的是不慌不忙地聊天，让夜晚徐徐展开。","在许多家庭中，apéro 标志着个人的一天向共享时光的过渡。","它可以持续二十分钟，也可以久得多，具体取决于参与者和场合。","如今，无酒精饮料也自然而然地在其中占有一席之地。"]},{"title":"Des goûts régionaux","fr":"Les boissons de l’apéritif varient beaucoup d’une région française à l’autre. En Provence, le pastis anisé est très connu et se boit souvent allongé d’eau fraîche. En Bourgogne, le kir associe du vin blanc et de la crème de cassis ; son nom rappelle un chanoine de Dijon qui l’a popularisé. En Alsace, une bière locale et un bretzel peuvent très bien ouvrir le repas. Ailleurs, on choisit un verre de vin, du cidre, un vermouth ou un jus de fruits. Les petites choses à manger racontent aussi un territoire : gougères au fromage, tapenade, charcuterie, radis avec du beurre, ou crackers maison. Il n’existe donc pas un seul apéritif français, mais une multitude de façons locales de recevoir.","zh":"法国各地区的开胃酒饮品差异很大。在普罗旺斯，茴香味的 pastis 很有名，饮用时常兑入凉水。在勃艮第，kir 由白葡萄酒和黑加仑甜酒调成；它的名字让人想起那位曾推广这种饮品的第戎教士。在阿尔萨斯，一杯本地啤酒配一个椒盐卷饼也很适合为正餐开场。在其他地方，人们会选择一杯葡萄酒、苹果酒、味美思或果汁。搭配的小食同样诉说着地方特色：奶酪泡芙、橄榄酱、冷切肉、黄油配小萝卜或自制饼干。因此，并不存在唯一一种法国开胃酒，而是有许多地方性的待客方式。","zhSentences":["法国各地区的开胃酒饮品差异很大。","在普罗旺斯，茴香味的 pastis 很有名，饮用时常兑入凉水。","在勃艮第，kir 由白葡萄酒和黑加仑甜酒调成；它的名字让人想起那位曾推广这种饮品的第戎教士。","在阿尔萨斯，一杯本地啤酒配一个椒盐卷饼也很适合为正餐开场。","在其他地方，人们会选择一杯葡萄酒、苹果酒、味美思或果汁。","搭配的小食同样诉说着地方特色：奶酪泡芙、橄榄酱、冷切肉、黄油配小萝卜或自制饼干。","因此，并不存在唯一一种法国开胃酒，而是有许多地方性的待客方式。"]},{"title":"Partager sans obligation","fr":"L’apéro obéit à des codes souples plutôt qu’à des règles strictes. Quand on arrive chez quelqu’un, on peut apporter une bouteille, des fleurs ou quelque chose à grignoter, mais le plus important est la présence. Au moment de lever son verre, on entend souvent « À votre santé ! », « Santé ! » ou « Tchin-tchin ! ». Il est poli de proposer aussi une boisson sans alcool et de ne jamais insister si une personne ne souhaite pas boire. Le mot « apéro dînatoire » désigne une version plus abondante, avec assez de petites portions pour remplacer le dîner. Ce format permet de circuler et de parler avec plusieurs personnes. L’apéro résume ainsi une idée française de convivialité : manger et boire comptent, mais ils servent surtout à créer une atmosphère commune.","zh":"apéro 遵循的是灵活习惯，而不是严格规则。到别人家做客时，可以带一瓶饮料、鲜花或一些零食，但最重要的是人的到场。举杯时，人们常会说“祝您健康！”、“干杯！”或“Tchin-tchin！”。礼貌的做法是同时提供无酒精饮料；如果有人不想喝酒，也绝不应勉强。“apéro dînatoire”指更丰盛的版本，其中的小份食物多到足以代替晚餐。这种形式让人可以四处走动，与多个人交谈。因此，apéro 凝缩了一种法国式欢聚观念：吃喝固然重要，但它们首先是为了营造共同的氛围。","zhSentences":["apéro 遵循的是灵活习惯，而不是严格规则。","到别人家做客时，可以带一瓶饮料、鲜花或一些零食，但最重要的是人的到场。","举杯时，人们常会说“祝您健康！”、“干杯！”或“Tchin-tchin！”。","礼貌的做法是同时提供无酒精饮料；如果有人不想喝酒，也绝不应勉强。","“apéro dînatoire”指更丰盛的版本，其中的小份食物多到足以代替晚餐。","这种形式让人可以四处走动，与多个人交谈。","因此，apéro 凝缩了一种法国式欢聚观念：吃喝固然重要，但它们首先是为了营造共同的氛围。"]}],"highlights":["avant tout","a lieu","prend l’apéro","ouvrir l’appétit","tout simplement","toutes sortes de","se substituer au repas","à l’heure de l’apéro","l’occasion de","comme c’est souvent le cas","devenir rapidement animés et bruyants"],"sentenceTranslations":["开胃酒，也叫 apéro，**首先**是一种社交仪式；它**在午餐或晚餐前进行**。","人们会在咖啡馆或家里，和朋友、家人一起**喝开胃酒**。","开胃酒的目的在于**打开食欲**，为享受正餐作准备。","传统饮品有茴香酒、马提尼、波特酒、基尔酒（白葡萄酒加黑加仑糖浆）、鸡尾酒，或**干脆**给不喝酒的人准备果汁。","饮料会配花生、咸饼干、橄榄，或主人准备的**各种各样的**小食。","有时，apéro 甚至可以**代替正餐**。","人们会在**开胃酒时间**去朋友家，也就是在正餐很早之前到达。","这段共同度过的时间**是进行**轻松闲谈的机会；但如果话题涉及争议，**正如常常发生的那样**，讨论可能**很快变得热烈而嘈杂**。"],"hasAudio":true,"audioPack":{"chunks":["audio-packs/aperitif/01.bin"],"segments":[{"start":0,"end":7.105},{"start":7.105,"end":11.572},{"start":11.572,"end":17.241},{"start":17.241,"end":29.257},{"start":29.257,"end":36.937},{"start":36.937,"end":40.49},{"start":40.49,"end":44.8},{"start":44.8,"end":57.26}]}},{"id":"beaujolais-nouveau","title":"Beaujolais nouveau","chineseTitle":"博若莱新酒","level":"B1","topic":"food","summary":"每年十一月，全球一起迎接一款年轻、轻盈的葡萄酒。","groups":[["Le vin a une fête, c’est celle du Beaujolais nouveau.","Cette fête a lieu chaque année dans le cadre d’une stricte législation, d’un rituel méticuleusement réglé et d’une organisation commerciale de grande envergure.","Le troisième jeudi du mois de novembre, des millions de bouteilles de beaujolais nouveau sont livrées dans les bars et restaurants de France et partout sur la planète.","Des panneaux et des affiches proclament alors que « le Beaujolais Nouveau est arrivé ! »"],["La particularité du beaujolais est qu’il est bu très jeune, immédiatement après sa fabrication.","Il est léger, tendre et fruité, d’un rouge transparent, il contient très peu de tanins et c’est pourquoi tout le monde l’apprécie.","On le déguste au son de l’accordéon et des chansons.","C’est un vin qui réunit, qui appelle à la fraternité et aux agapes joyeuses."],["Sur tous les continents, l’arrivée du nouveau cru est célébrée autant qu’en France.","En Inde, on transporte les caisses de beaujolais à dos d’éléphant, les Américains associent désormais le beaujolais au Thanksgiving Day, alors qu’à Hakone au Japon, un hôtel organise des bains au beaujolais auxquels sont conviés les résidents."]],"culture":[{"title":"Un rendez-vous de novembre","fr":"Le Beaujolais nouveau est mis en vente chaque année le troisième jeudi de novembre. Cette date commune transforme un produit régional en événement collectif : caves, bistrots et restaurants peuvent ouvrir les bouteilles au même moment. Le vin vient du Beaujolais, au nord de Lyon, une région de collines où le gamay est le cépage emblématique. Contrairement aux vins destinés à vieillir, ce vin primeur cherche surtout la fraîcheur, le fruit et la facilité. On le boit dans les semaines ou les mois qui suivent sa production. Les affiches annonçant son arrivée font partie du décor de novembre. Pour beaucoup de consommateurs, la fête compte presque autant que la dégustation elle-même : elle célèbre la nouvelle récolte et le retour d’un rituel saisonnier.","zh":"博若莱新酒每年在十一月的第三个星期四上市。这个共同日期把一种地方产品变成集体活动：酒窖、小酒馆和餐厅可以在同一时刻开瓶。这种酒来自里昂以北的博若莱丘陵产区，佳美葡萄是那里的代表性品种。与用于陈年的葡萄酒不同，这种新酒主要追求新鲜、果香和易饮。人们通常在酿成后的几周或几个月内饮用。宣告新酒到来的海报也成了十一月街景的一部分。对许多消费者来说，节庆几乎和品尝本身同样重要：它庆祝新收成，也庆祝一个季节性仪式的回归。","zhSentences":["博若莱新酒每年在十一月的第三个星期四上市。","这个共同日期把一种地方产品变成集体活动：酒窖、小酒馆和餐厅可以在同一时刻开瓶。","这种酒来自里昂以北的博若莱丘陵产区，佳美葡萄是那里的代表性品种。","与用于陈年的葡萄酒不同，这种新酒主要追求新鲜、果香和易饮。","人们通常在酿成后的几周或几个月内饮用。","宣告新酒到来的海报也成了十一月街景的一部分。","对许多消费者来说，节庆几乎和品尝本身同样重要：它庆祝新收成，也庆祝一个季节性仪式的回归。"]},{"title":"Le fruit avant la garde","fr":"Pour obtenir son style très fruité, le Beaujolais nouveau est souvent élaboré par une méthode proche de la macération carbonique. Des grappes entières fermentent dans une cuve où l’oxygène est limité, ce qui favorise des arômes immédiats de fruits rouges, parfois de banane ou de bonbon. Cette technique donne peu de tanins et une couleur vive. Le résultat n’a pas vocation à représenter tous les vins du Beaujolais : la région produit aussi des beaujolais-villages et des crus plus structurés, comme Morgon, Fleurie ou Moulin-à-Vent. Ceux-ci expriment des terroirs précis et peuvent évoluer plusieurs années. Comprendre cette différence évite de réduire toute une région au seul vin primeur, même si celui-ci reste son ambassadeur le plus populaire.","zh":"为了获得非常浓郁的果香风格，博若莱新酒常采用近似二氧化碳浸渍法的工艺酿造。整串葡萄在氧气受限的酒槽中发酵，从而迅速形成红色水果的香气，有时还会出现香蕉或糖果般的气息。这种工艺会带来较少的单宁和鲜亮的颜色。这种新酒并不能代表博若莱的所有葡萄酒：该地区还生产博若莱村庄级葡萄酒以及结构更完整的特级村酒，如 Morgon、Fleurie 和 Moulin-à-Vent。这些酒能够表现具体的风土，并可在数年间继续发展。理解这种差别，就不会把整个产区简化成一种新酒，尽管后者仍是它最受欢迎的形象大使。","zhSentences":["为了获得非常浓郁的果香风格，博若莱新酒常采用近似二氧化碳浸渍法的工艺酿造。","整串葡萄在氧气受限的酒槽中发酵，从而迅速形成红色水果的香气，有时还会出现香蕉或糖果般的气息。","这种工艺会带来较少的单宁和鲜亮的颜色。","这种新酒并不能代表博若莱的所有葡萄酒：该地区还生产博若莱村庄级葡萄酒以及结构更完整的特级村酒，如 Morgon、Fleurie 和 Moulin-à-Vent。","这些酒能够表现具体的风土，并可在数年间继续发展。","理解这种差别，就不会把整个产区简化成一种新酒，尽管后者仍是它最受欢迎的形象大使。"]},{"title":"Une fête devenue mondiale","fr":"La diffusion internationale du Beaujolais nouveau doit beaucoup à une campagne commerciale simple et mémorable : une date unique, une phrase facile à traduire et un vin accessible. À partir de la seconde moitié du vingtième siècle, les bouteilles ont voyagé rapidement vers l’Europe, l’Amérique et surtout l’Asie. Au Japon, les célébrations ont parfois pris des formes spectaculaires, ce qui a renforcé l’image festive du produit. Cette mondialisation montre comment une tradition peut être à la fois locale et construite par le commerce. Aujourd’hui, certains producteurs cherchent aussi à présenter le vin avec davantage de précision : méthodes de culture, parcelles, travail artisanal et respect du millésime. Derrière le slogan, il y a donc des vignerons, des villages et une vraie diversité de styles.","zh":"博若莱新酒的国际传播很大程度上得益于一场简单而令人难忘的营销：统一的日期、容易翻译的口号和亲切易饮的葡萄酒。从二十世纪后半叶开始，这些酒瓶迅速运往欧洲、美洲，尤其是亚洲。在日本，庆祝活动有时采取十分壮观的形式，进一步强化了这种产品的节庆形象。这种全球化说明，一项传统可以既具有地方性，又由商业活动共同塑造。如今，一些生产者也试图更精确地介绍自己的酒，包括种植方式、地块、手工工作以及对年份特征的尊重。因此，在那句口号背后，还有酿酒人、村庄和真正多样的风格。","zhSentences":["博若莱新酒的国际传播很大程度上得益于一场简单而令人难忘的营销：统一的日期、容易翻译的口号和亲切易饮的葡萄酒。","从二十世纪后半叶开始，这些酒瓶迅速运往欧洲、美洲，尤其是亚洲。","在日本，庆祝活动有时采取十分壮观的形式，进一步强化了这种产品的节庆形象。","这种全球化说明，一项传统可以既具有地方性，又由商业活动共同塑造。","如今，一些生产者也试图更精确地介绍自己的酒，包括种植方式、地块、手工工作以及对年份特征的尊重。","因此，在那句口号背后，还有酿酒人、村庄和真正多样的风格。"]}],"highlights":["chaque année","dans le cadre d’une","Le troisième jeudi","partout sur la planète","immédiatement après","c’est pourquoi","au son de","appelle à","Sur tous les continents","autant qu’en France"],"sentenceTranslations":["葡萄酒也有节日，那就是博若莱新酒节。","这一节日**每年**都在**严格法规、精心安排的仪式和大规模商业组织的框架中**举行。","十一月的**第三个星期四**，数百万瓶博若莱新酒会被送往法国的酒吧、餐厅以及**世界各地**。","此时，招牌和海报会宣告：“博若莱新酒到了！”","博若莱的特点是酒非常年轻，**刚酿成后不久**就饮用。","它轻盈、柔和、果香浓郁，呈透明红色，单宁很少，**这就是为什么**人人都喜欢它。","人们伴着手风琴和歌曲的声音**品尝它**。","这是一种让人相聚、**呼唤**友爱和欢乐宴饮的酒。","**在所有大洲**，新年份酒的到来都受到庆祝，热闹程度**不亚于法国**。","在印度，人们用大象驮运博若莱酒箱；美国人如今把它与感恩节联系起来；而日本箱根的一家酒店还举办博若莱酒浴，邀请住客参加。"],"hasAudio":true,"audioPack":{"chunks":["audio-packs/beaujolais-nouveau/01.bin"],"segments":[{"start":0,"end":3.265},{"start":3.265,"end":11.624},{"start":11.624,"end":20.428},{"start":20.428,"end":25.287},{"start":25.287,"end":30.72},{"start":30.72,"end":37.904},{"start":37.904,"end":40.986},{"start":40.986,"end":45.636},{"start":45.636,"end":50.547},{"start":50.547,"end":62.433}]}},{"id":"cafe-croissant","title":"Café et croissant","chineseTitle":"咖啡与羊角面包","level":"A2","topic":"food","summary":"法国咖啡馆里最经典的早餐组合。","groups":[["Le duo idéal qui compose le petit déjeuner se prend parfois à la maison, mais surtout au café : debout au comptoir, si on est pressé, ou assis dehors en terrasse, si on a du temps, avec le journal du matin."],["Le croissant doit être encore chaud, sorti droit de chez le boulanger, légèrement croustillant à l’extérieur, onctueux à l’intérieur.","Pour le café, il existe des options : on le prend noir ou « expresso » (surtout après le déjeuner), court ou allongé, parfois double, avec ou sans sucre.","On peut y mettre aussi une goutte de lait, c’est alors un « noisette », ou si l’on veut plus de lait, on demandera un « crème »."],["Le croissant est probablement d’origine viennoise, mais les boulangers français lui ont apporté cette texture feuilletée qui le caractérise si bien.","Quant au café, les Italiens en font incontestablement un bien meilleur.","Toutefois, rarement deux produits étrangers ont été à ce point « naturalisés » en France pour en faire un couple aussi réussi."]],"culture":[{"title":"Au comptoir ou en terrasse","fr":"Le café français est un lieu autant qu’une boisson. Le matin, une personne pressée peut commander au comptoir, boire rapidement et repartir ; le prix y est parfois différent de celui d’une consommation servie à table. En terrasse, le rythme change : on observe la rue, on lit, on parle ou on reste seul sans être isolé. Commander « un café » signifie généralement recevoir un petit expresso. Pour davantage d’eau, on demande un café allongé ; avec une petite quantité de lait, un noisette ; avec plus de lait, un café crème. Ces mots simples sont utiles au voyageur, car ils montrent que la commande française ne suit pas toujours les catégories des grandes chaînes internationales. Le serveur attend surtout une formule claire et polie.","zh":"法语中的 café 既指一种饮料，也指一个场所。早晨，赶时间的人可以在吧台点单，迅速喝完后离开；吧台价格有时与坐在桌边享用的价格不同。到了露台，节奏就变了：人们看街景、阅读、交谈，或独自待着却不显孤立。点“un café”通常意味着得到一小杯浓缩咖啡。想多加些水，就点 café allongé；加少量牛奶是 noisette；加更多牛奶则是 café crème。这些简单词汇对旅行者很实用，因为法国的咖啡点单方式并不总与国际连锁店的分类一致。服务员最希望听到的，主要还是清楚而礼貌的点单表达。","zhSentences":["法语中的 café 既指一种饮料，也指一个场所。","早晨，赶时间的人可以在吧台点单，迅速喝完后离开；吧台价格有时与坐在桌边享用的价格不同。","到了露台，节奏就变了：人们看街景、阅读、交谈，或独自待着却不显孤立。","点“un café”通常意味着得到一小杯浓缩咖啡。","想多加些水，就点 café allongé；加少量牛奶是 noisette；加更多牛奶则是 café crème。","这些简单词汇对旅行者很实用，因为法国的咖啡点单方式并不总与国际连锁店的分类一致。","服务员最希望听到的，主要还是清楚而礼貌的点单表达。"]},{"title":"Le croissant, une histoire transformée","fr":"Le croissant est souvent présenté comme un symbole éternel de Paris, mais son histoire passe par Vienne. Au dix-neuvième siècle, des pains et pâtisseries de style viennois deviennent à la mode dans la capitale française. Les boulangers adaptent ensuite la forme courbe et utilisent une pâte levée feuilletée, travaillée avec du beurre. Cette technique crée de nombreuses couches fines : elles doivent être croustillantes à l’extérieur, légères et souples à l’intérieur. Un bon croissant demande du temps, car la pâte repose entre les tours de pliage. Dans les boulangeries, on distingue parfois le croissant au beurre, souvent plus droit, du croissant ordinaire, qui peut contenir d’autres matières grasses. La qualité dépend beaucoup du beurre, de la fermentation et de la cuisson.","zh":"羊角面包常被描绘成巴黎永恒的象征，但它的历史经过了维也纳。十九世纪，维也纳风格的面包和糕点在法国首都流行起来。之后，面包师改造了弯曲的外形，并使用以黄油加工的含酵母起酥面团。这种工艺会形成许多薄层：外部应当酥脆，内部则要轻盈柔软。一只好的羊角面包需要时间，因为面团在一次次折叠之间必须静置。在面包店里，人们有时会区分通常较直的黄油羊角包与可能含其他油脂的普通羊角包。品质在很大程度上取决于黄油、发酵和烘烤。","zhSentences":["羊角面包常被描绘成巴黎永恒的象征，但它的历史经过了维也纳。","十九世纪，维也纳风格的面包和糕点在法国首都流行起来。","之后，面包师改造了弯曲的外形，并使用以黄油加工的含酵母起酥面团。","这种工艺会形成许多薄层：外部应当酥脆，内部则要轻盈柔软。","一只好的羊角面包需要时间，因为面团在一次次折叠之间必须静置。","在面包店里，人们有时会区分通常较直的黄油羊角包与可能含其他油脂的普通羊角包。","品质在很大程度上取决于黄油、发酵和烘烤。"]},{"title":"Un petit déjeuner plus simple qu’on ne pense","fr":"L’image touristique montre souvent une grande table couverte de croissants, mais le petit déjeuner quotidien des Français est généralement simple. À la maison, il peut se composer de pain avec du beurre ou de la confiture, d’une boisson chaude et parfois d’un fruit ou d’un yaourt. Le croissant est apprécié, mais beaucoup de personnes ne l’achètent pas tous les jours ; il accompagne volontiers le week-end, un voyage ou une rencontre au café. Contrairement au déjeuner, ce repas est traditionnellement plutôt sucré. Les habitudes changent pourtant : céréales, œufs, aliments salés et cafés à emporter sont de plus en plus visibles. Le duo café-croissant reste donc une icône culturelle, mais il représente un plaisir reconnaissable plus qu’une règle suivie chaque matin par toute la population.","zh":"旅游宣传中常出现一张摆满羊角面包的大桌子，但法国人的日常早餐通常很简单。在家中，早餐可能由黄油或果酱面包、一杯热饮组成，有时再加水果或酸奶。羊角面包很受欢迎，但许多人不会每天购买；它更常陪伴周末、旅行或咖啡馆里的会面。与午餐不同，法国传统早餐通常偏甜。不过习惯正在改变：谷物、鸡蛋、咸味食品和外带咖啡越来越常见。因此，咖啡与羊角面包仍是文化标志，但它更代表一种人人熟悉的享受，而不是全体法国人每天早晨都遵守的规则。","zhSentences":["旅游宣传中常出现一张摆满羊角面包的大桌子，但法国人的日常早餐通常很简单。","在家中，早餐可能由黄油或果酱面包、一杯热饮组成，有时再加水果或酸奶。","羊角面包很受欢迎，但许多人不会每天购买；它更常陪伴周末、旅行或咖啡馆里的会面。","与午餐不同，法国传统早餐通常偏甜。","不过习惯正在改变：谷物、鸡蛋、咸味食品和外带咖啡越来越常见。","因此，咖啡与羊角面包仍是文化标志，但它更代表一种人人熟悉的享受，而不是全体法国人每天早晨都遵守的规则。"]}],"highlights":["si on est pressé","si on a du temps","sorti droit de chez le boulanger","avec ou sans sucre","une goutte de lait","si l’on veut","Quant au","à ce point"],"sentenceTranslations":["理想的早餐组合有时在家吃，但更多是在咖啡馆：**赶时间时**站在吧台，**有时间时**坐在室外露台，读着晨报。","羊角包应当还是热的，**刚从面包师那里拿来**，外层微脆，内部柔软。","咖啡有多种选择：可以喝黑咖啡或浓缩咖啡（尤其在午餐后），短杯或加水，也可双份，**加糖或不加糖**。","也可以加**一滴牛奶**，这便是 noisette；如果**想要**更多牛奶，就点 café crème。","羊角包可能源自维也纳，但法国面包师赋予了它极具特色的起酥质地。","**至于**咖啡，意大利人无疑做得更好。","不过，很少有两种外来产品能在法国被**如此彻底地**“本土化”，并成为如此成功的一对。"],"hasAudio":true,"audioPack":{"chunks":["audio-packs/cafe-croissant/01.bin"],"segments":[{"start":0,"end":11.572},{"start":11.572,"end":19.017},{"start":19.017,"end":27.951},{"start":27.951,"end":34.377},{"start":34.377,"end":41.979},{"start":41.979,"end":46.289},{"start":46.289,"end":52.95}]}},{"id":"champagne","title":"Champagne","chineseTitle":"香槟","level":"B1","topic":"food","summary":"从产区、气泡到庆祝仪式，认识法国香槟。","groups":[["Pas de fête sans champagne.","Ce vin blanc pétillant, produit dans la région de Reims, est plus qu’une boisson, c’est un signe, il est associé aux événements exceptionnels : mariage, naissance, anniversaire, promotion, succès, victoire, réunion...","Le champagne apporte une dimension symbolique nécessaire aux instants heureux et mémorables de la vie."],["Chaque année, la région Champagne fabrique plus de 300 millions de bouteilles, la moitié environ est exportée dans le monde entier et le reste est vendu en France.","On ne boit pas du champagne tous les jours cependant, son prix en fait un produit de luxe."],["Ouvrir une bouteille de champagne nécessite un rituel approprié : d’abord, on enlève délicatement la partie supérieure de la collerette de papier brillant ; on défait ensuite doucement le muselet de fer qui capture le bouchon.","Il faut retirer lentement celui-ci du goulot et maîtriser l’explosion d’une main experte car un bouchon sous pression peut atteindre une vitesse de 50 km/h !","Finalement, le vin mousseux et ambré est distribué dans toutes les flûtes."],["Le moment est alors venu pour les convives de trinquer et de dire joyeusement « santé ! » à tout le monde."]],"culture":[{"title":"Un nom protégé","fr":"Le mot champagne ne désigne pas n’importe quel vin à bulles. Il correspond à une appellation protégée et à une région viticole située à l’est de Paris, autour de villes comme Reims et Épernay. Le climat frais et les sols crayeux participent au caractère des vins. Les principaux cépages sont le chardonnay, le pinot noir et le meunier, même si d’autres variétés autorisées existent. Des règles précises encadrent la culture, les rendements, le pressurage et l’élevage. Cette protection explique pourquoi un vin mousseux produit ailleurs porte un autre nom, même lorsqu’il utilise une méthode semblable. Pour les habitants de la région, Champagne est donc à la fois un territoire, un savoir-faire et un produit dont le nom doit rester lié à son origine.","zh":"champagne 一词并不指所有带气泡的葡萄酒。它对应一个受保护的原产地名称，也对应巴黎以东、以兰斯和埃佩尔奈等城市为中心的葡萄酒产区。凉爽的气候和白垩质土壤共同塑造了葡萄酒的特征。主要葡萄品种是霞多丽、黑皮诺和莫尼耶，不过也有其他获准使用的品种。种植、产量、压榨和陈酿都受到明确规则的约束。这种保护解释了为什么在其他地方生产的起泡酒即使采用类似方法，也必须使用另一个名称。因此，对当地居民而言，香槟既是一片土地、一套技艺，也是一种名称必须与产地保持联系的产品。","zhSentences":["champagne 一词并不指所有带气泡的葡萄酒。","它对应一个受保护的原产地名称，也对应巴黎以东、以兰斯和埃佩尔奈等城市为中心的葡萄酒产区。","凉爽的气候和白垩质土壤共同塑造了葡萄酒的特征。","主要葡萄品种是霞多丽、黑皮诺和莫尼耶，不过也有其他获准使用的品种。","种植、产量、压榨和陈酿都受到明确规则的约束。","这种保护解释了为什么在其他地方生产的起泡酒即使采用类似方法，也必须使用另一个名称。","因此，对当地居民而言，香槟既是一片土地、一套技艺，也是一种名称必须与产地保持联系的产品。"]},{"title":"Comment naissent les bulles","fr":"Après une première fermentation, les vins tranquilles sont souvent assemblés pour construire le style recherché. Le vin est ensuite mis en bouteille avec une petite quantité de sucre et de levures. Une seconde fermentation se déroule alors dans la bouteille fermée : elle produit le gaz carbonique qui formera les bulles. Pendant l’élevage, les levures déposées apportent des notes de brioche, de pain grillé ou de fruits secs. Les bouteilles sont progressivement tournées afin de rassembler le dépôt près du bouchon. Celui-ci est retiré lors du dégorgement, puis la bouteille reçoit le dosage qui détermine notamment si le champagne sera brut, extra-brut ou plus doux. Cette méthode longue aide à comprendre le prix et la complexité de nombreux champagnes.","zh":"第一次发酵完成后，无气的基酒通常会被调配，以构成所追求的风格。随后，葡萄酒与少量糖和酵母一起装瓶。第二次发酵在密封瓶中进行，由此产生形成气泡的二氧化碳。在陈酿期间，沉积的酵母会带来布里欧修面包、烤面包或干果的风味。酒瓶会被逐步转动，使沉淀聚集到瓶塞附近。除渣时，这些沉淀会被取出，之后酒瓶接受补液；补液尤其决定香槟是 brut、extra-brut 还是更甜的类型。这套漫长工艺有助于理解许多香槟的价格和复杂度。","zhSentences":["第一次发酵完成后，无气的基酒通常会被调配，以构成所追求的风格。","随后，葡萄酒与少量糖和酵母一起装瓶。","第二次发酵在密封瓶中进行，由此产生形成气泡的二氧化碳。","在陈酿期间，沉积的酵母会带来布里欧修面包、烤面包或干果的风味。","酒瓶会被逐步转动，使沉淀聚集到瓶塞附近。","除渣时，这些沉淀会被取出，之后酒瓶接受补液；补液尤其决定香槟是 brut、extra-brut 还是更甜的类型。","这套漫长工艺有助于理解许多香槟的价格和复杂度。"]},{"title":"Servir avec calme","fr":"Dans les films, le bouchon saute bruyamment, mais un service élégant cherche plutôt à contrôler la pression. On garde une main sur le bouchon, on incline légèrement la bouteille et on fait tourner doucement le verre de la bouteille, pas le bouchon lui-même. Un léger soupir est préférable à une explosion, car il évite de perdre du vin et réduit le risque d’accident. La flûte met en valeur la montée des bulles, tandis que certains amateurs préfèrent aujourd’hui un verre un peu plus large pour mieux sentir les arômes. Le champagne peut accompagner tout un repas, pas seulement le dessert ou le toast. Comme toute boisson alcoolisée, il se déguste avec modération ; l’essentiel du rituel reste le moment partagé.","zh":"电影里瓶塞会砰然飞出，但优雅的开瓶更讲究控制压力。一只手按住瓶塞，把酒瓶略微倾斜，再轻轻转动瓶身，而不是转动瓶塞本身。轻微的叹息声比爆响更理想，因为这样既不会损失酒液，也能降低事故风险。细长笛形杯能突出气泡的上升，而如今有些爱好者更喜欢稍宽的杯子，以便更好地感受香气。香槟可以搭配整顿饭，而不只用于甜点或祝酒。和所有酒精饮料一样，香槟应适量品尝；这一仪式最重要的仍是共同分享的时刻。","zhSentences":["电影里瓶塞会砰然飞出，但优雅的开瓶更讲究控制压力。","一只手按住瓶塞，把酒瓶略微倾斜，再轻轻转动瓶身，而不是转动瓶塞本身。","轻微的叹息声比爆响更理想，因为这样既不会损失酒液，也能降低事故风险。","细长笛形杯能突出气泡的上升，而如今有些爱好者更喜欢稍宽的杯子，以便更好地感受香气。","香槟可以搭配整顿饭，而不只用于甜点或祝酒。","和所有酒精饮料一样，香槟应适量品尝；这一仪式最重要的仍是共同分享的时刻。"]}],"highlights":["Pas de fête sans","plus qu’une boisson","tous les jours","nécessite un rituel","d’abord","Il faut","d’une main experte","Le moment est alors venu pour"],"sentenceTranslations":["**没有**香槟的庆祝就不算庆祝。","这种产自兰斯地区的白色起泡酒**不只是一种饮料**，更是一种象征；它与婚礼、出生、生日、升职、成功、胜利和聚会等特殊事件相连。","香槟为人生幸福而难忘的时刻带来必要的象征意义。","每年香槟产区生产三亿多瓶，约一半出口到全世界，其余在法国销售。","不过，人们并不**天天**喝香槟；它的价格使它成为奢侈品。","打开一瓶香槟**需要一套仪式**：**首先**轻轻取下亮纸颈饰的上半部分；然后慢慢解开固定瓶塞的铁丝网。","**必须**缓缓从瓶颈取出瓶塞，并以**熟练的手法**控制喷发，因为受压的瓶塞速度可达每小时五十公里。","最后，金黄起泡的酒被倒入所有细长香槟杯中。","这时**到了**宾客碰杯，并愉快地向所有人说“健康！”的时候。"],"hasAudio":true,"audioPack":{"chunks":["audio-packs/champagne/01.bin"],"segments":[{"start":0,"end":1.75},{"start":1.75,"end":15.412},{"start":15.412,"end":21.368},{"start":21.368,"end":30.929},{"start":30.929,"end":35.788},{"start":35.788,"end":48.274},{"start":48.274,"end":57.208},{"start":57.208,"end":61.649},{"start":61.649,"end":67.762}]}},{"id":"chefs","title":"Chefs","chineseTitle":"大厨","level":"B2","topic":"food","summary":"从卡雷姆、埃斯科菲耶到当代名厨与餐厅指南。","groups":[["Depuis Marie-Antoine Carême, « le roi des chefs et le chef des rois », depuis les méditations de Brillat-Savarin sur l’art culinaire (1825) et les milliers de recettes du Guide culinaire d’Auguste Escoffier (1903) qui ont inspiré les chefs du 20e siècle, la gastronomie française n’a pas cessé d’innover, de proposer de nouveaux goûts, de nouvelles compositions."],["La première génération des maîtres à toque blanche qui s’affairent dans les cuisines et viennent saluer les clients au moment du dessert sont des légendes : Fernand Point à Vienne, au sud de Lyon ; les frères Troisgros à Roanne ; Raymond Oliver au Grand Véfour de Paris ; Alain Chapel à Mionnay ; Paul Bocuse, le « pape de la cuisine », à Lyon."],["La génération suivante, celle de la « post-Nouvelle Cuisine », s’exporte beaucoup : Joël Robuchon possède une douzaine de restaurants en Europe, aux États-Unis et en Asie ; Alain Ducasse dirige un empire global qui comprend des restaurants, une école de cuisine et une maison d’édition ; Pierre Gagnaire, initiateur de la fusion des saveurs et de la « cuisine moléculaire », s’est installé à Las Vegas...","Quant à Marc Veyrat, le plus insolite des chefs contemporains, célèbre pour son grand chapeau noir, promoteur des plantes et de l’agriculture biologique, il préfère rester en Savoie mais sa réputation est mondiale."],["Deux publications très respectées observent, commentent et évaluent le monde des chefs : le Guide rouge Michelin, qui distribue des étoiles, et le Gault Millau, qui attribue des notes de 10 à 20.","Moins de 70 restaurants dans le monde bénéficient de la précieuse mention 3 étoiles, dont environ deux douzaines en France."]],"culture":[{"title":"De Carême à Escoffier","fr":"Marie-Antoine Carême et Auguste Escoffier ont contribué à transformer la cuisine française en profession organisée. Carême, actif au début du dix-neuvième siècle, a travaillé pour des cours européennes et a présenté la haute cuisine comme un art d’architecture, de sauces et de grands services. Escoffier, un siècle plus tard, a simplifié de nombreuses préparations et réorganisé le travail des cuisines en brigades. Chaque poste possède alors une responsabilité précise : sauces, poissons, pâtisserie ou garde-manger. Ce système a amélioré la coordination dans les grands hôtels et reste une référence dans la formation culinaire. Leurs livres ne sont pas de simples recueils de recettes : ils codifient un vocabulaire, des gestes et une vision du métier. Les chefs contemporains s’en éloignent parfois, mais ils travaillent encore avec cet héritage.","zh":"马里-安托万·卡雷姆和奥古斯特·埃斯科菲耶推动法国烹饪转变为一个组织有序的职业。活跃于十九世纪初的卡雷姆曾为欧洲宫廷工作，并把高级料理呈现为一门关于建筑式造型、酱汁和盛大餐饮服务的艺术。一个世纪后，埃斯科菲耶简化了许多烹饪准备，并把厨房工作重新组织为分工明确的团队。每个岗位由此承担具体职责，如酱汁、鱼类、甜点或冷菜储备。这一体系改善了大型酒店中的协作，至今仍是烹饪教育的参照。他们的著作并非简单的菜谱集，而是规范了词汇、动作和职业观念。当代厨师有时会离开这些规范，但仍在这份遗产之上工作。","zhSentences":["马里-安托万·卡雷姆和奥古斯特·埃斯科菲耶推动法国烹饪转变为一个组织有序的职业。","活跃于十九世纪初的卡雷姆曾为欧洲宫廷工作，并把高级料理呈现为一门关于建筑式造型、酱汁和盛大餐饮服务的艺术。","一个世纪后，埃斯科菲耶简化了许多烹饪准备，并把厨房工作重新组织为分工明确的团队。","每个岗位由此承担具体职责，如酱汁、鱼类、甜点或冷菜储备。","这一体系改善了大型酒店中的协作，至今仍是烹饪教育的参照。","他们的著作并非简单的菜谱集，而是规范了词汇、动作和职业观念。","当代厨师有时会离开这些规范，但仍在这份遗产之上工作。"]},{"title":"La Nouvelle Cuisine","fr":"Dans les années 1960 et 1970, certains chefs français souhaitent alléger la cuisine classique. Ils réduisent les cuissons trop longues, les sauces épaisses et les présentations chargées. Ils mettent davantage en valeur la fraîcheur du produit, les légumes, les herbes et une assiette composée individuellement. Les journalistes Henri Gault et Christian Millau donnent à cette tendance le nom de « Nouvelle Cuisine ». Paul Bocuse, les frères Troisgros, Michel Guérard et Alain Chapel en deviennent des figures importantes, même si leurs styles restent différents. Le mouvement a parfois été caricaturé par l’image de portions minuscules sur de grandes assiettes. Son influence est pourtant profonde : saisonnalité, précision de cuisson et liberté créative sont désormais des principes partagés bien au-delà de la France.","zh":"二十世纪六七十年代，一些法国厨师希望让传统料理变得更轻盈。他们减少过长的烹饪时间、厚重的酱汁和繁复的摆盘。他们更加突出食材的新鲜度、蔬菜、香草以及为每位客人单独组合的餐盘。记者亨利·戈和克里斯蒂安·米约把这股趋势命名为“新派料理”。保罗·博古斯、特鲁瓦格罗兄弟、米歇尔·盖拉尔和阿兰·沙佩尔成为其中的重要人物，尽管各自风格仍不相同。这场运动有时被讽刺为“大盘子里只有极小份量”。然而它的影响十分深远：季节性、精准火候和创作自由如今已成为远超法国范围的共同原则。","zhSentences":["二十世纪六七十年代，一些法国厨师希望让传统料理变得更轻盈。","他们减少过长的烹饪时间、厚重的酱汁和繁复的摆盘。","他们更加突出食材的新鲜度、蔬菜、香草以及为每位客人单独组合的餐盘。","记者亨利·戈和克里斯蒂安·米约把这股趋势命名为“新派料理”。","保罗·博古斯、特鲁瓦格罗兄弟、米歇尔·盖拉尔和阿兰·沙佩尔成为其中的重要人物，尽管各自风格仍不相同。","这场运动有时被讽刺为“大盘子里只有极小份量”。","然而它的影响十分深远：季节性、精准火候和创作自由如今已成为远超法国范围的共同原则。"]},{"title":"Guides, étoiles et pression","fr":"Le Guide Michelin utilise des inspecteurs anonymes et attribue une, deux ou trois étoiles aux restaurants jugés remarquables. Dans son langage, une étoile signale une très bonne table, deux méritent un détour et trois un voyage spécial. Le Gault & Millau propose une autre tradition critique, avec des notes et des toques. Ces distinctions peuvent apporter des clients, une visibilité internationale et des possibilités professionnelles. Elles créent aussi une forte pression : maintenir une équipe, une qualité régulière et un niveau de service élevé coûte cher. Aujourd’hui, le prestige d’un chef se construit également par les médias, les livres, la télévision, les réseaux sociaux et des restaurants plus accessibles. La cuisine française reste donc liée aux guides, mais l’autorité culinaire est devenue plus diverse et plus ouverte.","zh":"《米其林指南》使用匿名评审员，并向被认为出色的餐厅授予一星、二星或三星。按照它的表述，一星代表非常好的餐厅，二星值得绕道前往，三星则值得专程旅行。《戈与米约》代表另一种评论传统，采用分数和厨师帽标志。这些荣誉可以带来顾客、国际知名度和职业机会。它们也会造成巨大压力：维持团队、稳定品质和高水平服务都成本高昂。如今，厨师的声望还通过媒体、书籍、电视、社交网络以及更亲民的餐厅建立起来。因此，法国料理仍与指南紧密相连，但烹饪权威已经变得更加多元和开放。","zhSentences":["《米其林指南》使用匿名评审员，并向被认为出色的餐厅授予一星、二星或三星。","按照它的表述，一星代表非常好的餐厅，二星值得绕道前往，三星则值得专程旅行。","《戈与米约》代表另一种评论传统，采用分数和厨师帽标志。","这些荣誉可以带来顾客、国际知名度和职业机会。","它们也会造成巨大压力：维持团队、稳定品质和高水平服务都成本高昂。","如今，厨师的声望还通过媒体、书籍、电视、社交网络以及更亲民的餐厅建立起来。","因此，法国料理仍与指南紧密相连，但烹饪权威已经变得更加多元和开放。"]}],"highlights":["n’a pas cessé d’innover","s’affairent dans","au moment du dessert","La génération suivante","s’exporte beaucoup","Quant à","préfère rester","sa réputation est mondiale","bénéficient de"],"sentenceTranslations":["自卡雷姆——“厨师之王、君王的厨师”——以来，又经布里亚-萨瓦兰对烹饪艺术的思考及埃斯科菲耶《烹饪指南》的数千道菜谱影响，法国美食**从未停止创新**，提出新的味道与组合。","第一代戴白高帽的大师在厨房里**忙碌**，并在**甜点上桌时**出来向客人致意；他们已成为传奇人物，如费尔南·普安、特鲁瓦格罗兄弟、雷蒙·奥利维耶、阿兰·沙佩尔和保罗·博古斯。","**下一代**“后新派料理”厨师**大量走向海外**：罗布雄在欧洲、美国和亚洲拥有十多家餐厅；杜卡斯经营全球餐饮帝国；加涅尔则在拉斯维加斯开店。","**至于**以黑色大帽闻名的马克·韦拉，他**更愿意留在**萨瓦，但**享有世界声誉**。","两种很受尊敬的出版物观察、评论和评估厨师世界：授予星级的《米其林红色指南》和以十至二十分评分的《戈与米约》。","全球不到七十家餐厅**获得**珍贵的三星评价，其中法国约有二十多家。"],"hasAudio":true,"audioPack":{"chunks":["audio-packs/chefs/01.bin"],"segments":[{"start":0,"end":20.297},{"start":20.297,"end":38.583},{"start":38.583,"end":61.153},{"start":61.153,"end":73.273},{"start":73.273,"end":84.167},{"start":84.167,"end":91.167}]}},{"id":"escargots-grenouilles","title":"Escargots et grenouilles","chineseTitle":"蜗牛与青蛙","level":"B2","topic":"food","summary":"两种被外国人视为“典型法国菜”的食材。","groups":[["Le seul lien que l’on peut établir entre des animaux aussi différents que l’escargot et la grenouille, c’est qu’ils sont tous deux associés à la gastronomie française, à la fois dans son raffinement et dans son excentricité.","De la grenouille, seules les cuisses sont dégustées.","On les fait frire avec de la panure, du sel et des oignons.","Les os de grenouilles sont aussi fins que des arêtes de poisson et il faut faire très attention à ne pas les avaler.","Quant aux escargots, un mets gastronomique typiquement bourguignon, la recette est très élaborée, elle nécessite plus de huit jours de préparation, puis on les frit à la poêle avec une persillade.","En fait, ce sont surtout les touristes de passage en France qui désirent faire l’expérience des grenouilles ou des escargots, car les Français en mangent plutôt rarement.","L’idée de consommer des animaux aussi exotiques semble incongrue pour beaucoup d’entre eux et c’est vrai que les prix pratiqués dans les restaurants qui en proposent découragent un peu.","Pourtant, il faut reconnaître que ces batraciens et ces gastéropodes ont réussi à définir la cuisine française de manière remarquable."]],"culture":[{"title":"L’escargot de Bourgogne","fr":"Les escargots à la bourguignonne sont servis dans leur coquille avec un beurre abondamment parfumé à l’ail et au persil. On les mange à l’aide d’une pince qui tient la coquille et d’une petite fourchette. Le nom du plat évoque la Bourgogne, mais l’origine précise des escargots vendus et préparés peut varier. Avant la cuisson, leur préparation demande des étapes sanitaires et culinaires rigoureuses ; à la maison, beaucoup de consommateurs achètent donc un produit déjà préparé. Le plat apparaît surtout pendant les fêtes ou dans les restaurants traditionnels. Son goût vient autant du beurre persillé que de l’animal lui-même. Pour un visiteur, le geste inhabituel fait partie de l’expérience, mais pour de nombreux Français, ce n’est pas un aliment du quotidien.","zh":"勃艮第式蜗牛连壳上桌，配有大量以大蒜和欧芹调味的黄油。食用时要用一把夹子夹住外壳，再用一把小叉子取肉。菜名让人想到勃艮第，但售卖和烹制的蜗牛具体来自哪里可能各不相同。烹饪之前，它们需要经过严格的卫生与食材处理步骤；因此在家中，许多消费者会购买已经处理好的产品。这道菜主要出现在节庆期间或传统餐厅中。它的味道既来自欧芹黄油，也来自蜗牛本身。对游客而言，陌生的食用动作是体验的一部分；但对许多法国人来说，它并不是日常食物。","zhSentences":["勃艮第式蜗牛连壳上桌，配有大量以大蒜和欧芹调味的黄油。","食用时要用一把夹子夹住外壳，再用一把小叉子取肉。","菜名让人想到勃艮第，但售卖和烹制的蜗牛具体来自哪里可能各不相同。","烹饪之前，它们需要经过严格的卫生与食材处理步骤；因此在家中，许多消费者会购买已经处理好的产品。","这道菜主要出现在节庆期间或传统餐厅中。","它的味道既来自欧芹黄油，也来自蜗牛本身。","对游客而言，陌生的食用动作是体验的一部分；但对许多法国人来说，它并不是日常食物。"]},{"title":"Les cuisses de grenouille","fr":"Les cuisses de grenouille sont associées à plusieurs cuisines régionales françaises, notamment autour de la Dombes, une zone d’étangs située au nord-est de Lyon. Elles peuvent être farinées, sautées au beurre, préparées avec du persil et de l’ail, ou servies dans une sauce. Leur chair délicate est souvent comparée à celle du poulet ou du poisson. La consommation reste occasionnelle et les approvisionnements sont aujourd’hui largement internationaux. Les questions de protection des espèces, de traçabilité et de bien-être animal ont rendu le sujet plus sensible. Parler de ce plat permet donc d’aller au-delà de la curiosité gastronomique : il faut aussi considérer l’origine du produit et les règles qui encadrent sa commercialisation. La tradition existe, mais elle n’est ni uniforme ni quotidienne.","zh":"蛙腿与法国多个地方菜系有关，尤其是里昂东北部、遍布池塘的栋布地区。它们可以裹粉、用黄油煎、配欧芹和大蒜烹制，也可以佐酱汁上桌。其细嫩肉质常被拿来与鸡肉或鱼肉比较。蛙腿仍只偶尔食用，而如今的供应在很大程度上来自国际市场。物种保护、来源追踪和动物福利问题使这个话题变得更加敏感。因此，谈论这道菜不能只停留在猎奇式的美食体验，还要考虑产品来源以及规范其销售的规则。这项传统确实存在，但它既不遍及所有地区，也不是日常习惯。","zhSentences":["蛙腿与法国多个地方菜系有关，尤其是里昂东北部、遍布池塘的栋布地区。","它们可以裹粉、用黄油煎、配欧芹和大蒜烹制，也可以佐酱汁上桌。","其细嫩肉质常被拿来与鸡肉或鱼肉比较。","蛙腿仍只偶尔食用，而如今的供应在很大程度上来自国际市场。","物种保护、来源追踪和动物福利问题使这个话题变得更加敏感。","因此，谈论这道菜不能只停留在猎奇式的美食体验，还要考虑产品来源以及规范其销售的规则。","这项传统确实存在，但它既不遍及所有地区，也不是日常习惯。"]},{"title":"Un stéréotype culinaire","fr":"À l’étranger, les Français sont parfois surnommés « mangeurs de grenouilles ». Ce cliché fonctionne parce qu’un aliment rare et visible résume facilement une culture entière. Pourtant, les habitudes réelles sont beaucoup plus ordinaires : pâtes, légumes, poulet, sandwiches ou plats familiaux occupent davantage les tables quotidiennes. Les escargots et les grenouilles jouent plutôt le rôle de spécialités patrimoniales, de plats de fête ou d’expériences touristiques. Le même mécanisme existe pour d’autres pays, réduits à un aliment spectaculaire. Pour comprendre une culture alimentaire, il est utile de distinguer trois choses : ce que les habitants mangent souvent, ce qu’ils servent lors d’occasions particulières et ce que les visiteurs imaginent typique. Cette distinction rend la découverte plus juste et souvent plus intéressante.","zh":"在国外，法国人有时被戏称为“吃青蛙的人”。这种刻板印象之所以容易传播，是因为一种罕见而醒目的食物很容易被用来概括整个文化。然而，真实的饮食习惯普通得多：意大利面、蔬菜、鸡肉、三明治和家庭菜肴更常出现在日常餐桌上。蜗牛和青蛙更多扮演传统特色菜、节庆食品或旅游体验的角色。同样的机制也发生在其他国家，它们也会被简化为一种引人注目的食物。要理解一种饮食文化，最好区分三件事：居民经常吃什么、特殊场合会端上什么，以及游客想象中什么最典型。这种区分会让文化发现更加准确，而且往往更加有趣。","zhSentences":["在国外，法国人有时被戏称为“吃青蛙的人”。","这种刻板印象之所以容易传播，是因为一种罕见而醒目的食物很容易被用来概括整个文化。","然而，真实的饮食习惯普通得多：意大利面、蔬菜、鸡肉、三明治和家庭菜肴更常出现在日常餐桌上。","蜗牛和青蛙更多扮演传统特色菜、节庆食品或旅游体验的角色。","同样的机制也发生在其他国家，它们也会被简化为一种引人注目的食物。","要理解一种饮食文化，最好区分三件事：居民经常吃什么、特殊场合会端上什么，以及游客想象中什么最典型。","这种区分会让文化发现更加准确，而且往往更加有趣。"]}],"highlights":["à la fois","De la grenouille","il faut faire très attention à","Quant aux","plus de huit jours de préparation","En fait","de passage","plutôt rarement","il faut reconnaître que"],"sentenceTranslations":["蜗牛和青蛙这两种非常不同的动物，唯一的联系是它们都与法国美食相关，**既体现其精致，也体现其奇异**。","**青蛙**只食用腿部。","人们把蛙腿裹上面包糠、盐和洋葱后油炸。","青蛙骨头和鱼刺一样细，**一定要非常小心不要**吞下去。","**至于蜗牛**，这种典型勃艮第美食的做法很复杂，**需要八天以上的准备**，之后再用欧芹蒜蓉调料在锅中煎制。","**事实上**，主要是**到法国旅行的**游客想尝试青蛙或蜗牛，因为法国人自己吃得**相当少**。","对许多法国人来说，吃如此奇特的动物似乎不合常理；而提供这些菜的餐厅价格也确实有些令人却步。","不过，**必须承认**，这些两栖动物和腹足动物以引人注目的方式定义了法国料理。"],"hasAudio":true,"audioPack":{"chunks":["audio-packs/escargots-grenouilles/01.bin"],"segments":[{"start":0,"end":11.598},{"start":11.598,"end":14.785},{"start":14.785,"end":18.39},{"start":18.39,"end":24.111},{"start":24.111,"end":34.821},{"start":34.821,"end":43.311},{"start":43.311,"end":52.297},{"start":52.297,"end":60.082}]}},{"id":"frites","title":"Frites","chineseTitle":"炸薯条","level":"B1","topic":"food","summary":"法国与比利时都熟悉的国民配菜和口语符号。","groups":[["Les Américains attribuent l’invention des frites aux Français depuis que Thomas Jefferson en mangeait à Paris juste avant la Révolution.","De leur côté, les Français pensent que les frites sont une spécialité belge."],["La vérité se trouve dans les assiettes, où souvent ces pommes de terre découpées en forme d’allumettes et cuites dans l’huile accompagnent comme garniture des saucisses, des « biftecks », des omelettes, des moules...","Une salade verte à la vinaigrette complète généralement ce tableau du déjeuner, pris rapidement en brasserie ou au restaurant."],["Il est inutile de demander à un enfant ce qu’il préfère entre les haricots verts, les épinards ou les frites.","Les adultes sont plus discrets sur ce sujet mais ils penseront la même chose.","L’obsession nationale pour les frites est si grande qu’elle se traduit jusque dans la langue, en effet quelqu’un qui se sent fatigué pourra ainsi dire : « Aujourd’hui, je n’ai pas la frite ! »"]],"culture":[{"title":"Une origine disputée","fr":"La France et la Belgique partagent une longue histoire de la frite, et la question de son origine reste discutée. Le mot anglais « French fries » ne suffit pas à prouver une invention française : il peut renvoyer à une manière de découper ou aux habitudes linguistiques de l’époque. En Belgique, la frite est un véritable symbole national. Les friteries servent des cornets généreux accompagnés de nombreuses sauces, et la cuisson en deux bains est souvent présentée comme essentielle : le premier cuit la pomme de terre, le second la rend croustillante. En France, la frite appartient plutôt au paysage des brasseries, des restaurants familiaux et des repas rapides. Cette frontière culinaire est donc moins une ligne qu’un espace commun, nourri par des pratiques voisines et des récits concurrents.","zh":"法国和比利时共享悠久的薯条历史，而它的起源问题仍有争议。英语“French fries”不足以证明薯条由法国发明：它可能指一种切法，也可能与当时的语言习惯有关。在比利时，薯条是真正的国家象征。炸薯条店会供应份量十足的纸筒薯条和多种酱汁，而两次油炸常被认为至关重要：第一次把马铃薯炸熟，第二次让外层变脆。在法国，薯条更多属于小酒馆、家庭餐厅和简便快餐的日常景观。因此，这条烹饪边界与其说是一条分界线，不如说是由相邻实践和相互竞争的故事构成的共享空间。","zhSentences":["法国和比利时共享悠久的薯条历史，而它的起源问题仍有争议。","英语“French fries”不足以证明薯条由法国发明：它可能指一种切法，也可能与当时的语言习惯有关。","在比利时，薯条是真正的国家象征。","炸薯条店会供应份量十足的纸筒薯条和多种酱汁，而两次油炸常被认为至关重要：第一次把马铃薯炸熟，第二次让外层变脆。","在法国，薯条更多属于小酒馆、家庭餐厅和简便快餐的日常景观。","因此，这条烹饪边界与其说是一条分界线，不如说是由相邻实践和相互竞争的故事构成的共享空间。"]},{"title":"Des accords populaires","fr":"Dans une brasserie française, le steak-frites est un classique immédiatement reconnaissable. Une pièce de bœuf, une sauce ou un beurre composé et une portion de frites forment un plat simple mais très codifié. Dans le nord de la France et en Belgique, les moules-frites associent des coquillages cuits au vin blanc, aux herbes ou à la crème avec des pommes de terre croustillantes. Les frites accompagnent aussi un croque-monsieur, une omelette ou un poulet rôti. Leur réussite dépend du choix de la pomme de terre, de la taille de la coupe, de la température de l’huile et du moment du service. Elles doivent arriver chaudes et garder un contraste entre surface croustillante et intérieur tendre. Ce savoir-faire ordinaire explique leur popularité durable.","zh":"在法国小酒馆中，牛排配薯条是一眼就能认出的经典菜。一块牛肉、一份酱汁或调味黄油，再加一份薯条，组成一道简单却有明确传统的菜肴。在法国北部和比利时，青口配薯条把以白葡萄酒、香草或奶油烹制的贝类与酥脆马铃薯搭配起来。薯条也会搭配火腿奶酪三明治、煎蛋或烤鸡。薯条是否成功取决于马铃薯品种、切条大小、油温和上桌时机。它们必须趁热端上，并保持表面酥脆与内部柔软之间的反差。这种日常技艺解释了薯条为何长久流行。","zhSentences":["在法国小酒馆中，牛排配薯条是一眼就能认出的经典菜。","一块牛肉、一份酱汁或调味黄油，再加一份薯条，组成一道简单却有明确传统的菜肴。","在法国北部和比利时，青口配薯条把以白葡萄酒、香草或奶油烹制的贝类与酥脆马铃薯搭配起来。","薯条也会搭配火腿奶酪三明治、煎蛋或烤鸡。","薯条是否成功取决于马铃薯品种、切条大小、油温和上桌时机。","它们必须趁热端上，并保持表面酥脆与内部柔软之间的反差。","这种日常技艺解释了薯条为何长久流行。"]},{"title":"Avoir la frite","fr":"La frite est aussi entrée dans le langage familier. « Avoir la frite » signifie être en forme, plein d’énergie et de bonne humeur. À l’inverse, « ne pas avoir la frite » décrit un jour de fatigue ou de moral bas. On entend également « avoir la patate », qui transmet presque la même idée, et « mettre une patate » dans un registre plus physique ou plus agressif selon le contexte. Ces expressions montrent comment un aliment populaire devient une image du corps et de l’énergie. Elles conviennent surtout à une conversation informelle ; on les évite dans un courrier administratif ou un discours très soutenu. Pour un apprenant, les reconnaître est utile, car le sens réel n’a plus grand-chose à voir avec la cuisine. Dire « aujourd’hui, j’ai la frite » annonce simplement une excellente forme.","zh":"薯条也进入了法语口语。“avoir la frite”表示状态很好、精力充沛而且心情愉快。相反，“ne pas avoir la frite”形容某一天很疲倦或情绪低落。人们还会说意思几乎相同的“avoir la patate”；而“mettre une patate”则会根据语境带有更强的身体动作或攻击色彩。这些表达说明，一种大众食物如何转化为身体和能量的形象。它们主要适合非正式谈话，在行政信件或非常正式的发言中应当避免。对学习者来说，识别它们很有用，因为实际含义已经与烹饪没有太大关系。说“aujourd’hui, j’ai la frite”，只是表示自己今天状态极佳。","zhSentences":["薯条也进入了法语口语。","“avoir la frite”表示状态很好、精力充沛而且心情愉快。","相反，“ne pas avoir la frite”形容某一天很疲倦或情绪低落。","人们还会说意思几乎相同的“avoir la patate”；而“mettre une patate”则会根据语境带有更强的身体动作或攻击色彩。","这些表达说明，一种大众食物如何转化为身体和能量的形象。","它们主要适合非正式谈话，在行政信件或非常正式的发言中应当避免。","对学习者来说，识别它们很有用，因为实际含义已经与烹饪没有太大关系。","说“aujourd’hui, j’ai la frite”，只是表示自己今天状态极佳。"]}],"highlights":["De leur côté","en forme d’allumettes","pris rapidement","Il est inutile de","la même chose","se traduit jusque dans la langue","je n’ai pas la frite"],"sentenceTranslations":["自从托马斯·杰斐逊在革命前夕于巴黎吃过薯条，美国人便把薯条的发明归给法国人。","**另一方面**，法国人认为薯条是比利时特产。","答案就在餐盘中：这些切成**火柴棒形状**、在油中烹炸的土豆，常作为配菜搭配香肠、牛排、煎蛋和青口等。","一份油醋汁绿沙拉通常为这种在小酒馆或餐厅**匆忙吃完**的午餐画面作补充。","**没有必要**问孩子更喜欢四季豆、菠菜还是薯条。","成年人对此更含蓄，但他们也会想**同一件事**。","法国人对薯条的痴迷之深，甚至**体现在语言中**：觉得疲倦的人会说：“今天我**没精神**！”"],"hasAudio":true,"audioPack":{"chunks":["audio-packs/frites/01.bin"],"segments":[{"start":0,"end":6.452},{"start":6.452,"end":11.18},{"start":11.18,"end":22.309},{"start":22.309,"end":29.806},{"start":29.806,"end":36.101},{"start":36.101,"end":40.49},{"start":40.49,"end":50.39}]}},{"id":"fromages","title":"Fromages","chineseTitle":"奶酪","level":"B1","topic":"food","summary":"从产地认证到餐桌顺序，理解法国奶酪文化。","groups":[["Avec le pain et le vin, le fromage constitue le troisième côté du « triangle sacré » de la gastronomie française, considérée dans son aspect le plus élémentaire.","On peut en effet concevoir en France un excellent déjeuner composé uniquement de ces trois éléments, avec peut-être en plus quelques olives noires et une salade verte bien assaisonnée."],["Il existe près de quatre cents variétés de fromages en France, chaque région en produit, selon des méthodes et des traditions particulières : le camembert en Normandie, le brie à Meaux, le cantal en Auvergne, le roquefort en Aveyron...","Comme pour les vins, certains fromages reçoivent le label d’Appellation d’Origine Contrôlée (AOC), qui garantit la qualité de leur fabrication.","On utilise trois types de lait, celui de la vache, celui de la chèvre et, moins souvent, celui de la brebis."],["Dans un menu classique, le fromage arrive en quatrième position, après l’entrée, le plat principal et la salade, juste avant le dessert.","Plusieurs types sont alors présentés sur un plateau, on les déguste avec du pain, généralement du plus doux au plus corsé."]],"culture":[{"title":"Terroir et appellations","fr":"Un fromage français raconte souvent un territoire précis : climat, pâturages, race animale, gestes de fabrication et durée d’affinage. Les appellations d’origine protègent ce lien. Pour porter un nom comme Roquefort, Comté ou Camembert de Normandie, un produit doit respecter un cahier des charges et une zone géographique définie. Le sigle européen AOP, appellation d’origine protégée, est aujourd’hui central ; l’ancien terme français AOC reste très présent dans la langue courante. Cette protection ne signifie pas que tous les fromages sans appellation sont médiocres. Elle garantit plutôt une origine et une méthode collectivement reconnues. Les producteurs fermiers, les coopératives et les laiteries peuvent tous participer à cette diversité. Lire l’étiquette permet de distinguer le lieu de fabrication, le type de lait et parfois le traitement thermique.","zh":"一种法国奶酪往往讲述着某片具体土地的故事：气候、牧场、动物品种、制作手法和熟成时间。原产地名称制度保护的正是这种联系。产品若要使用罗克福、孔泰或诺曼底卡芒贝尔这样的名称，就必须遵守一套规范，并产自划定的地理区域。如今，欧洲的 AOP 标志——即“受保护原产地名称”——居于核心地位；较早的法国术语 AOC 在日常语言中仍很常见。这种保护并不意味着所有没有原产地名称的奶酪都品质低劣。它保障的是一种由集体认可的来源和制作方法。农场生产者、合作社和乳品厂都可以参与构成这种多样性。阅读标签可以辨别制作地点、奶源种类，有时还能看出是否经过热处理。","zhSentences":["一种法国奶酪往往讲述着某片具体土地的故事：气候、牧场、动物品种、制作手法和熟成时间。","原产地名称制度保护的正是这种联系。","产品若要使用罗克福、孔泰或诺曼底卡芒贝尔这样的名称，就必须遵守一套规范，并产自划定的地理区域。","如今，欧洲的 AOP 标志——即“受保护原产地名称”——居于核心地位；较早的法国术语 AOC 在日常语言中仍很常见。","这种保护并不意味着所有没有原产地名称的奶酪都品质低劣。","它保障的是一种由集体认可的来源和制作方法。","农场生产者、合作社和乳品厂都可以参与构成这种多样性。","阅读标签可以辨别制作地点、奶源种类，有时还能看出是否经过热处理。"]},{"title":"Trois laits, plusieurs familles","fr":"Le lait de vache domine de nombreuses régions, mais le lait de chèvre est particulièrement visible dans la vallée de la Loire et le Poitou, tandis que le lait de brebis caractérise notamment le Roquefort et des fromages des Pyrénées ou de Corse. Au-delà de l’animal, les familles de texture aident à se repérer : pâtes molles à croûte fleurie, comme le brie ; croûtes lavées, souvent plus puissantes ; pâtes pressées, comme le comté ; bleus persillés ; chèvres frais ou affinés. L’odeur ne prédit pas toujours la force en bouche. Un fromage très parfumé peut être doux, et un petit chèvre discret peut devenir piquant avec l’âge. Le rôle de l’affineur est justement de conduire cette évolution dans une cave où température, humidité et soins sont contrôlés.","zh":"牛奶在许多地区占主导地位，但山羊奶在卢瓦尔河谷和普瓦图尤其常见；绵羊奶则特别体现于罗克福，以及比利牛斯和科西嘉的一些奶酪。除了动物种类，还可以通过质地家族来辨别：如布里奶酪一类的白霉软质奶酪、通常味道更强的洗皮奶酪、孔泰一类的压制奶酪、蓝纹奶酪，以及新鲜或熟成的山羊奶酪。气味并不总能预示入口后的味道强度。一种气味浓郁的奶酪可能口感温和，而一小块看似低调的山羊奶酪会随着熟成变得辛辣。熟成师的职责，正是在温度、湿度和护理方式都受到控制的地窖里引导这种变化。","zhSentences":["牛奶在许多地区占主导地位，但山羊奶在卢瓦尔河谷和普瓦图尤其常见；绵羊奶则特别体现于罗克福，以及比利牛斯和科西嘉的一些奶酪。","除了动物种类，还可以通过质地家族来辨别：如布里奶酪一类的白霉软质奶酪、通常味道更强的洗皮奶酪、孔泰一类的压制奶酪、蓝纹奶酪，以及新鲜或熟成的山羊奶酪。","气味并不总能预示入口后的味道强度。","一种气味浓郁的奶酪可能口感温和，而一小块看似低调的山羊奶酪会随着熟成变得辛辣。","熟成师的职责，正是在温度、湿度和护理方式都受到控制的地窖里引导这种变化。"]},{"title":"Le plateau et son ordre","fr":"Dans un repas traditionnel, le plateau de fromages arrive après le plat principal et avant le dessert. On en choisit généralement quelques-uns plutôt que de tout goûter. Une règle pratique consiste à commencer par les saveurs les plus douces, puis à aller vers les pâtes plus puissantes et les bleus. On coupe le fromage de manière à partager équitablement la croûte et le cœur : une pointe triangulaire se coupe dans la longueur, tandis qu’un grand morceau peut être découpé en tranches parallèles. Le pain accompagne naturellement la dégustation ; les crackers très parfumés risquent de masquer les arômes. Dans la vie quotidienne, ces codes sont beaucoup plus souples. Un morceau de fromage peut terminer un déjeuner rapide, garnir un sandwich ou devenir le centre d’un repas simple avec salade et pain.","zh":"在传统餐序中，奶酪拼盘位于主菜之后、甜点之前。人们通常挑选其中几种，而不会把所有奶酪都尝一遍。一个实用原则是先吃味道最温和的，再逐步品尝风味更强的奶酪和蓝纹奶酪。切奶酪时应公平分享外皮和中心：三角形尖块沿长度方向切，而大块奶酪可以平行切片。面包自然适合搭配奶酪；香味过重的饼干可能会掩盖奶酪本身的香气。在日常生活中，这些规矩要灵活得多。一块奶酪可以结束一顿简便午餐、夹进三明治，也可以与沙拉和面包一起成为简单一餐的中心。","zhSentences":["在传统餐序中，奶酪拼盘位于主菜之后、甜点之前。","人们通常挑选其中几种，而不会把所有奶酪都尝一遍。","一个实用原则是先吃味道最温和的，再逐步品尝风味更强的奶酪和蓝纹奶酪。","切奶酪时应公平分享外皮和中心：三角形尖块沿长度方向切，而大块奶酪可以平行切片。","面包自然适合搭配奶酪；香味过重的饼干可能会掩盖奶酪本身的香气。","在日常生活中，这些规矩要灵活得多。","一块奶酪可以结束一顿简便午餐、夹进三明治，也可以与沙拉和面包一起成为简单一餐的中心。"]}],"highlights":["constitue le troisième côté","On peut en effet","selon des méthodes","Comme pour les vins","On utilise","juste avant le dessert","du plus doux au plus corsé"],"sentenceTranslations":["面包、葡萄酒和奶酪构成法国最基本美食观中的“神圣三角”的**第三边**。","**确实可以**想象在法国吃一顿极好的午餐，只包括这三样东西，或许再加一些黑橄榄和调味得当的绿沙拉。","法国有近四百种奶酪，每个地区都按照特有的**方法**和传统生产：诺曼底的卡芒贝尔、莫城的布里、奥弗涅的康塔尔、阿韦龙的罗克福等。","**和葡萄酒一样**，一些奶酪会获得 AOC 原产地控制名称标签，它保证制作质量。","**人们使用**三种奶：牛奶、山羊奶，以及较少见的绵羊奶。","在经典菜单中，奶酪排在前菜、主菜和沙拉之后，**甜点之前**第四道上桌。","这时会在拼盘上摆出几种奶酪，人们配面包品尝，通常从最温和的吃到**味道最浓的**。"],"hasAudio":true,"audioPack":{"chunks":["audio-packs/fromages/01.bin"],"segments":[{"start":0,"end":9.038},{"start":9.038,"end":18.756},{"start":18.756,"end":32.366},{"start":32.366,"end":39.628},{"start":39.628,"end":45.74},{"start":45.74,"end":54.361},{"start":54.361,"end":60.891}]}},{"id":"macarons","title":"Macarons","chineseTitle":"马卡龙","level":"B1","topic":"food","summary":"从地方杏仁小饼到色彩缤纷的巴黎马卡龙。","groups":[["L’une des pâtisseries françaises les plus célèbres produit un curieux effet : si tout le monde est d’accord sur son goût et sa texture, il est beaucoup plus délicat de dire à quoi elle ressemble.","Un macaron est sucré, croquant et fondant, il a un joli parfum d’amande, un cœur délicieusement tendre, mais quelle est sa forme, quelle est sa couleur ?"],["On fabrique des macarons un peu partout en France et, même si les ingrédients restent toujours plus ou moins les mêmes, chaque région lui a donné une personnalité particulière.","Il faut de la poudre d’amande, des blancs d’œufs et du sucre pour faire des macarons, mais sur cette base, il existe des variations infinies.","Près de Nancy, le macaron de Boulay est rugueux et craquelé ; à Amiens, c’est une petite galette épaisse ; le macaron de Montmorillon, dans le sud-ouest, ressemble à une petite quiche ; dans le Pays basque, il est rond et lisse..."],["Le macaron dit « parisien » est le plus surprenant, il est composé de deux coques bombées entre lesquelles est fourrée une « ganache ».","Leur petite collerette fait très chic, mais c’est surtout leurs couleurs vives et leurs saveurs qui séduisent : pistache, chocolat, café, vanille, framboise, noix de coco, menthe, citron, thé vert et bien d’autres...","Les macarons sont très tendance aujourd’hui, ils ont leur fête le 20 mars, jour du printemps, et un joaillier de la capitale s’est même inspiré de ces délicieuses mignardises pour créer une collection de bijoux."]],"culture":[{"title":"Une famille de biscuits","fr":"Le mot macaron ne décrit pas une forme unique. Dans plusieurs villes françaises, il désigne un biscuit d’amande ancien, souvent sans garniture. À Nancy, Saint-Émilion, Amiens, Montmorillon ou au Pays basque, les recettes locales possèdent leur propre texture, leur histoire et parfois une maison qui les a rendues célèbres. Les ingrédients essentiels restent simples : amandes moulues, sucre et blancs d’œufs. Selon la proportion, la cuisson et le geste du pâtissier, le résultat devient moelleux, croquant, lisse ou craquelé. Ces macarons régionaux rappellent que la pâtisserie française ne vient pas seulement de Paris. Elle s’est construite dans des couvents, des boutiques familiales et des traditions urbaines très diverses. Le visiteur qui demande « un macaron » peut donc recevoir des gâteaux très différents selon l’endroit où il se trouve.","zh":"macaron 一词并不描述唯一一种形状。在法国多座城市中，它指一种古老的杏仁小饼，通常不带夹馅。在南锡、圣埃米利永、亚眠、蒙莫里永或巴斯克地区，地方配方各有自己的质地、历史，有时还有令它声名远扬的老店。核心原料仍然简单：杏仁粉、糖和蛋白。根据比例、烘烤方式和糕点师手法的不同，成品会柔软、酥脆、光滑或带裂纹。这些地方马卡龙提醒我们，法国糕点并非只来自巴黎。它是在修道院、家庭店铺和非常多样的城市传统中逐渐形成的。因此，游客在不同地方点“一只 macaron”，可能会得到非常不同的糕点。","zhSentences":["macaron 一词并不描述唯一一种形状。","在法国多座城市中，它指一种古老的杏仁小饼，通常不带夹馅。","在南锡、圣埃米利永、亚眠、蒙莫里永或巴斯克地区，地方配方各有自己的质地、历史，有时还有令它声名远扬的老店。","核心原料仍然简单：杏仁粉、糖和蛋白。","根据比例、烘烤方式和糕点师手法的不同，成品会柔软、酥脆、光滑或带裂纹。","这些地方马卡龙提醒我们，法国糕点并非只来自巴黎。","它是在修道院、家庭店铺和非常多样的城市传统中逐渐形成的。","因此，游客在不同地方点“一只 macaron”，可能会得到非常不同的糕点。"]},{"title":"Le macaron parisien","fr":"Le macaron parisien, aussi appelé macaron à la ganache, assemble deux coques lisses autour d’une garniture. Sa fabrication demande une grande précision. Après avoir préparé la meringue et incorporé la poudre d’amande, le pâtissier travaille la pâte jusqu’à obtenir une texture régulière : c’est le macaronage. Les coques sont dressées, parfois laissées à croûter, puis cuites. La petite bordure qui apparaît à leur base s’appelle la collerette. Une fois garnis, les macarons reposent souvent au frais afin que l’humidité du cœur assouplisse légèrement les coques. Le contraste final doit réunir une surface fine, un intérieur tendre et une garniture nette. Chocolat, pistache, citron et framboise sont classiques, mais les maisons contemporaines explorent aussi les épices, le thé, les fleurs et les saveurs salées.","zh":"巴黎马卡龙又称甘纳许马卡龙，由两片光滑外壳夹住馅料组成。它的制作要求高度精确。准备好蛋白霜并拌入杏仁粉后，糕点师要继续翻拌，直到面糊质地均匀；这一步称为 macaronage。外壳被挤出成形，有时先静置结皮，然后烘烤。外壳底部出现的一圈小边叫作 collerette。填入馅料后，马卡龙通常会在低温中静置，让内馅的湿度把外壳稍稍软化。最终的对比应同时呈现纤薄表面、柔软内部和轮廓清晰的馅料。巧克力、开心果、柠檬和覆盆子是经典口味，但当代糕点店也探索香料、茶、花香和咸味。","zhSentences":["巴黎马卡龙又称甘纳许马卡龙，由两片光滑外壳夹住馅料组成。","它的制作要求高度精确。","准备好蛋白霜并拌入杏仁粉后，糕点师要继续翻拌，直到面糊质地均匀；这一步称为 macaronage。","外壳被挤出成形，有时先静置结皮，然后烘烤。","外壳底部出现的一圈小边叫作 collerette。","填入馅料后，马卡龙通常会在低温中静置，让内馅的湿度把外壳稍稍软化。","最终的对比应同时呈现纤薄表面、柔软内部和轮廓清晰的馅料。","巧克力、开心果、柠檬和覆盆子是经典口味，但当代糕点店也探索香料、茶、花香和咸味。"]},{"title":"Couleurs, maisons et cadeaux","fr":"À Paris, le macaron est devenu un objet de vitrine autant qu’une pâtisserie. Les grandes maisons disposent les pièces par couleur dans des boîtes élégantes, proposent des collections saisonnières et associent chaque parfum à une identité visuelle. Cette présentation en fait un cadeau facile à transporter et un souvenir recherché. Elle explique aussi pourquoi le macaron apparaît dans la mode, la photographie et la décoration. Pourtant, sa fragilité impose quelques précautions : les coques cassent facilement, la garniture craint la chaleur et la durée de conservation reste courte. On le mange généralement en une ou deux bouchées, souvent avec du thé ou du café. La dégustation gagne à commencer par les parfums délicats avant les goûts puissants. Derrière l’image luxueuse, le plaisir repose toujours sur un équilibre très simple entre amande, sucre, texture et parfum.","zh":"在巴黎，马卡龙既是一种糕点，也成了橱窗中的展示品。大店会按颜色把它们排列在精美礼盒中，推出季节系列，并为每种口味搭配视觉形象。这样的呈现方式使它成为方便携带的礼物和备受欢迎的纪念品。这也解释了为什么马卡龙会出现在时尚、摄影和装饰领域。不过，它的脆弱要求一些注意：外壳容易破裂，馅料怕热，保存时间也较短。人们通常用一两口吃完，常搭配茶或咖啡。品尝时最好先从细腻口味开始，再转向浓烈风味。在奢华形象背后，这份愉悦始终来自杏仁、糖、质地与香气之间非常简单的平衡。","zhSentences":["在巴黎，马卡龙既是一种糕点，也成了橱窗中的展示品。","大店会按颜色把它们排列在精美礼盒中，推出季节系列，并为每种口味搭配视觉形象。","这样的呈现方式使它成为方便携带的礼物和备受欢迎的纪念品。","这也解释了为什么马卡龙会出现在时尚、摄影和装饰领域。","不过，它的脆弱要求一些注意：外壳容易破裂，馅料怕热，保存时间也较短。","人们通常用一两口吃完，常搭配茶或咖啡。","品尝时最好先从细腻口味开始，再转向浓烈风味。","在奢华形象背后，这份愉悦始终来自杏仁、糖、质地与香气之间非常简单的平衡。"]}],"highlights":["si tout le monde est d’accord","un peu partout","même si","plus ou moins les mêmes","sur cette base","et bien d’autres","très tendance","s’est même inspiré de"],"sentenceTranslations":["法国最著名的糕点之一产生了一种奇妙效果：**尽管人人都认同**它的味道和口感，却很难说清它到底长什么样。","马卡龙甜、脆又入口即化，有好看的杏仁香和柔软的内心，但它究竟是什么形状、什么颜色呢？","法国**到处**都制作马卡龙，**即使**原料始终**大同小异**，每个地区也赋予它独特个性。","制作马卡龙需要杏仁粉、蛋白和糖，但**以此为基础**，可以有无穷变化。","南锡附近的布莱马卡龙粗糙且有裂纹；亚眠的是厚厚的小圆饼；蒙莫里永的马卡龙像小馅饼；巴斯克地区的则圆而光滑。","所谓“巴黎式”马卡龙最令人惊奇：两片圆拱外壳之间夹着甘纳许。","它们的小裙边很精致，但更吸引人的是鲜艳颜色和风味：开心果、巧克力、咖啡、香草、覆盆子、椰子、薄荷、柠檬、绿茶等**许多其他口味**。","马卡龙如今**非常流行**，每年春分日三月二十日有自己的节日；首都的一位珠宝商甚至**从这些精致小点心中得到灵感**，创作出一系列珠宝。"],"hasAudio":true,"audioPack":{"chunks":["audio-packs/macarons/01.bin"],"segments":[{"start":0,"end":10.606},{"start":10.606,"end":19.226},{"start":19.226,"end":28.369},{"start":28.369,"end":36.362},{"start":36.362,"end":48.718},{"start":48.718,"end":55.484},{"start":55.484,"end":69.094},{"start":69.094,"end":79.673}]}},{"id":"perrier","title":"Perrier","chineseTitle":"巴黎水","level":"A2","topic":"food","summary":"从南法泉水到绿色瓶身与广告史。","groups":[["L’eau de Perrier, eau minérale pétillante composée de gaz carbonique naturel, est mise en bouteille à Vergèze, dans le Gard.","Lancée en 1903 par Sir John Harmsworth, homme d’affaires britannique qui avait racheté l’exploitation de la source à son propriétaire Louis Perrier, on surnommait cette eau le « champagne des eaux de table ».","Sa bouteille caractéristique en forme de quille lui donne un air sympathique et généreux."],["Très désaltérante, l’eau de Perrier accompagne tous les plats, elle se consomme à tous moments, elle remplace l’alcool pour ceux qui n’en boivent pas, elle est la solution idéale pour ceux qui ne savent pas quoi commander au café ou qui ont un estomac à soigner."],["Près d’un milliard de bouteilles de Perrier sont vendues chaque année dans le monde.","La marque a toujours suivi une politique promotionnelle dynamique et créative ; le slogan publicitaire le plus célèbre a été inventé en 1976 : « Perrier c’est fou » !"]],"culture":[{"title":"Une source du Gard","fr":"Perrier est mise en bouteille à Vergèze, dans le département du Gard, entre Nîmes et Montpellier. L’histoire commerciale de la marque se développe au début du vingtième siècle autour d’une source minérale naturellement gazeuse. Le médecin Louis Perrier donne son nom au produit, puis l’homme d’affaires britannique John Harmsworth contribue à son expansion. La bouteille verte et arrondie devient rapidement reconnaissable. Sa silhouette aurait été inspirée par les massues de gymnastique utilisées par Harmsworth après un accident. Au-delà de l’anecdote, cette forme montre l’importance du design dans la construction d’une marque : on peut identifier Perrier même sans lire l’étiquette. Le produit associe ainsi une origine géographique française, une histoire internationale et une image visuelle qui a traversé plusieurs générations.","zh":"Perrier 在尼姆与蒙彼利埃之间、加尔省的韦尔热兹装瓶。这个品牌的商业历史于二十世纪初围绕一处天然含气矿泉展开。路易·佩里耶医生把自己的姓氏赋予产品，随后英国商人约翰·哈姆斯沃思帮助它扩大市场。绿色圆润的瓶子很快变得极具辨识度。据说，它的轮廓受到哈姆斯沃思发生事故后使用的体操棒启发。不论这则轶事是否重要，这个造型都体现了设计对品牌塑造的作用：即使不看标签，人们也能认出 Perrier。因此，这款产品结合了法国的地理起源、国际化历史，以及一套跨越数代人的视觉形象。","zhSentences":["Perrier 在尼姆与蒙彼利埃之间、加尔省的韦尔热兹装瓶。","这个品牌的商业历史于二十世纪初围绕一处天然含气矿泉展开。","路易·佩里耶医生把自己的姓氏赋予产品，随后英国商人约翰·哈姆斯沃思帮助它扩大市场。","绿色圆润的瓶子很快变得极具辨识度。","据说，它的轮廓受到哈姆斯沃思发生事故后使用的体操棒启发。","不论这则轶事是否重要，这个造型都体现了设计对品牌塑造的作用：即使不看标签，人们也能认出 Perrier。","因此，这款产品结合了法国的地理起源、国际化历史，以及一套跨越数代人的视觉形象。"]},{"title":"Commander de l’eau au café","fr":"Dans un café ou un restaurant français, on peut demander une carafe d’eau : il s’agit normalement d’eau du robinet, servie sans bouteille. Si l’on souhaite une eau minérale, le serveur peut proposer une eau plate ou gazeuse. Perrier est parfois utilisé comme un nom de commande très direct, mais l’établissement peut servir une autre marque d’eau pétillante. On peut aussi commander un « Perrier tranche », accompagné d’une rondelle de citron, ou un sirop mélangé à l’eau gazeuse. Cette option convient aux personnes qui ne boivent pas d’alcool et veulent tout de même participer au moment social. L’eau gazeuse n’est cependant pas un remède universel : certaines personnes l’apprécient après un repas, tandis que d’autres la trouvent inconfortable. Le choix dépend simplement du goût et du bien-être de chacun.","zh":"在法国咖啡馆或餐厅，可以要一壶水；这通常是不用瓶装的自来水。如果想喝矿泉水，服务员可能会提供无气水或气泡水。有时人们会直接用 Perrier 作为点单名称，但餐厅也可能供应其他品牌的气泡水。还可以点一杯配柠檬片的“Perrier tranche”，或点用气泡水调制的糖浆饮料。这种选择适合不喝酒、但仍希望参与社交时刻的人。不过，气泡水并不是万能的保健品：有人喜欢餐后喝，也有人会觉得不舒服。选择只需取决于每个人的口味和身体感受。","zhSentences":["在法国咖啡馆或餐厅，可以要一壶水；这通常是不用瓶装的自来水。","如果想喝矿泉水，服务员可能会提供无气水或气泡水。","有时人们会直接用 Perrier 作为点单名称，但餐厅也可能供应其他品牌的气泡水。","还可以点一杯配柠檬片的“Perrier tranche”，或点用气泡水调制的糖浆饮料。","这种选择适合不喝酒、但仍希望参与社交时刻的人。","不过，气泡水并不是万能的保健品：有人喜欢餐后喝，也有人会觉得不舒服。","选择只需取决于每个人的口味和身体感受。"]},{"title":"La publicité comme spectacle","fr":"Perrier a construit sa célébrité grâce à une publicité audacieuse. Affiches, films et slogans ont souvent présenté l’eau comme un produit énergique, élégant ou légèrement extravagant. « Perrier, c’est fou ! » résume cette volonté de transformer une boisson simple en personnage culturel. La marque a travaillé avec des artistes et des réalisateurs, et certaines campagnes sont devenues des références du graphisme publicitaire français. Cette stratégie repose sur un contraste efficace : le contenu de la bouteille est de l’eau, mais son univers évoque la fête, le désir et le mouvement. Elle montre aussi comment les marques françaises du vingtième siècle ont utilisé l’affiche, le cinéma et plus tard la télévision pour toucher un large public. Étudier Perrier, c’est donc lire une petite histoire de la consommation moderne.","zh":"Perrier 借助大胆的广告建立了知名度。海报、影片和口号常把这种水塑造成充满活力、优雅或略显离奇的产品。“Perrier，太疯狂了！”这句口号概括了把一种简单饮料变成文化角色的愿望。品牌与艺术家和导演合作，一些宣传活动已经成为法国广告平面设计的经典参照。这一策略建立在鲜明反差上：瓶里装的是水，但它的世界却让人想到节庆、欲望和运动。它也说明了二十世纪的法国品牌如何利用海报、电影，后来又利用电视接触广大公众。因此，研究 Perrier，也是在阅读一小段现代消费史。","zhSentences":["Perrier 借助大胆的广告建立了知名度。","海报、影片和口号常把这种水塑造成充满活力、优雅或略显离奇的产品。","“Perrier，太疯狂了！”这句口号概括了把一种简单饮料变成文化角色的愿望。","品牌与艺术家和导演合作，一些宣传活动已经成为法国广告平面设计的经典参照。","这一策略建立在鲜明反差上：瓶里装的是水，但它的世界却让人想到节庆、欲望和运动。","它也说明了二十世纪的法国品牌如何利用海报、电影，后来又利用电视接触广大公众。","因此，研究 Perrier，也是在阅读一小段现代消费史。"]}],"highlights":["mise en bouteille","on surnommait","Très désaltérante","à tous moments","remplace l’alcool","la solution idéale","ne savent pas quoi commander","a toujours suivi"],"sentenceTranslations":["巴黎水是一种由天然二氧化碳构成的气泡矿泉水，在加尔省韦尔热兹**装瓶**。","这款水由收购泉源经营权的英国商人约翰·哈姆斯沃思于1903年推出，当时人们**把它称作**“餐桌水中的香槟”。","它标志性的保龄球瓶形瓶身使它显得亲切而大方。","巴黎水**非常解渴**，能配所有菜肴，**随时**都可饮用；它为不饮酒的人**替代酒精**，也是**不知道在咖啡馆点什么**或需要照顾胃部的人眼中的**理想选择**。","每年全球售出近十亿瓶巴黎水。","该品牌**一直采用**活跃而有创意的宣传策略；最著名的广告语于1976年诞生：“Perrier，太疯狂了！”"],"hasAudio":true,"audioPack":{"chunks":["audio-packs/perrier/01.bin"],"segments":[{"start":0,"end":7.236},{"start":7.236,"end":18.103},{"start":18.103,"end":22.988},{"start":22.988,"end":35.892},{"start":35.892,"end":39.68},{"start":39.68,"end":50.024}]}},{"id":"soupe-oignon","title":"Soupe à l’oignon","chineseTitle":"洋葱汤","level":"B1","topic":"food","summary":"从巴黎中央市场的深夜热汤到焗烤版本。","groups":[["Plus qu’une simple recette de cuisine, la soupe à l’oignon en France est associée à une tradition, celle du « souper », ce repas léger que l’on prend en fin de soirée, après un spectacle au théâtre, un film au cinéma, un concert ou une fête entre amis.","Il a été un temps aussi où les « Forts des Halles », après une dure nuit au travail dans le « ventre de Paris » (Émile Zola), s’arrêtaient à l’aube dans un café pour se requinquer avec une soupe à l’oignon avant d’aller se coucher."],["L’oignon est un légume cultivé partout dans le monde depuis plusieurs millénaires, les Égyptiens lui vouaient un culte et les Grecs en consommaient avant le combat.","L’oignon est bien sûr apprécié pour la saveur qu’il apporte aux salades ou à la cuisson des plats mais il est également réputé pour ses vertus thérapeutiques.","Il prévient en effet les infections et il élimine les toxines du sang.","Le cataplasme à l’oignon est un remède traditionnel à l’action purifiante, il suffit de le placer sur la poitrine pendant vingt minutes pour se débarrasser d’un rhume."],["La soupe à l’oignon est servie bouillante avec des croûtons de pain couverts de fromage fondu.","C’est aussi la soupe idéale pour se réchauffer les soirs d’hiver."]],"culture":[{"title":"Les Halles et la nuit parisienne","fr":"La soupe à l’oignon est fortement liée à l’imaginaire des anciennes Halles de Paris, le grand marché alimentaire qui occupait autrefois le centre de la capitale. Pendant la nuit, porteurs, vendeurs et restaurateurs travaillaient pendant que la ville dormait. À l’aube, un bol de soupe chaud, nourrissant et peu coûteux permettait de reprendre des forces. Les écrivains ont surnommé ce quartier le « ventre de Paris », expression rendue célèbre par Émile Zola. Lorsque le marché de gros a été transféré à Rungis à la fin des années 1960, le monde des pavillons et des travailleurs nocturnes a disparu. La soupe est pourtant restée dans les brasseries et dans la mémoire collective. Elle évoque encore les sorties tardives, les repas après le spectacle et un Paris populaire aujourd’hui largement transformé.","zh":"洋葱汤与巴黎旧中央市场 Les Halles 的集体想象紧密相连，那里曾是占据首都市中心的大型食品市场。夜里，当城市沉睡时，搬运工、商贩和餐馆经营者仍在工作。到了黎明，一碗热乎、饱腹又便宜的汤可以帮助他们恢复体力。作家们把这个街区称为“巴黎之腹”，这一说法因埃米尔·左拉而闻名。二十世纪六十年代末，批发市场迁往兰吉斯后，市场大棚和夜班工人的世界随之消失。然而，洋葱汤仍留在小酒馆中，也留在集体记忆里。它至今仍让人想到深夜外出、演出后的用餐，以及一个如今已发生巨大变化的平民巴黎。","zhSentences":["洋葱汤与巴黎旧中央市场 Les Halles 的集体想象紧密相连，那里曾是占据首都市中心的大型食品市场。","夜里，当城市沉睡时，搬运工、商贩和餐馆经营者仍在工作。","到了黎明，一碗热乎、饱腹又便宜的汤可以帮助他们恢复体力。","作家们把这个街区称为“巴黎之腹”，这一说法因埃米尔·左拉而闻名。","二十世纪六十年代末，批发市场迁往兰吉斯后，市场大棚和夜班工人的世界随之消失。","然而，洋葱汤仍留在小酒馆中，也留在集体记忆里。","它至今仍让人想到深夜外出、演出后的用餐，以及一个如今已发生巨大变化的平民巴黎。"]},{"title":"Le secret de la gratinée","fr":"La recette paraît modeste, mais elle demande de la patience. Les oignons sont émincés puis cuits lentement jusqu’à devenir très tendres et profondément dorés. Cette étape développe leur douceur et donne au bouillon une couleur brune. On ajoute ensuite un liquide, souvent du bouillon, parfois du vin, puis on laisse les saveurs se réunir. Pour la version gratinée, la soupe est versée dans un bol résistant à la chaleur. Des tranches de pain grillé sont posées à la surface, couvertes de fromage râpé, puis passées sous le gril. Le pain absorbe le bouillon tandis que le fromage forme une croûte. Chaque maison adapte la recette : type d’oignon, bouillon de bœuf ou de volaille, comté, gruyère ou emmental. Le résultat doit rester équilibré, ni trop salé ni trop lourd.","zh":"这道菜看似朴素，却需要耐心。洋葱切丝后慢慢烹煮，直到变得非常柔软并呈深金黄色。这一步会释放洋葱的甜味，并使汤汁变成棕色。随后加入液体，通常是高汤，有时也加葡萄酒，再让各种味道充分融合。制作焗烤版本时，要把汤倒进耐热碗中。在表面铺上烤面包片，撒上碎奶酪，然后放到上火下焗烤。面包会吸收汤汁，奶酪则形成一层外壳。每家都会调整配方：洋葱品种、牛肉或鸡肉高汤，以及孔泰、格吕耶尔或埃曼塔奶酪都可不同。最终味道必须保持平衡，既不能太咸，也不能过于厚重。","zhSentences":["这道菜看似朴素，却需要耐心。","洋葱切丝后慢慢烹煮，直到变得非常柔软并呈深金黄色。","这一步会释放洋葱的甜味，并使汤汁变成棕色。","随后加入液体，通常是高汤，有时也加葡萄酒，再让各种味道充分融合。","制作焗烤版本时，要把汤倒进耐热碗中。","在表面铺上烤面包片，撒上碎奶酪，然后放到上火下焗烤。","面包会吸收汤汁，奶酪则形成一层外壳。","每家都会调整配方：洋葱品种、牛肉或鸡肉高汤，以及孔泰、格吕耶尔或埃曼塔奶酪都可不同。","最终味道必须保持平衡，既不能太咸，也不能过于厚重。"]},{"title":"Tradition et santé","fr":"Les textes anciens attribuent souvent à l’oignon des pouvoirs médicinaux très larges. On trouve des récits de cataplasmes, de sirops domestiques et de remèdes contre le rhume. Ces pratiques appartiennent à l’histoire des soins populaires et à la transmission familiale, mais elles ne remplacent pas un diagnostic ni un traitement médical. L’oignon est bien un aliment intéressant : il apporte des fibres, des composés aromatiques et différents micronutriments. Cela ne signifie pas qu’il élimine toutes les toxines ou guérit une infection. Cette distinction est importante lorsqu’on lit un ouvrage culturel publié il y a plusieurs années : on peut respecter le témoignage historique sans transformer une croyance en conseil de santé. La soupe reste surtout un plat réconfortant, chaud et savoureux. En cas de maladie, il faut suivre des recommandations médicales adaptées.","zh":"旧时文献常把非常广泛的药用功效归于洋葱。其中可以看到关于外敷药膏、家庭糖浆和感冒疗法的记载。这些做法属于民间医疗史和家庭传承，但不能取代医学诊断或治疗。洋葱确实是一种有价值的食物：它能提供纤维、芳香化合物和多种微量营养素。但这并不意味着它能清除所有毒素或治愈感染。阅读多年前出版的文化读物时，这种区分十分重要：我们可以尊重历史见证，但不能把一种信念变成健康建议。洋葱汤主要仍是一道温暖、美味、令人安慰的食物。生病时，应遵循适合个人情况的医疗建议。","zhSentences":["旧时文献常把非常广泛的药用功效归于洋葱。","其中可以看到关于外敷药膏、家庭糖浆和感冒疗法的记载。","这些做法属于民间医疗史和家庭传承，但不能取代医学诊断或治疗。","洋葱确实是一种有价值的食物：它能提供纤维、芳香化合物和多种微量营养素。","但这并不意味着它能清除所有毒素或治愈感染。","阅读多年前出版的文化读物时，这种区分十分重要：我们可以尊重历史见证，但不能把一种信念变成健康建议。","洋葱汤主要仍是一道温暖、美味、令人安慰的食物。","生病时，应遵循适合个人情况的医疗建议。"]}],"highlights":["Plus qu’une simple","en fin de soirée","Il a été un temps","à l’aube","se requinquer","bien sûr","réputé pour","il suffit de","se débarrasser d’un rhume","pour se réchauffer"],"sentenceTranslations":["**不仅仅是一道**菜谱，法国洋葱汤还与“夜宵”传统相连：人们在**深夜**、看完戏剧、电影、音乐会或与朋友聚会后吃的轻食。","**曾经**，巴黎中央市场的强壮搬运工夜间辛苦工作后，会在**黎明**停进咖啡馆，吃一碗洋葱汤**恢复精神**，再回去睡觉。","洋葱是世界各地栽培数千年的蔬菜；埃及人曾崇拜它，希腊人在战斗前食用它。","洋葱**当然**因其给沙拉和熟食带来的风味而受欢迎，也因其**据称具有的**疗效而闻名。","它确实能预防感染并清除血液毒素。","洋葱敷剂是一种具有净化作用的传统疗法；**只需**把它放在胸口二十分钟，就能**摆脱感冒**。","洋葱汤趁热上桌，配盖着融化奶酪的面包丁。","它也是冬夜**取暖的**理想汤品。"],"hasAudio":true,"audioPack":{"chunks":["audio-packs/soupe-oignon/01.bin"],"segments":[{"start":0,"end":13.923},{"start":
